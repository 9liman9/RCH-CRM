// VIEW: Accountant Dashboard (Suleiman)
// ═══════════════════════════════════
function vAccountantDashboard() {
  const all = dbGet();
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

  const expensed = all.filter(l => l.status === 'expensed');
  const invoiced = all.filter(l => l.status === 'invoiced');
  const invoicedThisMonth = invoiced.filter(l => new Date(l.invoicedAt) >= monthStart);
  const totalReceivables = invoiced.reduce((s, l) => s + l.total, 0);
  const totalExpensed = expensed.reduce((s, l) => s + l.total, 0);
  const invoicedThisMonthTotal = invoicedThisMonth.reduce((s, l) => s + l.total, 0);

  // Card spending
  const activeCards = all.filter(l => l.status !== 'rejected');
  const cardSpending = CARDS.map(c => {
    const spent = activeCards.filter(l => l.card === c.id).reduce((s, l) => s + l.total, 0);
    const pct = c.limit > 0 ? Math.min(spent / c.limit, 1) : 0;
    return { ...c, spent, pct };
  });
  const totalCardSpent = cardSpending.reduce((s, c) => s + c.spent, 0);

  // Aging: days since expensed but not invoiced
  const agingItems = expensed.map(l => {
    const expDate = new Date(l.expensedAt);
    const days = Math.floor((now - expDate) / (1000 * 60 * 60 * 24));
    return { ...l, ageDays: days };
  }).sort((a, b) => b.ageDays - a.ageDays);

  // Thursday invoice schedule
  const today = now.getDay(); // 0=Sun
  const daysToThurs = (4 - today + 7) % 7 || 7;
  const nextThursday = new Date(now);
  nextThursday.setDate(now.getDate() + daysToThurs);
  const isThursday = today === 4;

  return `
    <div style="margin-bottom:18px">
      <div style="font-size:15px;font-weight:700;color:var(--navy)">Accountant Dashboard</div>
      <div style="font-size:12px;color:var(--g500);margin-top:2px">${now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}${isThursday ? ' · <span style="color:var(--magenta);font-weight:600">Invoice Day</span>' : ''}</div>
    </div>

    <div class="stats-row">
      <div class="stat" style="--sc:var(--purple)">
        <div class="stat-lbl">Ready to Invoice</div>
        <div class="stat-val">${expensed.length}</div>
        <div class="stat-sub">QAR ${fmt(totalExpensed)} pending</div>
      </div>
      <div class="stat" style="--sc:var(--green)">
        <div class="stat-lbl">Invoiced This Month</div>
        <div class="stat-val">${invoicedThisMonth.length}</div>
        <div class="stat-sub">QAR ${fmt(invoicedThisMonthTotal)}</div>
      </div>
      <div class="stat" style="--sc:var(--navy)">
        <div class="stat-lbl">Total Receivables</div>
        <div class="stat-val">QAR ${fmt(totalReceivables)}</div>
        <div class="stat-sub">${invoiced.length} outstanding invoice${invoiced.length !== 1 ? 's' : ''}</div>
      </div>
      <div class="stat" style="--sc:var(--orange)">
        <div class="stat-lbl">Card Spending</div>
        <div class="stat-val">QAR ${fmt(totalCardSpent)}</div>
        <div class="stat-sub">Across ${CARDS.length} cards</div>
      </div>
    </div>

    ${isThursday ? `
      <div style="background:linear-gradient(135deg,var(--magenta),var(--mag-dk));color:white;border-radius:12px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:14px;font-weight:700">It's Thursday — Invoice Day</div>
          <div style="font-size:12px;opacity:.8;margin-top:2px">${expensed.length} service${expensed.length !== 1 ? 's' : ''} ready to invoice · QAR ${fmt(totalExpensed)} total</div>
        </div>
        <button class="btn" style="background:white;color:var(--magenta);font-weight:700" onclick="set({view:'finance'})">Start Invoicing →</button>
      </div>
    ` : `
      <div style="background:var(--navy-lt);border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between">
        <div>

              <td style="color:var(--g500)">${l.clientName}</td>
              <td>${statusBadge(l.status)}</td>
              <td style="text-align:right">${l.elenaChecked ? '<span style="color:var(--green);font-weight:700">✓</span>' : '<span style="color:var(--g300)">–</span>'}</td>
              <td style="text-align:right">${l.gabiChecked ? '<span style="color:var(--green);font-weight:700">✓</span>' : '<span style="color:var(--g300)">–</span>'}</td>
            </tr>`).join('')}</tbody>
          </table>
        </div>`;
    })()}

    <!-- Pending Invoice Summary by Client -->
    ${agingItems.length > 0 ? (() => {
      const byC = {};
      agingItems.forEach(l => {
        if (!byC[l.clientId]) byC[l.clientId] = {name: l.clientName, provider: l.provider, count: 0, govFee: 0, profFee: 0};
        byC[l.clientId].count++;
        byC[l.clientId].govFee  += (l.govFee||0);
        byC[l.clientId].profFee += l.total;
      });
      const rows = Object.values(byC).sort((a,b) => (b.govFee+b.profFee) - (a.govFee+a.profFee));
      const totGov  = rows.reduce((s,r) => s + r.govFee, 0);
      const totProf = rows.reduce((s,r) => s + r.profFee, 0);
      return `
        <div class="card" style="margin-bottom:16px">
          <div class="card-hd">
            <span class="card-title">Pending Invoice Summary</span>
            <button class="btn btn-navy btn-xs" onclick="set({view:'finance'})">Go to Invoice Queue →</button>
          </div>
          <table class="client-table">
            <thead><tr>
              <th>Client</th>
              <th>Company</th>
              <th style="text-align:center"># Services</th>
              <th style="text-align:right">Gov. Fees</th>
              <th style="text-align:right">Prof. Fees</th>
              <th style="text-align:right">Total</th>
            </tr></thead>
            <tbody>
              ${rows.map(r => `<tr>
                <td style="font-weight:600">${r.name}</td>
                <td><span class="badge" style="background:${r.provider==='Rapid'?'var(--navy-lt)':'var(--mag-lt)'};color:${r.provider==='Rapid'?'var(--navy)':'var(--magenta)'}">${r.provider}</span></td>
                <td style="text-align:center">${r.count}</td>
                <td style="text-align:right;color:${r.govFee>0?'var(--red)':'var(--g500)'};font-weight:${r.govFee>0?'700':'400'}">
                  ${r.govFee > 0 ? 'QAR '+fmt(r.govFee) : '—'}
                </td>
                <td style="text-align:right">QAR ${fmt(r.profFee)}</td>
                <td style="text-align:right;font-weight:700;color:var(--navy)">QAR ${fmt(r.govFee+r.profFee)}</td>
              </tr>`).join('')}
            </tbody>
            <tfoot>
              <tr style="background:var(--g50)">
                <td colspan="2" style="font-weight:700;font-size:12px">Total</td>
                <td style="text-align:center;font-weight:700">${agingItems.length}</td>
                <td style="text-align:right;font-weight:700;color:var(--red)">
                  ${totGov > 0 ? 'QAR '+fmt(totGov) : '—'}
                </td>
                <td style="text-align:right;font-weight:700">QAR ${fmt(totProf)}</td>
                <td style="text-align:right;font-weight:700;color:var(--navy)">QAR ${fmt(totGov+totProf)}</td>
              </tr>
            </tfoot>
          </table>
        </div>`;
    })() : ''}

    <div class="grid-2">
      <div class="card">
        <div class="card-hd">
          <span class="card-title">Uninvoiced Services</span>
          <span class="badge" style="background:var(--purple-lt);color:var(--purple)">${agingItems.length} items</span>
        </div>
        ${agingItems.length === 0
          ? `<div class="empty-state" style="padding:24px"><div class="empty-icon">✅</div><div class="empty-txt">All caught up</div><div class="empty-sub">No services waiting to be invoiced</div></div>`
          : agingItems.map(l => `
            <div class="row-item">
              <div style="flex:1">
                <div style="font-size:12px;font-weight:600">${l.clientName}</div>
                <div style="font-size:11px;color:var(--g500);margin-top:1px">${l.serviceName} · ${l.qty} emp · QAR ${fmt(l.total)}${l.govFee ? ' + QAR '+fmt(l.govFee)+' gov' : ''}</div>
              </div>
              <div style="text-align:right;display:flex;align-items:center;gap:8px">
                <span class="badge ${l.ageDays > 5 ? 'b-rejected' : l.ageDays > 2 ? 'b-pending' : 'b-approved'}">${l.ageDays}d ago</span>
                <button class="btn btn-navy btn-xs" onclick="set({view:'finance'})">Invoice Queue</button>
              </div>
            </div>`).join('')
        }
      </div>

      <div class="card">
        <div class="card-hd">
          <span class="card-title">Card Spending</span>
        </div>
        ${cardSpending.map(c => `
          <div style="margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
              <div>
                <span style="font-size:12px;font-weight:600">${c.label}</span>
                <span class="badge" style="background:${c.company === 'Rapid' ? 'var(--navy-lt)' : 'var(--mag-lt)'};color:${c.company === 'Rapid' ? 'var(--navy)' : 'var(--magenta)'};font-size:9px;margin-left:6px">${c.company}</span>
              </div>
              <span style="font-size:11px;font-weight:700;color:${c.pct >= 0.9 ? 'var(--red)' : c.pct >= 0.7 ? 'var(--orange)' : 'var(--navy)'}">QAR ${fmt(c.spent)} / ${fmt(c.limit)}</span>
            </div>
            <div style="height:6px;background:var(--g100);border-radius:3px;overflow:hidden">
              <div style="height:100%;width:${Math.round(c.pct * 100)}%;background:${c.pct >= 0.9 ? 'var(--red)' : c.pct >= 0.7 ? 'var(--orange)' : 'var(--green)'};border-radius:3px;transition:width .3s"></div>
            </div>
          </div>`).join('')}
        <div style="padding-top:10px;border-top:1px solid var(--g100);display:flex;justify-content:space-between">
          <span style="font-size:11px;font-weight:600;color:var(--g500)">Total across all cards</span>
          <span style="font-size:12px;font-weight:700;color:var(--navy)">QAR ${fmt(totalCardSpent)}</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-hd">
        <span class="card-title">Receivables by Client</span>
        <span style="font-size:11px;color:var(--g500)">Outstanding invoiced amounts</span>
      </div>
      ${invoiced.length === 0
        ? `<div style="text-align:center;padding:20px;color:var(--g500);font-size:12px">No outstanding receivables</div>`
        : (() => {
          const byClient = {};
          invoiced.forEach(l => {
            if (!byClient[l.clientId]) byClient[l.clientId] = { name: l.clientName, total: 0, count: 0, company: CLIENTS.find(c=>c.id===l.clientId)?.company||'' };
            byClient[l.clientId].total += l.total;
            byClient[l.clientId].count++;
          });
          return `<table class="client-table">
            <thead><tr><th>Client</th><th>Company</th><th>Invoices</th><th>Amount Due</th></tr></thead>
            <tbody>${Object.values(byClient).sort((a,b) => b.total - a.total).map(c => `
              <tr>
                <td style="font-weight:600">${c.name}</td>
                <td><span class="badge" style="background:${c.company==='Rapid'?'var(--navy-lt)':'var(--mag-lt)'};color:${c.company==='Rapid'?'var(--navy)':'var(--magenta)'}">${c.company}</span></td>
                <td>${c.count}</td>
                <td style="font-weight:700;color:var(--navy)">QAR ${fmt(c.total)}</td>
              </tr>`).join('')}
            </tbody>
          </table>`;
        })()
      }
    </div>

    <div class="card">
      <div class="card-hd">
        <span class="card-title">Recent Invoices</span>
        <button class="btn btn-ghost btn-xs" onclick="set({view:'finance'})">View All →</button>
      </div>
      ${(() => {
        migrateInvoices();
        const recent = dbGetInvoices().slice().sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0,5);
        return recent.length === 0
          ? `<div style="text-align:center;padding:20px;color:var(--g500);font-size:12px">No invoices generated yet</div>`
          : recent.map(inv => `
            <div class="row-item">
              <div style="flex:1">
                <div style="display:flex;align-items:center;gap:8px">
                  <span style="font-size:12px;font-weight:700;color:var(--magenta)">${inv.id}</span>
                  <span style="font-size:12px;font-weight:600">${inv.clientName}</span>
                </div>
                <div style="font-size:11px;color:var(--g500);margin-top:1px">${inv.logIds.length} service${inv.logIds.length!==1?'s':''} · ${fmtDate(inv.createdAt)} · by ${inv.createdByName}</div>
              </div>
              <div style="display:flex;align-items:center;gap:8px">
                <span style="font-size:13px;font-weight:700;color:var(--navy)">QAR ${fmt(inv.grandTotal)}</span>
                <button class="btn btn-ghost btn-xs" onclick="set({view:'finance',invoiceId:'${inv.id}'})">View</button>
              </div>
            </div>`).join('');
      })()}
    </div>`;
}

// VIEW: Accounting Manager Dashboard (Arlene)
// ═══════════════════════════════════
function vAcctMgrDashboard() {
  const all = dbGet();
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const prevMonthStart = new Date(now.getFullYear(), now.getMonth() - 1, 1);

  const expensed = all.filter(l => l.status === 'expensed');
  const invoiced = all.filter(l => l.status === 'invoiced');
  const pending = all.filter(l => l.status === 'pending');
  const approved = all.filter(l => l.status === 'approved');
  const rejected = all.filter(l => l.status === 'rejected');
  const totalReceivables = invoiced.reduce((s, l) => s + l.total, 0);
  const totalExpensed = expensed.reduce((s, l) => s + l.total, 0);
  const invoicedThisMonth = invoiced.filter(l => new Date(l.invoicedAt) >= monthStart);
  const invoicedThisMonthTotal = invoicedThisMonth.reduce((s, l) => s + l.total, 0);
  const invoicedPrevMonth = invoiced.filter(l => { const d = new Date(l.invoicedAt); return d >= prevMonthStart && d < monthStart; });
  const invoicedPrevMonthTotal = invoicedPrevMonth.reduce((s, l) => s + l.total, 0);

  // Pipeline counts
  const pipeline = [
    { label: 'With OPs', count: all.filter(l=>l.status==='ops_pending').length, color: '#0369a1', bg: '#e0f2fe' },
    { label: 'AM Completing', count: all.filter(l=>l.status==='am_completing').length, color: 'var(--orange)', bg: 'var(--orange-lt)' },
    { label: 'Pending Approval', count: pending.length, color: 'var(--orange)', bg: 'var(--orange-lt)' },
    { label: 'Approved', count: approved.length, color: 'var(--green)', bg: 'var(--green-lt)' },
    { label: 'Expensed', count: expensed.length, color: 'var(--purple)', bg: 'var(--purple-lt)' },
    { label: 'Invoiced', count: invoiced.length, color: 'var(--navy)', bg: 'var(--navy-lt)' },
    { label: 'Rejected', count: rejected.length, color: 'var(--red)', bg: 'var(--red-lt)' },
  ];

  // Card spending
  const activeCards = all.filter(l => l.status !== 'rejected');
  const cardSpending = CARDS.map(c => {
    const spent = activeCards.filter(l => l.card === c.id).reduce((s, l) => s + l.total, 0);
    const pct = c.limit > 0 ? Math.min(spent / c.limit, 1) : 0;
    return { ...c, spent, pct };
  });

  // Revenue by company
  const rapidRevenue = invoiced.filter(l => CLIENTS.find(c=>c.id===l.clientId)?.company === 'Rapid').reduce((s,l) => s + l.total, 0);
  const rchbsRevenue = invoiced.filter(l => CLIENTS.find(c=>c.id===l.clientId)?.company === 'RCHBS').reduce((s,l) => s + l.total, 0);

  // Aging buckets for receivables
  const agingBuckets = { current: 0, days30: 0, days60: 0, over60: 0 };
  invoiced.forEach(l => {
    const days = Math.floor((now - new Date(l.invoicedAt)) / (1000 * 60 * 60 * 24));
    if (days <= 15) agingBuckets.current += l.total;
    else if (days <= 30) agingBuckets.days30 += l.total;
    else if (days <= 60) agingBuckets.days60 += l.total;
    else agingBuckets.over60 += l.total;
  });

  // Thursday
  const today = now.getDay();
  const isThursday = today === 4;
  const daysToThurs = (4 - today + 7) % 7 || 7;
  const nextThursday = new Date(now);
  nextThursday.setDate(now.getDate() + daysToThurs);

  // Receivables by client
  const clientReceivables = {};
  invoiced.forEach(l => {
    if (!clientReceivables[l.clientId]) {
      const cl = CLIENTS.find(c => c.id === l.clientId);
      clientReceivables[l.clientId] = { name: l.clientName, company: cl?.company || '', limit: cl?.creditLimit || 0, total: 0, count: 0, oldestDays: 0 };
    }
    clientReceivables[l.clientId].total += l.total;
    clientReceivables[l.clientId].count++;
    const days = Math.floor((now - new Date(l.invoicedAt)) / (1000 * 60 * 60 * 24));
    clientReceivables[l.clientId].oldestDays = Math.max(clientReceivables[l.clientId].oldestDays, days);
  });

  return `
    <div style="margin-bottom:18px">
      <div style="font-size:15px;font-weight:700;color:var(--navy)">Accounting Manager Dashboard</div>
      <div style="font-size:12px;color:var(--g500);margin-top:2px">${now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}${isThursday ? ' · <span style="color:var(--magenta);font-weight:600">Invoice Day</span>' : ''}</div>
    </div>

    <div class="stats-row">
      <div class="stat" style="--sc:var(--navy)">
        <div class="stat-lbl">Total Receivables</div>
        <div class="stat-val">QAR ${fmt(totalReceivables)}</div>
        <div class="stat-sub">${invoiced.length} outstanding</div>
      </div>
      <div class="stat" style="--sc:var(--green)">
        <div class="stat-lbl">Invoiced This Month</div>
        <div class="stat-val">QAR ${fmt(invoicedThisMonthTotal)}</div>
        <div class="stat-sub">${invoicedThisMonth.length} invoices · ${invoicedPrevMonthTotal > 0 ? (invoicedThisMonthTotal >= invoicedPrevMonthTotal ? '<span style="color:var(--green)">▲</span>' : '<span style="color:var(--red)">▼</span>') + ' vs last month' : 'first month'}</div>
      </div>
      <div class="stat" style="--sc:var(--purple)">
        <div class="stat-lbl">Pending Invoice</div>
        <div class="stat-val">${expensed.length}</div>
        <div class="stat-sub">QAR ${fmt(totalExpensed)} queued</div>
      </div>
      <div class="stat" style="--sc:var(--orange)">
        <div class="stat-lbl">Needs Attention</div>
        <div class="stat-val">${pending.length + rejected.length}</div>
        <div class="stat-sub">${pending.length} pending · ${rejected.length} rejected</div>
      </div>
    </div>

    ${isThursday ? `
      <div style="background:linear-gradient(135deg,var(--magenta),var(--mag-dk));color:white;border-radius:12px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:14px;font-weight:700">It's Thursday — Invoice Day</div>
          <div style="font-size:12px;opacity:.8;margin-top:2px">${expensed.length} service${expensed.length !== 1 ? 's' : ''} ready · QAR ${fmt(totalExpensed)} total</div>
        </div>
        <button class="btn" style="background:white;color:var(--magenta);font-weight:700" onclick="set({view:'finance'})">Start Invoicing →</button>
      </div>
    ` : ''}

    <div class="card" style="margin-bottom:16px">
      <div class="card-hd"><span class="card-title">Service Pipeline</span></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${pipeline.map(p => `
          <div style="background:${p.bg};border-radius:10px;padding:12px 16px;text-align:center;flex:1;min-width:100px">
            <div style="font-size:22px;font-weight:800;color:${p.color}">${p.count}</div>
            <div style="font-size:10px;color:${p.color};font-weight:600;margin-top:2px">${p.label}</div>
          </div>`).join('')}
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-hd">
          <span class="card-title">Receivables Aging</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
          <div style="background:var(--green-lt);border-radius:8px;padding:12px;text-align:center">
            <div style="font-size:10px;font-weight:600;color:var(--green);margin-bottom:2px">0–15 DAYS</div>
            <div style="font-size:16px;font-weight:800;color:var(--green)">QAR ${fmt(agingBuckets.current)}</div>
          </div>
          <div style="background:var(--orange-lt);border-radius:8px;padding:12px;text-align:center">
            <div style="font-size:10px;font-weight:600;color:var(--orange);margin-bottom:2px">16–30 DAYS</div>
            <div style="font-size:16px;font-weight:800;color:var(--orange)">QAR ${fmt(agingBuckets.days30)}</div>
          </div>
          <div style="background:var(--red-lt);border-radius:8px;padding:12px;text-align:center">
            <div style="font-size:10px;font-weight:600;color:var(--red);margin-bottom:2px">31–60 DAYS</div>
            <div style="font-size:16px;font-weight:800;color:var(--red)">QAR ${fmt(agingBuckets.days60)}</div>
          </div>
          <div style="background:var(--purple-lt);border-radius:8px;padding:12px;text-align:center">
            <div style="font-size:10px;font-weight:600;color:var(--purple);margin-bottom:2px">60+ DAYS</div>
            <div style="font-size:16px;font-weight:800;color:var(--purple)">QAR ${fmt(agingBuckets.over60)}</div>
          </div>
        </div>
        <div style="padding-top:10px;border-top:1px solid var(--g100);display:flex;justify-content:space-between">
          <span style="font-size:11px;font-weight:600;color:var(--g500)">Total outstanding</span>
          <span style="font-size:13px;font-weight:700;color:var(--navy)">QAR ${fmt(totalReceivables)}</span>
        </div>
      </div>

      <div class="card">
        <div class="card-hd">
          <span class="card-title">Revenue by Company</span>
        </div>
        <div style="margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <span style="font-size:12px;font-weight:600;color:var(--navy)">Rapid Clearing House</span>
            <span style="font-size:13px;font-weight:700;color:var(--navy)">QAR ${fmt(rapidRevenue)}</span>
          </div>
          <div style="height:8px;background:var(--g100);border-radius:4px;overflow:hidden">
            <div style="height:100%;width:${totalReceivables > 0 ? Math.round(rapidRevenue/totalReceivables*100) : 0}%;background:var(--navy);border-radius:4px"></div>
          </div>
        </div>
        <div style="margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <span style="font-size:12px;font-weight:600;color:var(--magenta)">RCHBS</span>
            <span style="font-size:13px;font-weight:700;color:var(--magenta)">QAR ${fmt(rchbsRevenue)}</span>
          </div>
          <div style="height:8px;background:var(--g100);border-radius:4px;overflow:hidden">
            <div style="height:100%;width:${totalReceivables > 0 ? Math.round(rchbsRevenue/totalReceivables*100) : 0}%;background:var(--magenta);border-radius:4px"></div>
          </div>
        </div>
        <div style="padding-top:12px;border-top:1px solid var(--g100)">
          <div class="card-hd" style="margin-bottom:10px"><span class="card-title" style="font-size:11px">Card Utilization</span></div>
          ${cardSpending.map(c => `
            <div style="margin-bottom:8px">
              <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
                <span style="color:var(--g700)">${c.label}</span>
                <span style="font-weight:600;color:${c.pct >= 0.9 ? 'var(--red)' : 'var(--g700)'}">${Math.round(c.pct*100)}%</span>
              </div>
              <div style="height:4px;background:var(--g100);border-radius:2px;overflow:hidden">
                <div style="height:100%;width:${Math.round(c.pct*100)}%;background:${c.pct >= 0.9 ? 'var(--red)' : c.pct >= 0.7 ? 'var(--orange)' : 'var(--green)'};border-radius:2px"></div>
              </div>
            </div>`).join('')}
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-hd">
        <span class="card-title">Client Receivables</span>
        <span style="font-size:11px;color:var(--g500)">Outstanding balances by client</span>
      </div>
      ${Object.keys(clientReceivables).length === 0
        ? `<div style="text-align:center;padding:20px;color:var(--g500);font-size:12px">No outstanding receivables</div>`
        : `<table class="client-table">
          <thead><tr><th>Client</th><th>Company</th><th>Credit Limit</th><th>Outstanding</th><th>Utilization</th><th>Oldest</th><th>Status</th></tr></thead>
          <tbody>${Object.values(clientReceivables).sort((a,b) => b.total - a.total).map(c => {
            const utilPct = c.limit > 0 ? Math.min(c.total / c.limit, 1) : 0;
            const statusCls = utilPct >= 1 ? 'b-rejected' : utilPct >= 0.75 ? 'b-pending' : 'b-approved';
            const statusLbl = utilPct >= 1 ? 'Over Limit' : utilPct >= 0.75 ? 'Near Limit' : 'Healthy';
            return `<tr>
              <td style="font-weight:600">${c.name}</td>
              <td><span class="badge" style="background:${c.company==='Rapid'?'var(--navy-lt)':'var(--mag-lt)'};color:${c.company==='Rapid'?'var(--navy)':'var(--magenta)'}">${c.company}</span></td>
              <td>QAR ${fmt(c.limit)}</td>
              <td style="font-weight:700;color:var(--navy)">QAR ${fmt(c.total)} <span style="font-size:10px;font-weight:400;color:var(--g500)">(${c.count})</span></td>
              <td>
                <div style="display:flex;align-items:center;gap:6px">
                  <div class="ar-bar-wrap"><div class="ar-bar-fill" style="width:${Math.round(utilPct*100)}%;--bc:${utilPct>=1?'var(--red)':utilPct>=0.75?'var(--orange)':'var(--green)'}"></div></div>
                  <span style="font-size:10px;font-weight:600">${Math.round(utilPct*100)}%</span>
                </div>
              </td>
              <td style="font-size:11px;color:${c.oldestDays > 30 ? 'var(--red)' : 'var(--g700)'}">${c.oldestDays}d</td>
              <td><span class="badge ${statusCls}">${statusLbl}</span></td>
            </tr>`;
          }).join('')}
          </tbody>
        </table>`
      }
    </div>

    <div class="card">
      <div class="card-hd">
        <span class="card-title">Recent Activity</span>
        <button class="btn btn-ghost btn-xs" onclick="set({view:'finance'})">Invoice Queue →</button>

}

const SVC_CUSTOM_KEY = 'rch_services_custom_v1';
function loadCustomServices() { try { return JSON.parse(localStorage.getItem(SVC_CUSTOM_KEY)||'[]'); } catch(e) { return []; } }
function saveCustomService(svc) {
  const custom = loadCustomServices();
  const idx = custom.findIndex(c=>c.id===svc.id);
  if (idx !== -1) custom[idx] = svc; else custom.push(svc);
  localStorage.setItem(SVC_CUSTOM_KEY, JSON.stringify(custom));
}
function deleteCustomService(id) {
  const custom = loadCustomServices().map(c=>c.id===id ? {...c,deleted:true} : c);
  localStorage.setItem(SVC_CUSTOM_KEY, JSON.stringify(custom));
}
function getEffectiveServices() {
  const custom = loadCustomServices();
  const customMap = {};
  custom.forEach(c => { customMap[c.id] = c; });
  // Start with base, apply overrides, filter deleted
  const base = SERVICES.map(s => customMap[s.id] ? {...s,...customMap[s.id]} : s).filter(s => !s.deleted);
  // Add custom-only services (not in base)
  const baseIds = new Set(SERVICES.map(s=>s.id));
  custom.filter(c=>!baseIds.has(c.id)&&!c.deleted).forEach(c => base.push(c));
  return base;
}

          </table>

function getNav(type) {
  const counts = (() => {
    const logs = dbGet();
    return {
      ops_pending: logs.filter(l=>l.status==='ops_pending').length,
      am_completing: logs.filter(l=>l.status==='am_completing').length,
      pending: logs.filter(l=>l.status==='pending').length,
      approved: logs.filter(l=>l.status==='approved').length,
      expensed: logs.filter(l=>l.status==='expensed').length,
    };
  })();

  const item = (view, icon, label, badge) =>
    `<div class="nav-item ${S.view===view?'active':''}" onclick="set({view:'${view}',invoiceId:null})">
      <span class="nav-icon">${icon}</span><span>${label}</span>
      ${badge ? `<span class="nav-badge">${badge}</span>` : ''}
    </div>`;

  const defs = {
    am: [
      item('dashboard','◈','Dashboard',''),
      item('clients','👥','Clients',''),
      item('log','⊕','New Service',''),
      item('submissions','📋','My Submissions',''),
    ],
    tl: [
      item('dashboard','◈','Dashboard',''),
      item('clients','👥','Clients',''),
      item('log','⊕','New Service',''),
      item('approvals','✓','Approval Queue', counts.pending||''),
      item('submissions','📋','All Submissions',''),
      item('services_catalog','📖','Service Catalog',''),
      item('price_list','💲','Price List',''),
    ],
    expense: [
      item('expense','💰','Expense Tracker', counts.approved||''),
    ],
    accountant: [
      item('dashboard','◈','Dashboard',''),
      item('finance','🧾','Invoice Queue', counts.expensed||''),
      item('submissions','📋','All Submissions',''),
      item('price_list','💲','Price List',''),
    ],
    acct_mgr: [
      item('dashboard','◈','Dashboard',''),
      item('clients','👥','Clients',''),
      item('finance','🧾','Invoice Queue', counts.expensed||''),
      item('submissions','📋','All Submissions',''),
      item('price_list','💲','Price List',''),
    ],
    cfo: [
      item('cfo','📊','Overview',''),
      item('clients','👥','Clients',''),
      item('price_list','💲','Price List',''),
    ],
  };
  return (defs[type]||[]).join('');
}

function getViewTitle() {
  const map = {dashboard:'Dashboard',clients:'Clients',log:'New Service',complete_service:'Complete Service',submissions:'Submissions',approvals:'Approval Queue',expense:'Expense Tracker',finance:'Invoice Queue',cfo:'Management',services_catalog:'Service Catalog',price_list:'Price List'};
  if (S.invoiceId) return 'Invoice Preview';
  return map[S.view]||'Dashboard';
}

function renderView() {
  const t = S.user?.type;
  if (S.view==='dashboard'  && (t==='am'||t==='tl'))              return vDashboardAM();
  if (S.view==='dashboard'  && t==='accountant')                  return vAccountantDashboard();
  if (S.view==='dashboard'  && t==='acct_mgr')                   return vAcctMgrDashboard();
  if (S.view==='clients'    && (t==='am'||t==='tl'||t==='acct_mgr'||t==='cfo')) return vClients();
  if (S.view==='log')                                             return vLogService();
  if (S.view==='complete_service')                                  return vCompleteService();
  if (S.view==='submissions')                                     return vSubmissions();
  if (S.view==='approvals'  && t==='tl')                          return vApprovals();
  if (S.view==='expense'    && t==='expense')                     return vExpense();
  if (S.view==='finance'    && (t==='accountant'||t==='acct_mgr')) return vFinance();
  if (S.view==='cfo'        && t==='cfo')                         return vCFO();
  if (S.view==='services_catalog' && t==='tl')                    return vServiceCatalog();
  if (S.view==='price_list')                                      return vPriceList();
  // Default landing per type
  if (t==='expense')    return vExpense();
  if (t==='accountant') return vAccountantDashboard();
  if (t==='acct_mgr')   return vAcctMgrDashboard();
  if (t==='cfo')        return vCFO();
  return vDashboardAM();
}
