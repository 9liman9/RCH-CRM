<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCH CRM — Finance Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy:        #1B2D5E;
  --navy-dark:   #131f43;
  --navy-mid:    #243771;
  --navy-light:  #e8ecf5;
  --magenta:     #C4006A;
  --magenta-dk:  #9c0054;
  --magenta-lt:  #fce8f3;
  --green:       #1a7a4a;
  --green-lt:    #e6f4ed;
  --orange:      #d05a00;
  --orange-lt:   #fff3e6;
  --red:         #c0272d;
  --red-lt:      #fdeaea;
  --bg:          #f2f4f8;
  --white:       #ffffff;
  --border:      #e3e7f0;
  --gray50:      #f8f9fc;
  --gray100:     #f0f2f7;
  --gray300:     #d4d9e8;
  --gray500:     #8a93b0;
  --gray700:     #4a5170;
  --gray900:     #1a1f36;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--gray900); -webkit-font-smoothing: antialiased; }

/* ── Layout ── */
.app { display: flex; height: 100vh; overflow: hidden; }

/* ── Sidebar ── */
.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--navy);
  display: flex; flex-direction: column;
  border-right: 1px solid rgba(255,255,255,0.06);
}
.sidebar-brand {
  padding: 22px 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; gap: 11px;
}
.brand-logo {
  display: flex; align-items: center; gap: 9px;
}
.brand-logo svg { width: 32px; height: 32px; flex-shrink: 0; }
.brand-wordmark {
  display: flex; flex-direction: column;
}
.brand-rch {
  font-size: 20px; font-weight: 800; color: white;
  letter-spacing: -0.5px; line-height: 1;
}
.brand-sub {
  font-size: 9px; font-weight: 500; color: rgba(255,255,255,0.38);
  letter-spacing: 1.2px; text-transform: uppercase; margin-top: 2px;
}

.sidebar-nav { padding: 12px 10px; flex: 1; overflow-y: auto; }
.nav-section {
  font-size: 9px; font-weight: 600; color: rgba(255,255,255,0.3);
  letter-spacing: 1.2px; text-transform: uppercase;
  padding: 14px 10px 6px;
}
.nav-section:first-child { padding-top: 4px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 7px;
  cursor: pointer; color: rgba(255,255,255,0.5);
  font-size: 13px; font-weight: 500; margin-bottom: 1px;
  transition: background 0.14s, color 0.14s;
  position: relative;
}
.nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.8); }
.nav-item.active {
  background: rgba(196,0,106,0.18);
  color: #f0a0cc;
  font-weight: 600;
}
.nav-item.active::before {
  content: '';
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 18px; background: var(--magenta);
  border-radius: 0 2px 2px 0;
}
.nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
.nav-badge {
  margin-left: auto; background: var(--magenta); color: white;
  font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px;
}

.sidebar-footer {
  padding: 14px 18px; border-top: 1px solid rgba(255,255,255,0.08);
}
.user-row { display: flex; align-items: center; gap: 10px; }
.user-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, var(--magenta) 0%, var(--magenta-dk) 100%);
  color: white; font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.user-name { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.85); }
.user-role { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 1px; }

/* ── Main area ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

.topbar {
  background: white; border-bottom: 1px solid var(--border);
  padding: 0 28px; height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.topbar-left { display: flex; flex-direction: column; }
.topbar-title { font-size: 16px; font-weight: 700; color: var(--navy); }
.topbar-sub { font-size: 11px; color: var(--gray500); margin-top: 1px; }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 12px; border-radius: 20px;
  font-size: 11px; font-weight: 600;
}
.chip-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

.content { flex: 1; overflow-y: auto; padding: 24px 28px; }
.content::-webkit-scrollbar { width: 5px; }
.content::-webkit-scrollbar-thumb { background: var(--gray300); border-radius: 3px; }

/* ── Section heading ── */
.section-title {
  font-size: 11px; font-weight: 700; color: var(--gray500);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;
}

/* ── Stat cards ── */
.stats-row { display: flex; gap: 14px; margin-bottom: 22px; }
.stat-card {
  background: white; border-radius: 12px;
  padding: 18px 20px 16px;
  box-shadow: 0 1px 3px rgba(27,45,94,0.07), 0 0 0 1px rgba(27,45,94,0.05);
  flex: 1; min-width: 140px; position: relative; overflow: hidden;
}
.stat-card::after {
  content: ''; position: absolute;
  top: 0; left: 0; width: 4px; height: 100%;
  background: var(--stat-color, var(--navy));
  border-radius: 12px 0 0 12px;
}
.stat-label { font-size: 10px; font-weight: 600; color: var(--gray500); text-transform: uppercase; letter-spacing: 0.6px; }
.stat-value { font-size: 26px; font-weight: 800; color: var(--stat-color, var(--navy)); margin-top: 5px; line-height: 1; }
.stat-sub { font-size: 11px; color: var(--gray500); margin-top: 4px; }

/* ── Cards ── */
.card {
  background: white; border-radius: 12px;
  box-shadow: 0 1px 3px rgba(27,45,94,0.07), 0 0 0 1px rgba(27,45,94,0.05);
  padding: 20px;
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.card-title { font-size: 13px; font-weight: 700; color: var(--navy); }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-sidebar { display: grid; grid-template-columns: 200px 1fr; gap: 16px; }

/* ── Row items ── */
.row-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 0; border-bottom: 1px solid var(--gray100);
}
.row-item:last-child { border-bottom: none; }

/* ── Badge / Pill ── */
.badge {
  display: inline-block; font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 4px;
  margin-left: 5px; vertical-align: middle;
}
.tag {
  display: inline-flex; align-items: center;
  font-size: 10px; font-weight: 600;
  padding: 2px 7px; border-radius: 4px;
}

/* ── Progress bar ── */
.prog-wrap { background: var(--gray100); border-radius: 4px; height: 6px; width: 100%; overflow: hidden; margin: 4px 0; }
.prog-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }

/* ── Alert box ── */
.alert {
  border-radius: 10px; padding: 12px 16px; font-size: 12px;
  margin-bottom: 18px; display: flex; align-items: flex-start; gap: 10px;
  border: 1px solid transparent;
}
.alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.alert-warn { background: var(--orange-lt); border-color: #f0a060; }
.alert-ok   { background: var(--green-lt);  border-color: #5dbf8a; }

/* ── Buttons ── */
.btn {
  border: none; padding: 9px 18px; border-radius: 8px;
  font-weight: 600; cursor: pointer; font-size: 13px;
  font-family: inherit; transition: all 0.14s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn:hover { filter: brightness(1.08); }
.btn:active { filter: brightness(0.96); }
.btn:disabled { opacity: 0.4; cursor: default; pointer-events: none; }
.btn-primary   { background: var(--magenta); color: white; }
.btn-navy      { background: var(--navy); color: white; }
.btn-ghost     { background: var(--gray100); color: var(--gray700); border: 1px solid var(--border); }
.btn-outline-green { background: white; color: var(--green); border: 1px solid var(--green); }
.btn-sm { padding: 5px 12px; font-size: 11px; border-radius: 6px; }

/* ── Service item (checkbox list) ── */
.svc-item {
  display: flex; align-items: center; gap: 11px;
  padding: 10px 12px; border-radius: 8px; margin-bottom: 4px;
  cursor: pointer; border: 1.5px solid var(--border);
  transition: border-color 0.14s, background 0.14s;
}
.svc-item:hover { border-color: var(--gray300); background: var(--gray50); }
.svc-item.selected { border-color: var(--magenta); background: var(--magenta-lt); }
.svc-check {
  width: 18px; height: 18px; border-radius: 4px;
  border: 2px solid var(--gray300); display: flex;
  align-items: center; justify-content: center;
  font-size: 11px; color: white; flex-shrink: 0;
  transition: all 0.14s;
}
.svc-item.selected .svc-check { background: var(--magenta); border-color: var(--magenta); }

/* ── Client list ── */
.client-list-item {
  padding: 9px 12px; border-radius: 7px; cursor: pointer;
  margin-bottom: 2px; transition: background 0.1s, color 0.1s;
}
.client-list-item:hover { background: var(--navy-light); }
.client-list-item.active { background: var(--navy); color: white; }

/* ── Invoice preview ── */
.invoice-preview {
  background: white; border-radius: 12px;
  padding: 32px; max-width: 680px;
  box-shadow: 0 2px 16px rgba(27,45,94,0.1), 0 0 0 1px rgba(27,45,94,0.07);
}
.invoice-preview table { width: 100%; border-collapse: collapse; font-size: 12px; }
.invoice-preview th {
  text-align: left; padding: 8px 6px; color: var(--navy);
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.5px; border-bottom: 2px solid var(--navy);
}
.invoice-preview th:not(:first-child) { text-align: right; }
.invoice-preview td { padding: 8px 6px; border-bottom: 1px solid var(--gray100); vertical-align: top; }
.invoice-preview td:not(:first-child) { text-align: right; }
.invoice-preview tfoot td { border-top: 2px solid var(--navy); font-weight: 700; padding: 10px 6px; }

/* ── AM Step Wizard ── */
.stepper { display: flex; align-items: flex-start; gap: 0; margin-bottom: 24px; }
.step { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
.step:not(:last-child)::after {
  content: ''; position: absolute;
  top: 14px; left: 50%; width: 100%; height: 2px;
  background: var(--gray300);
}
.step.done::after, .step.active::after { background: var(--magenta); }
.step-circle {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; z-index: 1;
  background: var(--gray300); color: var(--gray500);
  transition: all 0.25s;
}
.step.done .step-circle  { background: var(--magenta); color: white; }
.step.active .step-circle { background: var(--navy); color: white; box-shadow: 0 0 0 4px var(--navy-light); }
.step-label { font-size: 9px; margin-top: 5px; text-align: center; color: var(--gray500); font-weight: 500; }
.step.active .step-label  { color: var(--navy); font-weight: 700; }
.step.done .step-label    { color: var(--magenta); }

.form-field { margin-bottom: 13px; }
.form-label { font-size: 10px; color: var(--gray500); font-weight: 700; display: block; margin-bottom: 5px; letter-spacing: 0.5px; text-transform: uppercase; }
.form-input {
  padding: 9px 13px; border: 1.5px solid var(--border);
  border-radius: 8px; background: var(--gray50);
  font-size: 13px; width: 100%; font-family: inherit; color: var(--gray900);
  transition: border-color 0.14s;
}
.form-input:focus { outline: none; border-color: var(--magenta); background: white; }
.form-seg { display: flex; gap: 0; border-radius: 8px; overflow: hidden; border: 1.5px solid var(--border); }
.seg-opt {
  flex: 1; text-align: center; padding: 9px; font-size: 13px; font-weight: 500;
  cursor: pointer; color: var(--gray500); background: var(--gray50); transition: all 0.14s;
}
.seg-opt.active { background: var(--navy); color: white; font-weight: 700; }

/* ── Schedule ── */
.schedule-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px; border-radius: 9px; margin-bottom: 7px;
  border: 1px solid var(--border); background: white;
}
.schedule-item.overdue { background: var(--orange-lt); border-color: #f0a060; }
.schedule-item.upcoming { background: var(--gray50); }

/* ── Animations ── */
.fade-in { animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }

/* ── Scrollbar in sidebar ── */
.sidebar-nav::-webkit-scrollbar { width: 3px; }
.sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius:2px; }

/* ── Divider ── */
.divider { height: 1px; background: var(--border); margin: 14px 0; }
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
const CLIENTS = [
  { id:1, name:"ABB Qatar",              company:"Rapid", type:"per-job",  balance:48500, limit:80000,  contact:"Sarah Al-Mansour", email:"sarah@abb.qa" },
  { id:2, name:"Acrogym Sport Center",   company:"Rapid", type:"per-job",  balance:3200,  limit:20000,  contact:"Kirill Bazhanov",  email:"info@acrogym.qa" },
  { id:3, name:"Seaquest Services",      company:"RCHBS", type:"retainer", balance:12310, limit:50000,  contact:"Ahmad Siregar",    email:"accounts@seaquest.qa" },
  { id:4, name:"EY Qatar",              company:"Rapid", type:"per-job",  balance:95000, limit:150000, contact:"Finance Dept",     email:"invoices@ey.qa", costCode:true },
  { id:5, name:"Hitachi Energy",         company:"Rapid", type:"per-job",  balance:22000, limit:60000,  contact:"HR Dept",          email:"hr@hitachi.qa", costCode:true },
  { id:6, name:"Property Finder Qatar", company:"RCHBS", type:"per-job",  balance:8400,  limit:30000,  contact:"Ops Team",         email:"ops@pf.qa" },
];
const QUEUE = [
  { id:101, client:"ABB Qatar",             company:"Rapid", service:"QID Renewal",         person:"Mohammed Al-Thani",  date:"02 Mar 2026", govtFee:1220, profFee:350,  card:"Rapid CC-1" },
  { id:102, client:"ABB Qatar",             company:"Rapid", service:"QID Renewal",         person:"James Wilson",       date:"02 Mar 2026", govtFee:1220, profFee:350,  card:"Rapid CC-1" },
  { id:103, client:"ABB Qatar",             company:"Rapid", service:"Work Visa",            person:"Chen Wei",           date:"03 Mar 2026", govtFee:300,  profFee:350,  card:"Rapid CC-2" },
  { id:104, client:"Seaquest Services",     company:"RCHBS", service:"QID Renewal",         person:"Thu Maung",          date:"01 Mar 2026", govtFee:1220, profFee:0,    card:"RCHBS CC" },
  { id:105, client:"Seaquest Services",     company:"RCHBS", service:"QID Renewal",         person:"Moe Zawoo",          date:"01 Mar 2026", govtFee:1220, profFee:0,    card:"RCHBS CC" },
  { id:106, client:"Seaquest Services",     company:"RCHBS", service:"HC Issuance",         person:"Femidia Saputra",    date:"03 Mar 2026", govtFee:100,  profFee:0,    card:"Himyan-1" },
  { id:107, client:"EY Qatar",             company:"Rapid", service:"Company Reg Renewal",  person:"—",                 date:"28 Feb 2026", govtFee:2500, profFee:1000, card:"Rapid CC-3" },
  { id:108, client:"Property Finder Qatar",company:"RCHBS", service:"Gate Passes",          person:"Ali Hassan",         date:"03 Mar 2026", govtFee:200,  profFee:350,  card:"Himyan-2" },
  { id:109, client:"Property Finder Qatar",company:"RCHBS", service:"Gate Passes",          person:"Omar Khalid",        date:"03 Mar 2026", govtFee:200,  profFee:350,  card:"Himyan-2" },
  { id:110, client:"Acrogym Sport Center",  company:"Rapid", service:"Smart ID Issuance",   person:"Kristina Bazhanova", date:"04 Mar 2026", govtFee:200,  profFee:700,  card:"Rapid CC-1" },
];
const INVOICES = [
  { id:"INV/RCH/8245",  client:"ABB Qatar",             amount:15400, date:"27 Feb", due:"06 Mar", status:"sent",    age:6  },
  { id:"INV/RCHBS/9501",client:"Seaquest Services",     amount:12310, date:"20 Feb", due:"27 Feb", status:"overdue", age:13 },
  { id:"INV/RCH/8240",  client:"Hitachi Energy",        amount:8200,  date:"13 Feb", due:"20 Feb", status:"overdue", age:20 },
  { id:"INV/RCH/8238",  client:"EY Qatar",             amount:32000, date:"06 Feb", due:"13 Feb", status:"overdue", age:27 },
  { id:"INV/RCHBS/9495",client:"Property Finder Qatar", amount:4200,  date:"20 Feb", due:"27 Feb", status:"paid",    age:0  },
];
const CARDS = [
  { name:"Rapid CC-1 (xxx1001)", company:"Rapid", type:"Credit", spent:34200, limit:50000 },
  { name:"Rapid CC-2 (xxx3139)", company:"Rapid", type:"Credit", spent:22800, limit:50000 },
  { name:"Rapid CC-3 (xxx5427)", company:"Rapid", type:"Credit", spent:8900,  limit:50000 },
  { name:"RCHBS CC (xxx5958)",   company:"RCHBS", type:"Credit", spent:41200, limit:50000 },
  { name:"Himyan-1 (xxx8427)",   company:"RCHBS", type:"Himyan", spent:3200,  limit:5000  },
  { name:"Himyan-2 (xxx7612)",   company:"RCHBS", type:"Himyan", spent:4100,  limit:5000  },
  { name:"Himyan-3 (xxx9034)",   company:"RCHBS", type:"Himyan", spent:1800,  limit:5000  },
];
const SCHEDULED = [
  { client:"Seaquest Services",     type:"Retainer",           amount:8500,  due:"15 Mar 2026", status:"upcoming" },
  { client:"ABB Qatar",             type:"Annual Sponsorship",  amount:12000, due:"20 Mar 2026", status:"upcoming" },
  { client:"EY Qatar",             type:"Monthly Accounting",  amount:5000,  due:"01 Mar 2026", status:"overdue"  },
  { client:"Hitachi Energy",        type:"Retainer",           amount:6000,  due:"10 Mar 2026", status:"upcoming" },
  { client:"Property Finder Qatar", type:"Retainer",           amount:3500,  due:"28 Feb 2026", status:"overdue"  },
];

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
let state = { view:'dashboard', selClient:null, selServices:[], showInvoice:false, created:false, amStep:0 };
function setState(patch) { Object.assign(state, patch); render(); }
function fmt(n) { return n.toLocaleString(); }

function badge(text, bg, fg) {
  return `<span class="badge" style="background:${bg};color:${fg||bg}">${text}</span>`;
}
function tagCo(co) {
  return co === 'Rapid'
    ? `<span class="tag" style="background:var(--navy-light);color:var(--navy)">${co}</span>`
    : `<span class="tag" style="background:var(--magenta-lt);color:var(--magenta)">${co}</span>`;
}
function tagStatus(status, age) {
  if (status === 'paid')    return `<span class="tag" style="background:var(--green-lt);color:var(--green)">Paid</span>`;
  if (status === 'overdue') return `<span class="tag" style="background:var(--red-lt);color:var(--red)">${age}d overdue</span>`;
  return `<span class="tag" style="background:var(--orange-lt);color:var(--orange)">Awaiting</span>`;
}
function progBar(val, max, color) {
  const pct = Math.min(val / max * 100, 100);
  const c = pct > 90 ? 'var(--red)' : pct > 75 ? 'var(--orange)' : color;
  return `<div class="prog-wrap"><div class="prog-fill" style="width:${pct}%;background:${c}"></div></div>`;
}
function clientGroups() {
  return [...new Set(QUEUE.map(s => s.client))].sort((a, b) => {
    const aT = QUEUE.filter(s => s.client === a).reduce((x, s) => x + s.govtFee, 0);
    const bT = QUEUE.filter(s => s.client === b).reduce((x, s) => x + s.govtFee, 0);
    return bT - aT;
  });
}

// ═══════════════════════════════════════════
// VIEW: DASHBOARD
// ═══════════════════════════════════════════
function viewDashboard() {
  const totalU  = QUEUE.reduce((s, x) => s + x.govtFee + x.profFee, 0);
  const totalO  = INVOICES.filter(i => i.status === 'overdue').reduce((s, i) => s + i.amount, 0);
  const overdue20 = INVOICES.filter(i => i.status === 'overdue' && i.age >= 20);
  const grp = clientGroups();

  let html = `<div class="stats-row">
    <div class="stat-card" style="--stat-color:var(--navy)">
      <div class="stat-label">Uninvoiced Services</div>
      <div class="stat-value">${QUEUE.length}</div>
      <div class="stat-sub">QAR ${fmt(totalU)} pending</div>
    </div>
    <div class="stat-card" style="--stat-color:var(--red)">
      <div class="stat-label">Overdue Invoices</div>
      <div class="stat-value">${INVOICES.filter(i => i.status === 'overdue').length}</div>
      <div class="stat-sub">QAR ${fmt(totalO)} outstanding</div>
    </div>
    <div class="stat-card" style="--stat-color:var(--orange)">
      <div class="stat-label">Awaiting Payment</div>
      <div class="stat-value">${INVOICES.filter(i => i.status === 'sent').length}</div>
      <div class="stat-sub">Sent, not yet received</div>
    </div>
    <div class="stat-card" style="--stat-color:var(--magenta)">
      <div class="stat-label">Active Clients</div>
      <div class="stat-value">${grp.length}</div>
      <div class="stat-sub">With verified services</div>
    </div>
