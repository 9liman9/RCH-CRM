<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCH CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy:      #1B2D5E;
  --navy-dk:   #131f43;
  --navy-lt:   #e8ecf5;
  --magenta:   #C4006A;
  --mag-dk:    #9c0054;
  --mag-lt:    #fce8f3;
  --green:     #1a7a4a;
  --green-lt:  #e6f4ed;
  --orange:    #c97000;
  --orange-lt: #fff3e6;
  --red:       #c0272d;
  --red-lt:    #fdeaea;
  --purple:    #5c3d9e;
  --purple-lt: #ece8f7;
  --bg:        #f2f4f8;
  --white:     #ffffff;
  --border:    #e3e7f0;
  --g50:       #f8f9fc;
  --g100:      #f0f2f7;
  --g300:      #d4d9e8;
  --g500:      #8a93b0;
  --g700:      #4a5170;
  --g900:      #1a1f36;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--g900);-webkit-font-smoothing:antialiased}

/* ── Login ── */
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-dk) 100%);padding:20px}
.login-box{width:100%;max-width:440px}
.login-hd{text-align:center;margin-bottom:40px}
.login-logo{display:inline-flex;align-items:center;gap:12px;margin-bottom:18px}
.login-form{background:white;border-radius:16px;padding:32px;box-shadow:0 24px 60px rgba(0,0,0,.18)}
.login-form h2{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:22px;text-align:center}
.login-hint{font-size:11px;color:var(--g500);margin-top:18px;padding-top:16px;border-top:1px solid var(--border);text-align:center}
.login-err{color:var(--red);font-size:12px;margin-top:6px;font-weight:500}

/* ── Layout ── */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:var(--navy);display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.06)}
.sb-brand{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:9px}
.brand-rch{font-size:20px;font-weight:800;color:white;letter-spacing:-.5px;line-height:1}
.brand-sub{font-size:9px;font-weight:500;color:rgba(255,255,255,.35);letter-spacing:1.2px;text-transform:uppercase;margin-top:2px}
.sb-nav{padding:10px 8px;flex:1;overflow-y:auto}
.nav-section{font-size:9px;font-weight:700;color:rgba(255,255,255,.25);letter-spacing:1px;text-transform:uppercase;padding:12px 12px 5px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:7px;cursor:pointer;color:rgba(255,255,255,.5);font-size:13px;font-weight:500;margin-bottom:1px;transition:background .14s,color .14s;position:relative}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.8)}
.nav-item.active{background:rgba(196,0,106,.18);color:#f0a0cc;font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--magenta);border-radius:0 2px 2px 0}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--magenta);color:white;font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px}
.sb-footer{padding:14px 16px;border-top:1px solid rgba(255,255,255,.08)}
.user-row{display:flex;align-items:center;gap:9px}
.u-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--magenta),var(--mag-dk));color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.u-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.85)}
.u-role{font-size:10px;color:rgba(255,255,255,.32);margin-top:1px}
.logout-btn{margin-top:8px;width:100%;padding:6px;background:rgba(255,255,255,.09);border:none;border-radius:5px;color:rgba(255,255,255,.65);font-size:11px;cursor:pointer;transition:all .14s}
.logout-btn:hover{background:rgba(255,255,255,.15);color:white}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:white;border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-title{font-size:15px;font-weight:700;color:var(--navy)}
.tb-sub{font-size:11px;color:var(--g500);margin-top:1px}
.content{flex:1;overflow-y:auto;padding:22px 28px}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--g300);border-radius:3px}

/* ── Components ── */
.card{background:white;border-radius:12px;box-shadow:0 1px 3px rgba(27,45,94,.07),0 0 0 1px rgba(27,45,94,.05);padding:20px;margin-bottom:16px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:13px;font-weight:700;color:var(--navy)}

.stats-row{display:flex;gap:14px;margin-bottom:20px}
.stat{background:white;border-radius:12px;padding:16px 18px;box-shadow:0 1px 3px rgba(27,45,94,.07),0 0 0 1px rgba(27,45,94,.05);flex:1;position:relative;overflow:hidden}
.stat::after{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--sc,var(--navy));border-radius:12px 0 0 12px}
.stat-lbl{font-size:10px;font-weight:600;color:var(--g500);text-transform:uppercase;letter-spacing:.6px}
.stat-val{font-size:24px;font-weight:800;color:var(--sc,var(--navy));margin-top:4px;line-height:1}
.stat-sub{font-size:10px;color:var(--g500);margin-top:3px}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

.btn{border:none;padding:8px 16px;border-radius:8px;font-weight:600;cursor:pointer;font-size:13px;font-family:inherit;transition:all .14s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{filter:brightness(1.08)}
.btn:disabled{opacity:.35;cursor:not-allowed;filter:none}
.btn-primary{background:var(--magenta);color:white}
.btn-navy{background:var(--navy);color:white}
.btn-success{background:var(--green);color:white}
.btn-danger{background:var(--red);color:white}
.btn-ghost{background:var(--g100);color:var(--g700);border:1px solid var(--border)}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:6px}
.btn-xs{padding:3px 9px;font-size:10px;border-radius:5px}

.form-group{margin-bottom:15px}
.form-label{font-size:10px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px}
.form-input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--g50);font-size:13px;font-family:inherit;color:var(--g900);transition:border-color .14s}
.form-input:focus{outline:none;border-color:var(--magenta);background:white}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.row-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--g100)}
.row-item:last-child{border-bottom:none}

/* Status badges */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;letter-spacing:.2px}
.b-pending{background:var(--orange-lt);color:var(--orange)}
.b-approved{background:var(--green-lt);color:var(--green)}
.b-rejected{background:var(--red-lt);color:var(--red)}
.b-expensed{background:var(--purple-lt);color:var(--purple)}
.b-invoiced{background:var(--navy-lt);color:var(--navy)}
.b-ops{background:#e0f2fe;color:#0369a1}

/* Stepper */
.stepper{display:flex;align-items:flex-start;margin-bottom:22px}
.step{flex:1;display:flex;flex-direction:column;align-items:center;position:relative}
.step:not(:last-child)::after{content:'';position:absolute;top:13px;left:50%;width:100%;height:2px;background:var(--g300)}
.step.done::after,.step.active::after{background:var(--magenta)}
.step-circle{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;z-index:1;background:var(--g300);color:var(--g500);transition:all .25s}
.step.done .step-circle{background:var(--magenta);color:white}
.step.active .step-circle{background:var(--navy);color:white;box-shadow:0 0 0 4px var(--navy-lt)}
.step-lbl{font-size:9px;margin-top:4px;text-align:center;color:var(--g500);font-weight:500}
.step.active .step-lbl{color:var(--navy);font-weight:700}
.step.done .step-lbl{color:var(--magenta)}

/* Log entry card */
.log-card{border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;background:white;transition:border-color .15s}
.log-card:hover{border-color:var(--g300)}
.log-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.log-card-actions{display:flex;gap:6px;flex-shrink:0}
.log-meta{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.log-meta-item{font-size:11px;color:var(--g500);display:flex;align-items:center;gap:4px}

/* Invoice */
.invoice-box{border:2px solid var(--border);border-radius:12px;padding:24px;max-width:640px;margin:0 auto}
.invoice-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
.invoice-table{width:100%;border-collapse:collapse;margin:16px 0}
.invoice-table th{text-align:left;font-size:10px;font-weight:700;color:var(--g500);text-transform:uppercase;padding:6px 10px;border-bottom:2px solid var(--border)}
.invoice-table td{padding:9px 10px;font-size:12px;border-bottom:1px solid var(--g100)}
.invoice-total{text-align:right;margin-top:12px}

.fade{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* Pipeline strip */
.pipeline{display:flex;gap:0;margin-bottom:22px;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.pipe-step{flex:1;padding:10px 6px;text-align:center;font-size:10px;font-weight:600;background:var(--g100);color:var(--g500);border-right:1px solid var(--border);transition:all .2s}
.pipe-step:last-child{border-right:none}
.pipe-step.done{background:var(--green-lt);color:var(--green)}
.pipe-step.current{background:var(--navy);color:white}
.pipe-step-num{font-size:14px;font-weight:800;display:block;margin-bottom:2px}

.empty-state{text-align:center;padding:48px 20px;color:var(--g500)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-txt{font-size:14px;font-weight:600;margin-bottom:4px}
.empty-sub{font-size:12px}

/* ── AM Dashboard Kanban ── */
.kanban-wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:4px}
.kanban-col{background:var(--g50);border-radius:12px;border:1px solid var(--border);padding:12px;min-height:220px;display:flex;flex-direction:column}
.kanban-col-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.kanban-col-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.kanban-count{font-size:10px;font-weight:700;background:var(--g300);color:var(--g700);border-radius:10px;padding:1px 7px}
.k-card{background:white;border-radius:8px;border:1px solid var(--border);padding:10px 12px;margin-bottom:8px;border-left:3px solid var(--kc,var(--border));box-shadow:0 1px 2px rgba(27,45,94,.05)}
.k-card:last-child{margin-bottom:0}
.k-card-client{font-size:12px;font-weight:700;color:var(--g900);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.k-card-svc{font-size:10px;color:var(--g500);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.k-card-footer{display:flex;justify-content:space-between;align-items:center}
.k-card-date{font-size:10px;color:var(--g500)}
.k-card-amt{font-size:11px;font-weight:700;color:var(--navy)}
/* AM Client Table */
.client-table{width:100%;border-collapse:collapse}
.client-table th{text-align:left;font-size:10px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.5px;padding:7px 12px;border-bottom:2px solid var(--border)}
.client-table td{padding:10px 12px;font-size:12px;border-bottom:1px solid var(--g100);vertical-align:middle}
.client-table tr:last-child td{border-bottom:none}
.client-table tr:hover td{background:var(--g50)}
.ar-bar-wrap{width:80px;height:5px;background:var(--g100);border-radius:3px;display:inline-block;vertical-align:middle;margin-right:6px}
.ar-bar-fill{height:100%;border-radius:3px;background:var(--bc,var(--green))}
</style>
</head>

function dbLoad() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function dbSave(logs) {
  localStorage.setItem(DB_KEY, JSON.stringify(logs));
}

function dbGet() {
  let logs = dbLoad();
  if (!logs) { logs = SEED; dbSave(logs); }
  return logs;
}

function dbUpdate(id, patch) {
  const logs = dbGet();
  const idx = logs.findIndex(l => l.id === id);
  if (idx !== -1) { Object.assign(logs[idx], patch); dbSave(logs); }
  return logs;
}

function dbAdd(log) {
  const logs = dbGet();
  logs.unshift(log);
  dbSave(logs);
}

function dbReset() {
  localStorage.removeItem(DB_KEY);
  clientsReset();
  CLIENTS = clientsGet();
}

const fmt = n => Number(n).toLocaleString();
const fmtDate = iso => { const d = new Date(iso); return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); };
const fmtDT = iso => { const d = new Date(iso); return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); };
const uid = () => 'LOG-'+String(dbGet().length+1).padStart(3,'0')+'-'+Date.now().toString(36).slice(-4).toUpperCase();
const statusBadge = s => {
  const map = {ops_pending:'b-ops',pending:'b-pending',approved:'b-approved',rejected:'b-rejected',expensed:'b-expensed',invoiced:'b-invoiced',paid:'b-approved'};
  const lbl = {ops_pending:'With OPs',pending:'Pending Approval',approved:'Approved',rejected:'Rejected',expensed:'Expensed',invoiced:'Invoiced',paid:'Paid'};
  return `<span class="badge ${map[s]||''}">${lbl[s]||s}</span>`;
};
const pipeHTML = status => {
  const steps = ['With OPs','Approval','Expensed','Invoiced'];
  const idx = {ops_pending:0,pending:1,approved:2,expensed:2,invoiced:3}[status]??0;
  return `<div class="pipeline">${steps.map((s,i)=>`<div class="pipe-step ${i<idx?'done':i===idx?'current':''}"><span class="pipe-step-num">${i<idx?'✓':i+1}</span>${s}</div>`).join('')}</div>`;
};

// Service option groups — built once per company on first call, then cached
let _svcOpts = null;
function getServiceOpts(company) {
  if (!_svcOpts) {
    const cats = [...new Set(SERVICES.map(s=>s.category))];
    _svcOpts = {};
    ['Rapid','RCHBS'].forEach(co => {
      _svcOpts[co] = cats.map(cat => {
        const items = SERVICES.filter(s=>s.category===cat);
        return `<optgroup label="${cat}">${items.map(s=>{
          const p = svcPrice(s, co);
          return `<option value="${s.id}">${s.label}${p?` — QAR ${fmt(p)}`:''}</option>`;
        }).join('')}</optgroup>`;
      }).join('');
    });
  }
  // Inject `selected` for the currently chosen service
  const base = _svcOpts[company] || '';
  return base.replace(`value="${S.logForm.serviceId}"`, `value="${S.logForm.serviceId}" selected`);
}

function handleLogin(e) {
  e.preventDefault();
  const uid2 = document.getElementById('uid').value;
  const user = USERS.find(u => u.id === uid2);
  if (!user) { set({loginError:'Please select a user'}); return; }
  set({screen:'app', user, loginError:'', view:'dashboard'});
}

function handleLogout() {
  set({screen:'login', user:null, loginError:'', view:'dashboard', logCompany:null, logClient:null, logDone:false});
}

function startLog(clientId) {
  const client = CLIENTS.find(c=>c.id===clientId);
  set({view:'log', logCompany:client?.company||S.logCompany, logClient:clientId, logStep:0, logForm:{serviceId:'',qty:1,unitPrice:'',employees:[{name:'',date:''}],card:'',notes:''}, logDone:false, editingLogId:null});
}

function submitLog() {
  const client = CLIENTS.find(c=>c.id===S.logClient);
  const svc = SERVICES.find(s=>s.id===S.logForm.serviceId);
  if (!svc || !S.logForm.card) { alert('Please fill all fields'); return; }
  const unitPrice = parseFloat(S.logForm.unitPrice) || svcPrice(svc, S.logCompany);
  const total = unitPrice * S.logForm.qty;
  const card = CARDS.find(c=>c.id===S.logForm.card);

  if (S.editingLogId) {
    dbUpdate(S.editingLogId, {
      serviceId: svc.id, serviceName: svc.label,
      qty: S.logForm.qty, unitPrice, total,
      card: S.logForm.card, cardLabel: card.label,
      employees: S.logForm.employees.slice(0, S.logForm.qty),
      submittedAt: new Date().toISOString(),
      status:'ops_pending',
      approvedBy:null, approvedByName:null, approvedAt:null, rejectedReason:null,
      notes: S.logForm.notes
    });
    set({logDone:true, logStep:3, editingLogId:null});
    return;
  }

  const log = {
    id: uid(),
    clientId: client.id, clientName: client.name,
    serviceId: svc.id, serviceName: svc.label,
    qty: S.logForm.qty, unitPrice, total,
    card: S.logForm.card, cardLabel: card.label,
    employees: S.logForm.employees.slice(0, S.logForm.qty),
    submittedBy: S.user.id, submittedByName: S.user.name,
    submittedAt: new Date().toISOString(),
    status:'ops_pending',
    approvedBy:null, approvedByName:null, approvedAt:null, rejectedReason:null,
    expensedBy:null, expensedByName:null, expensedAt:null,
    invoiceId:null, invoicedBy:null, invoicedByName:null, invoicedAt:null,
    notes: S.logForm.notes
  };
  dbAdd(log);
  set({logDone:true, logStep:3});
}

function markOpsComplete(id) {
  dbUpdate(id, {status:'pending'});
  set({});
}

function approveLog(id) {
  dbUpdate(id, {status:'approved', approvedBy:S.user.id, approvedByName:S.user.name, approvedAt:new Date().toISOString()});
  set({});
}

function rejectLog(id, reason) {
  dbUpdate(id, {status:'rejected', rejectedReason:reason, approvedBy:S.user.id, approvedByName:S.user.name, approvedAt:new Date().toISOString()});
  set({rejectId:null, rejectReason:''});
}

function expenseLog(id) {
  dbUpdate(id, {status:'expensed', expensedBy:S.user.id, expensedByName:S.user.name, expensedAt:new Date().toISOString()});
  set({});
}

function generateInvoice(id) {
  const invId = 'INV-'+new Date().getFullYear()+'-'+String(dbGet().filter(l=>l.invoiceId).length+1).padStart(3,'0');
  dbUpdate(id, {status:'invoiced', invoiceId:invId, invoicedBy:S.user.id, invoicedByName:S.user.name, invoicedAt:new Date().toISOString()});
  set({invoiceLogId:id});
}

function updateEmp(idx, field, value) {
  const emps = [...S.logForm.employees];
  emps[idx] = {...emps[idx], [field]:value};
  S.logForm.employees = emps;
}

function updateQty(val) {
  const qty = Math.max(1, Math.min(20, parseInt(val)||1));
  const emps = Array.from({length:qty}, (_,i) => S.logForm.employees[i]||{name:'',date:''});
  S.logForm = {...S.logForm, qty, employees:emps};
}

function editLog(id) {
  const log = dbGet().find(l => l.id === id);
  if (!log) return;
  const client = CLIENTS.find(c=>c.id===log.clientId);
  set({
    view:'log',
    logCompany: client?.company || null,
    logClient: log.clientId,
    logStep: 0,
    logForm: {
      serviceId: log.serviceId,
      qty: log.qty,
      unitPrice: log.unitPrice || '',
      employees: log.employees.slice(),
      card: log.card,
      notes: log.notes || ''
    },
    logDone: false,
    editingLogId: id
  });
}

function deleteLog(id) {
  const log = dbGet().find(l => l.id === id);
  if (!log) return;
  if (!confirm(`Delete "${log.serviceName}" for ${log.clientName}?`)) return;
  const logs = dbGet().filter(l => l.id !== id);
  dbSave(logs);
  set({});
}

function vDashboardAM() {
  const allLogs = dbGet();
  const myLogs  = allLogs.filter(l => l.submittedBy === S.user.id);

  // Stats
  const now        = new Date();
  const weekAgo    = new Date(now); weekAgo.setDate(now.getDate() - 7);
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const thisWeekCount  = myLogs.filter(l => new Date(l.submittedAt) >= weekAgo).length;
  const thisMonthCount = myLogs.filter(l => new Date(l.submittedAt) >= monthStart).length;
  const pendingCount   = myLogs.filter(l => l.status === 'pending').length;
  const rejectedCount  = myLogs.filter(l => l.status === 'rejected').length;

  // History — sorted newest first
  const historyLogs = (S.user.type === 'am' ? myLogs : allLogs).slice().sort((a,b) => new Date(b.submittedAt) - new Date(a.submittedAt));
  const canEdit = l => ['ops_pending','rejected'].includes(l.status);
  const canDelete = l => ['ops_pending','pending','rejected'].includes(l.status);

  // Kanban — services removed from board once client pays
  const kanbanCols = [
    { title:'With OPs',          statuses:['ops_pending'],         color:'#0369a1', icon:'⚙' },
    { title:'Pending Approval',  statuses:['pending'],             color:'var(--orange)', icon:'◷' },
    { title:'Pending Invoice',   statuses:['approved','expensed'], color:'var(--purple)', icon:'📄' },
    { title:'Invoiced',          statuses:['invoiced'],            color:'var(--navy)',   icon:'✓' },
  ];

  const kanbanHTML = kanbanCols.map(col => {
    const cards = allLogs.filter(l =>
      col.statuses.includes(l.status) &&
      (l.submittedBy === S.user.id || S.user.type === 'tl')
    );
    const cardsHTML = cards.length === 0
      ? `<div style="text-align:center;padding:28px 0;color:var(--g500)"><div style="font-size:18px;margin-bottom:5px">○</div><div style="font-size:11px">No items</div></div>`
      : cards.map(l => {
          const client = CLIENTS.find(c => c.id === l.clientId);
          const accent = client?.company === 'Rapid' ? 'var(--navy)' : 'var(--magenta)';
          const isOps = l.status === 'ops_pending';
          return `<div class="k-card" style="--kc:${accent}">
            <div class="k-card-client">${l.clientName}</div>
            <div class="k-card-svc">${l.serviceName} · ${l.qty} emp.</div>
            <div class="k-card-footer">
              <span class="k-card-date">${fmtDate(l.submittedAt)}</span>
              <span class="k-card-amt">QAR ${fmt(l.total)}</span>
            </div>
            ${isOps ? `<button class="btn btn-success btn-xs" style="width:100%;margin-top:6px;justify-content:center" onclick="markOpsComplete('${l.id}')">OPs Complete → Send for Approval</button>` : ''}
          </div>`;
        }).join('');
    return `
      <div class="kanban-col">
        <div class="kanban-col-hd">
          <span class="kanban-col-title" style="color:${col.color}">${col.icon} ${col.title}</span>
          <span class="kanban-count">${cards.length}</span>
        </div>
        ${cardsHTML}
      </div>`;
  }).join('');

  return `
    <div class="stats-row">
      <div class="stat" style="--sc:var(--navy)">
        <div class="stat-lbl">Clients</div>
        <div class="stat-val">${CLIENTS.length}</div>
        <div class="stat-sub">Active accounts</div>
      </div>
      <div class="stat" style="--sc:var(--green)">
        <div class="stat-lbl">Services This Week</div>
        <div class="stat-val">${thisWeekCount}</div>
        <div class="stat-sub">${thisMonthCount} this month</div>
      </div>
      <div class="stat" style="--sc:var(--orange)">
        <div class="stat-lbl">Pending Approval</div>
        <div class="stat-val">${pendingCount}</div>
        <div class="stat-sub">Awaiting Elena</div>
      </div>
      <div class="stat" style="--sc:var(--red)">
        <div class="stat-lbl">Feedback from Elena</div>
        <div class="stat-val">${rejectedCount}</div>
        <div class="stat-sub">${rejectedCount === 0 ? 'All clear' : 'Need re-submission'}</div>
      </div>
    </div>

    <div style="display:flex;gap:10px;margin-bottom:16px">
      <button class="btn btn-primary" onclick="set({view:'log',logCompany:null,logClient:null,logStep:0,logForm:{serviceId:'',qty:1,unitPrice:'',employees:[{name:'',date:''}],card:'',notes:''},logDone:false,editingLogId:null})" style="gap:6px">
        <span style="font-size:15px">⊕</span> Log New Service
      </button>
      <button class="btn btn-ghost" onclick="set({view:'submissions'})" style="gap:6px">
        <span style="font-size:14px">📋</span> View All Submissions
      </button>
    </div>

    <div class="card" style="margin-bottom:20px">
      <div class="card-hd">
        <span class="card-title">Recent Activity</span>
        <span class="badge" style="background:var(--navy-lt);color:var(--navy)">${historyLogs.length} entries</span>
      </div>
      ${historyLogs.length === 0
        ? `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-txt">No activity yet</div><div class="empty-sub">Log your first service to get started.</div></div>`
        : `<table class="client-table">
          <thead><tr>
            <th>Date</th><th>Client</th><th>Service</th><th>Emp.</th><th>Amount</th><th>Status</th><th style="text-align:right">Actions</th>
          </tr></thead>
          <tbody>${historyLogs.map(l => {
            const editBtn = canEdit(l)
              ? `<button class="btn btn-ghost btn-xs" onclick="editLog('${l.id}')" title="Edit">✎ Edit</button>`
              : '';
            const deleteBtn = canDelete(l)
              ? `<button class="btn btn-xs" style="background:var(--red-lt);color:var(--red)" onclick="deleteLog('${l.id}')" title="Delete">✕</button>`
              : '';
            return `<tr>
              <td style="font-size:11px;color:var(--g500);white-space:nowrap">${fmtDate(l.submittedAt)}</td>
              <td>
                <div style="font-weight:600;font-size:12px">${l.clientName}</div>
              </td>
              <td style="font-size:12px">${l.serviceName}</td>
              <td style="font-size:12px;text-align:center">${l.qty}</td>
              <td style="font-weight:700;font-size:12px;color:var(--navy)">QAR ${fmt(l.total)}</td>
              <td>${statusBadge(l.status)}</td>
              <td style="text-align:right">
                <div style="display:flex;gap:4px;justify-content:flex-end">
                  ${editBtn}${deleteBtn}
                </div>
              </td>
            </tr>`;
          }).join('')}</tbody>
        </table>`
      }
      ${historyLogs.some(l => l.rejectedReason) ? `
        <div style="margin-top:12px;padding:10px 14px;background:var(--red-lt);border-radius:8px;border:1px solid rgba(192,39,45,.15)">
          <div style="font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Needs Attention</div>
          ${historyLogs.filter(l=>l.rejectedReason && l.status==='rejected').map(l => `
            <div style="font-size:11px;color:var(--g700);margin-bottom:4px">
              <strong>${l.clientName}</strong> · ${l.serviceName}: <span style="color:var(--red)">${l.rejectedReason}</span>
              <button class="btn btn-xs" style="background:var(--red);color:white;margin-left:6px" onclick="editLog('${l.id}')">Re-submit</button>
            </div>`).join('')}
        </div>` : ''}
    </div>

    <div class="card-hd" style="margin-bottom:10px">
      <span class="card-title" style="font-size:14px">Service Pipeline</span>
      <span style="font-size:10px;color:var(--g500)">Active service logs by stage · paid services removed automatically</span>
    </div>
    <div class="kanban-wrap">${kanbanHTML}</div>`;
}

function startEditClient(id) {
  const c = CLIENTS.find(x=>x.id===id);
  if (!c) return;
  set({ editingClientId:id, editClientForm:{...c} });
}

function saveEditClient() {
  if (!S.editClientForm) return;
  const f = S.editClientForm;
  clientUpdate(f.id, { name:f.name, contact:f.contact, email:f.email, phone:f.phone, type:f.type, creditLimit:Number(f.creditLimit)||0 });
  set({ editingClientId:null, editClientForm:null });
}

function cancelEditClient() {
  set({ editingClientId:null, editClientForm:null });
}

function saveNewClient() {
  const f = S.newClientForm;
  if (!f.name.trim()) { alert('Client name is required'); return; }
  const nextId = Math.max(...clientsGet().map(c=>c.id), 0) + 1;
  clientAdd({ id:nextId, name:f.name.trim(), company:f.company, contact:f.contact.trim(), email:f.email.trim(), phone:f.phone.trim(), type:f.type, creditLimit:Number(f.creditLimit)||0 });
  set({ addingClient:false, newClientForm:{ name:'', company:S.clientsTab, contact:'', email:'', phone:'', type:'per-job', creditLimit:5000 } });
}

function vClients() {
  const allLogs = dbGet();
  const tab = S.clientsTab;
  const clients = CLIENTS.filter(c => c.company === tab).sort((a,b) => a.name.localeCompare(b.name));

  const rapidCount = CLIENTS.filter(c=>c.company==='Rapid').length;
  const rchbsCount = CLIENTS.filter(c=>c.company==='RCHBS').length;

  const tabBtn = (label, count, company) => `
    <button class="btn ${tab===company ? 'btn-navy' : 'btn-ghost'} btn-sm" onclick="set({clientsTab:'${company}',editingClientId:null})" style="gap:4px">
      ${label} <span style="font-size:10px;opacity:.7">(${count})</span>
    </button>`;

  const tableRows = clients.map(c => {
    const logs = allLogs.filter(l => l.clientId === c.id);
    const invoicedTotal = logs.filter(l=>l.status==='invoiced').reduce((s,l)=>s+l.total, 0);
    const totalSpend = logs.filter(l=>l.status!=='rejected').reduce((s,l)=>s+l.total, 0);
    const serviceCount = logs.length;
    const pct = c.creditLimit > 0 ? Math.min(invoicedTotal / c.creditLimit, 1) : 0;
    const barColor = pct >= 1 ? 'var(--red)' : pct >= 0.75 ? 'var(--orange)' : 'var(--green)';

    if (S.editingClientId === c.id && S.editClientForm) {
      const f = S.editClientForm;
      return `<tr style="background:var(--navy-lt)">
        <td><input class="form-input" style="padding:5px 8px;font-size:12px" value="${f.name}" oninput="S.editClientForm.name=this.value"></td>
        <td><input class="form-input" style="padding:5px 8px;font-size:12px" value="${f.contact}" oninput="S.editClientForm.contact=this.value"></td>
        <td><input class="form-input" style="padding:5px 8px;font-size:12px" value="${f.email}" oninput="S.editClientForm.email=this.value"></td>
        <td><input class="form-input" style="padding:5px 8px;font-size:12px" value="${f.phone}" oninput="S.editClientForm.phone=this.value"></td>
        <td>
          <select class="form-input" style="padding:5px 8px;font-size:12px" onchange="S.editClientForm.type=this.value;render()">
            <option value="retainer" ${f.type==='retainer'?'selected':''}>Retainer</option>
            <option value="per-job" ${f.type==='per-job'?'selected':''}>Per-Job</option>
          </select>
        </td>
        <td><input class="form-input" style="padding:5px 8px;font-size:12px;width:90px" type="number" value="${f.creditLimit}" oninput="S.editClientForm.creditLimit=this.value"></td>
        <td style="font-size:12px;color:var(--g500)" colspan="2">—</td>
        <td style="text-align:right">
          <div style="display:flex;gap:4px;justify-content:flex-end">
            <button class="btn btn-success btn-xs" onclick="saveEditClient()">Save</button>
            <button class="btn btn-ghost btn-xs" onclick="cancelEditClient()">Cancel</button>
          </div>
        </td>
      </tr>`;
    }

    return `<tr>
      <td><div style="font-weight:600;font-size:12px">${c.name}</div></td>
      <td style="font-size:12px">${c.contact}</td>
      <td style="font-size:11px;color:var(--g500)">${c.email||'—'}</td>
      <td style="font-size:11px;color:var(--g500);white-space:nowrap">${c.phone||'—'}</td>
      <td><span class="badge ${c.type==='retainer'?'b-invoiced':'b-ops'}" style="font-size:9px">${c.type==='retainer'?'Retainer':'Per-Job'}</span></td>
      <td style="font-size:12px;color:var(--g700)">QAR ${fmt(c.creditLimit)}</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="width:60px;height:5px;background:var(--g100);border-radius:3px">
            <div style="height:100%;border-radius:3px;background:${barColor};width:${Math.round(pct*100)}%"></div>
          </div>
          <span style="font-size:10px;font-weight:600;color:${barColor}">${Math.round(pct*100)}%</span>
        </div>
        <div style="font-size:10px;color:var(--g500);margin-top:2px">QAR ${fmt(invoicedTotal)} / ${fmt(c.creditLimit)}</div>
      </td>
      <td style="font-size:12px;text-align:center;color:var(--g700)">${serviceCount}</td>
      <td style="text-align:right">
        <button class="btn btn-ghost btn-xs" onclick="startEditClient(${c.id})">✎ Edit</button>
      </td>
    </tr>`;
  }).join('');

  // Add client form (inline row at top of table)
  const addRow = S.addingClient ? `<tr style="background:var(--green-lt)">
    <td><input class="form-input" style="padding:5px 8px;font-size:12px" placeholder="Company name" value="${S.newClientForm.name}" oninput="S.newClientForm.name=this.value"></td>
    <td><input class="form-input" style="padding:5px 8px;font-size:12px" placeholder="Contact person" value="${S.newClientForm.contact}" oninput="S.newClientForm.contact=this.value"></td>
    <td><input class="form-input" style="padding:5px 8px;font-size:12px" placeholder="Email" value="${S.newClientForm.email}" oninput="S.newClientForm.email=this.value"></td>
    <td><input class="form-input" style="padding:5px 8px;font-size:12px" placeholder="Phone" value="${S.newClientForm.phone}" oninput="S.newClientForm.phone=this.value"></td>
    <td>
      <select class="form-input" style="padding:5px 8px;font-size:12px" onchange="S.newClientForm.type=this.value;render()">
        <option value="per-job" ${S.newClientForm.type==='per-job'?'selected':''}>Per-Job</option>
        <option value="retainer" ${S.newClientForm.type==='retainer'?'selected':''}>Retainer</option>
      </select>
    </td>
    <td><input class="form-input" style="padding:5px 8px;font-size:12px;width:90px" type="number" placeholder="Limit" value="${S.newClientForm.creditLimit}" oninput="S.newClientForm.creditLimit=this.value"></td>
    <td colspan="2" style="font-size:10px;color:var(--g500)">New</td>
    <td style="text-align:right">
      <div style="display:flex;gap:4px;justify-content:flex-end">
        <button class="btn btn-success btn-xs" onclick="saveNewClient()">Add</button>
        <button class="btn btn-ghost btn-xs" onclick="set({addingClient:false})">Cancel</button>
      </div>
    </td>
  </tr>` : '';

  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div style="display:flex;gap:6px">
        ${tabBtn('Rapid Clearing House', rapidCount, 'Rapid')}
        ${tabBtn('RCHBS', rchbsCount, 'RCHBS')}
      </div>
      <button class="btn btn-primary btn-sm" onclick="set({addingClient:true,newClientForm:{name:'',company:'${tab}',contact:'',email:'',phone:'',type:'per-job',creditLimit:5000}})" style="gap:4px">
        <span style="font-size:14px">+</span> Add Client
      </button>
    </div>

    <div class="card" style="overflow-x:auto">
      <table class="client-table" style="min-width:900px">
        <thead><tr>
          <th>Client</th><th>Contact</th><th>Email</th><th>Phone</th><th>Type</th><th>Limit</th><th>A/R Usage</th><th style="text-align:center">Services</th><th style="text-align:right">Actions</th>
        </tr></thead>
        <tbody>
          ${addRow}
          ${tableRows}
        </tbody>
      </table>
    </div>`;
}

      <button class="btn btn-ghost btn-sm" onclick="set({view:'dashboard'})" style="margin-bottom:14px">← Back</button>
      <div class="card" style="max-width:520px">
        <div class="card-hd"><span class="card-title" style="font-size:15px">Log Service — Select Entity</span></div>
        <div style="font-size:12px;color:var(--g500);margin-bottom:20px">Which company is this service for?</div>
        <div style="display:flex;gap:14px">
          ${companyCard('Rapid','Rapid Clearing House','Price list 2025',rapidCount,'var(--navy)')}
          ${companyCard('RCHBS','RCH Business Solutions','Price list 2024',rchbsCount,'var(--magenta)')}
        </div>
      </div>`;
  }

  // ── SCREEN 2: Client picker (filtered by company) ────────────────────────
  if (!S.logClient) {
    const filteredClients = [...CLIENTS].filter(c=>c.company===S.logCompany).sort((a,b)=>a.name.localeCompare(b.name));
    const allLogs = dbGet();
    // Pre-group invoiced totals by client in a single O(logs) pass
    const invoicedByClient = allLogs
      .filter(l=>l.status==='invoiced')
      .reduce((acc,l)=>{ acc[l.clientId]=(acc[l.clientId]||0)+l.total; return acc; }, {});
    const clientRow = (c) => {
      const ar = invoicedByClient[c.id] || 0;
      const limit = c.creditLimit || 0;
      const pct = limit > 0 ? Math.min(ar/limit,1) : 0;
      const blocked = pct >= 1;
      return `<div onclick="${blocked?'':`startLog(${c.id})`}"
        style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border:1px solid var(--border);border-radius:8px;cursor:${blocked?'not-allowed':'pointer'};background:${blocked?'var(--red-lt)':'var(--white)'};transition:box-shadow .15s"
        ${blocked?'':`onmouseover="this.style.boxShadow='0 2px 8px rgba(0,0,0,.08)';this.style.borderColor='${companyColor}'" onmouseout="this.style.boxShadow='none';this.style.borderColor='var(--border)'"`}>
        <div>
          <div style="font-weight:600;font-size:13px;color:${blocked?'var(--g500)':'var(--g900)'}">${c.name}</div>
          <div style="font-size:10px;color:var(--g500);margin-top:2px">${c.contact}</div>
        </div>
        <div>${blocked?`<span class="badge b-rejected" style="font-size:9px">At Limit</span>`:`<span style="font-size:11px;color:${companyColor};font-weight:600">Select →</span>`}</div>
      </div>`;
    };
    return `
      <button class="btn btn-ghost btn-sm" onclick="set({logCompany:null})" style="margin-bottom:14px">← Back</button>
      <div class="card" style="max-width:620px">
        <div class="card-hd">
          <span class="card-title" style="font-size:15px">Log Service — Select Client</span>
          ${companyChip}
        </div>
        <div style="font-size:12px;color:var(--g500);margin-bottom:14px">Choose a client to log a service for</div>
        <div style="display:flex;flex-direction:column;gap:6px">${filteredClients.map(clientRow).join('')}</div>
      </div>`;
  }

  // ── WIZARD ───────────────────────────────────────────────────────────────
  const client = CLIENTS.find(c=>c.id===S.logClient);
  const svc = SERVICES.find(s=>s.id===S.logForm.serviceId);
  const listPrice = svc ? svcPrice(svc, S.logCompany) : 0;
  const unitPrice = S.logForm.unitPrice !== '' ? parseFloat(S.logForm.unitPrice)||0 : listPrice;
  const total = unitPrice * S.logForm.qty;
  const priceEdited = !!(svc && S.logForm.unitPrice !== '' && parseFloat(S.logForm.unitPrice) !== listPrice);

  const steps = ['Service','Employees','Payment','Done'];
  const stepsHTML = `<div class="stepper">${steps.map((s,i)=>{
    const done=i<S.logStep, active=i===S.logStep;
    return `<div class="step ${done?'done':active?'active':''}">
      <div class="step-circle">${done?'✓':i+1}</div>
      <div class="step-lbl">${s}</div>
    </div>`;
  }).join('')}</div>`;

  let body = '';

  if (S.logStep === 0) {
    body = `
      <div class="form-group">
        <label class="form-label">Service Type</label>
        <select class="form-input" onchange="
          S.logForm.serviceId=this.value;
          const sv=SERVICES.find(s=>s.id===this.value);
          S.logForm.unitPrice = sv ? svcPrice(sv, S.logCompany) : '';
          render()">
          <option value="">Choose a service...</option>
          ${getServiceOpts(S.logCompany)}
        </select>
      </div>
      ${svc ? `
      <div class="form-group">
        <label class="form-label" style="display:flex;align-items:center;justify-content:space-between">
          <span>Professional Fee (QAR)</span>
          ${priceEdited
            ? `<span style="font-size:10px;color:var(--orange);font-weight:600">✏ Custom price — list price: QAR ${fmt(listPrice)}</span>`
            : `<span style="font-size:10px;color:var(--g500)">List price from ${S.logCompany} price list</span>`
          }
        </label>
        <input class="form-input" type="number" min="0" step="50" value="${S.logForm.unitPrice !== '' ? S.logForm.unitPrice : listPrice}"
          oninput="S.logForm.unitPrice=this.value;render()" style="width:180px">
        ${priceEdited ? `<div style="margin-top:4px;font-size:11px;color:var(--orange)">Modified from standard rate — ensure special agreement is documented in notes.</div>` : ''}
      </div>` : ''}
      <div class="form-group">
        <label class="form-label">Quantity</label>
        <input class="form-input" type="number" min="1" max="20" value="${S.logForm.qty}"
          onchange="updateQty(this.value);render()" style="width:120px">
      </div>
      ${svc && S.logForm.qty > 0 ? `
      <div style="padding:10px 13px;background:var(--g50);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--g700)">
        Estimated total: <strong>QAR ${fmt(total)}</strong> (${S.logForm.qty} × QAR ${fmt(unitPrice)})
      </div>` : ''}`;
  }

  if (S.logStep === 1) {
    body = `
      <div style="font-size:12px;color:var(--g500);margin-bottom:14px">Enter name &amp; service date for each employee / reference</div>
      ${S.logForm.employees.map((e,i)=>`
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
          <input class="form-input" type="text" placeholder="Name / reference ${i+1}" value="${e.name||''}"
            oninput="updateEmp(${i},'name',this.value)">
          <input class="form-input" type="date" value="${e.date||''}"
            onchange="updateEmp(${i},'date',this.value)">
        </div>`).join('')}`;
  }

  if (S.logStep === 2) {
    const availableCards = CARDS.filter(c=>c.company===S.logCompany);
    body = `
      <div class="form-group">
        <label class="form-label">Payment Card</label>
        <select class="form-input" onchange="S.logForm.card=this.value;render()">
          <option value="">Select card...</option>
          ${availableCards.map(c=>`<option value="${c.id}" ${S.logForm.card===c.id?'selected':''}>${c.label}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Total Amount</label>
        <div class="form-input" style="background:${companyBg};color:${companyColor};font-weight:800;font-size:16px">QAR ${fmt(total)}</div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes (optional)</label>
        <textarea class="form-input" rows="2" placeholder="Special agreement details, references, etc..." oninput="S.logForm.notes=this.value">${S.logForm.notes||''}</textarea>
      </div>
      <div style="padding:11px 13px;background:var(--g50);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--g700)">
        📋 <strong>${svc?.label}</strong> × ${S.logForm.qty} · QAR ${fmt(unitPrice)}/unit = <strong>QAR ${fmt(total)}</strong>
        ${priceEdited ? `<span style="color:var(--orange);margin-left:6px">(custom rate)</span>` : ''}
      </div>`;
  }

  if (S.logStep === 3) {
    body = S.logDone
      ? `<div style="text-align:center;padding:24px">
          <div style="font-size:48px;margin-bottom:12px">✅</div>
          <div style="font-weight:800;font-size:16px;color:var(--green);margin-bottom:8px">${S.editingLogId?'Service Updated!':'Service Logged!'}</div>
          <div style="font-size:12px;color:var(--g500);line-height:1.8">
            <strong>${svc?.label}</strong> × <strong>${S.logForm.qty}</strong><br>
            Total: <strong>QAR ${fmt(total)}</strong> · Card: <strong>${CARDS.find(c=>c.id===S.logForm.card)?.label||''}</strong><br>
            Status: <span class="badge b-ops">With OPs</span><br><br>
            Operations team will execute this service.
          </div>
          <div style="display:flex;gap:10px;justify-content:center;margin-top:20px">
            <button class="btn btn-ghost" onclick="set({view:'dashboard',logCompany:null,logClient:null,logDone:false})">Back to Dashboard</button>
            <button class="btn btn-primary" onclick="set({view:'submissions'})">View Submissions</button>
          </div>
        </div>`
      : `<div style="text-align:center;padding:24px;color:var(--g500)">Loading...</div>`;
  }

  const canNext =
    (S.logStep===0 && S.logForm.serviceId && S.logForm.qty>0 && unitPrice>0) ||
    (S.logStep===1) ||
    (S.logStep===2 && S.logForm.card);

  return `
    <button class="btn btn-ghost btn-sm" onclick="set({logClient:null})" style="margin-bottom:14px">← Back</button>
    <div class="card" style="max-width:620px">
      <div class="card-hd">
        <span class="card-title" style="font-size:15px">${S.editingLogId?'Edit':'Log'} Service — ${client.name}</span>
        ${companyChip}
      </div>
      ${stepsHTML}
      <div class="fade">${body}</div>
      ${S.logStep < 3 ? `
        <div style="display:flex;justify-content:space-between;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)">
          <button class="btn btn-ghost btn-sm" onclick="set({logStep:Math.max(0,S.logStep-1)})" ${S.logStep===0?'disabled':''}>← Back</button>
          ${S.logStep < 2
            ? `<button class="btn btn-primary btn-sm" onclick="set({logStep:S.logStep+1})" ${!canNext?'disabled':''}>Next →</button>`
            : `<button class="btn btn-success btn-sm" onclick="submitLog()" ${!canNext?'disabled':''}>Submit for Approval →</button>`
          }
        </div>` : ''}
    </div>`;
}

}

// VIEW: Finance Queue (Suleiman / Arlene)

function vFinance() {
  if (S.invoiceLogId) return vInvoicePreview();
  const expensed = dbGet().filter(l=>l.status==='expensed');
  const invoiced = dbGet().filter(l=>l.status==='invoiced');
  const totalExpensed = expensed.reduce((s,l)=>s+l.total,0);

  return `
    <div class="stats-row">
      <div class="stat" style="--sc:var(--purple)">
        <div class="stat-lbl">Ready to Invoice</div>
        <div class="stat-val">${expensed.length}</div>
        <div class="stat-sub">QAR ${fmt(totalExpensed)} total</div>
      </div>
      <div class="stat" style="--sc:var(--navy)">
        <div class="stat-lbl">Invoiced</div>
        <div class="stat-val">${invoiced.length}</div>
        <div class="stat-sub">All time</div>
      </div>
    </div>

    ${expensed.length > 0 ? `
      <div style="font-size:11px;font-weight:700;color:var(--g500);text-transform:uppercase;margin-bottom:8px;letter-spacing:.5px">Ready to Invoice</div>
      ${expensed.map(l => renderLogCard(l, false, 'invoice')).join('')}
    ` : `<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-txt">Nothing to invoice yet</div><div class="empty-sub">Items will appear here once Gabi marks them as expensed.</div></div>`}

    ${invoiced.length > 0 ? `
      <div style="font-size:11px;font-weight:700;color:var(--g500);text-transform:uppercase;margin:16px 0 8px;letter-spacing:.5px">Invoiced</div>
      ${invoiced.map(l => `
        <div class="log-card">
          <div class="log-card-top">
            <div><strong style="font-size:13px">${l.clientName}</strong> · ${l.serviceName} <span style="color:var(--g500);font-size:11px">${l.qty} emp.</span></div>
            <div style="display:flex;align-items:center;gap:8px">
              ${statusBadge(l.status)}
              <button class="btn btn-ghost btn-xs" onclick="set({invoiceLogId:'${l.id}'})">View Invoice</button>
            </div>
          </div>
          <div class="log-meta">
            <span class="log-meta-item">💰 QAR ${fmt(l.total)}</span>
            <span class="log-meta-item">🧾 ${l.invoiceId}</span>
            <span class="log-meta-item">📅 ${fmtDT(l.invoicedAt)}</span>
            <span class="log-meta-item">👤 ${l.invoicedByName}</span>
          </div>
        </div>`).join('')}
    ` : ''}`;
}

          ${logoSVG(40)}

        <div style="text-align:right">
          <div style="font-size:22px;font-weight:800;color:var(--magenta)">INVOICE</div>
          <div style="font-size:13px;font-weight:700;color:var(--navy);margin-top:4px">${log.invoiceId||'DRAFT'}</div>

        <div style="font-size:13px;font-weight:700">${log.clientName}</div>

      <table class="invoice-table">
        <thead><tr><th>Description</th><th>Qty</th><th>Unit Price</th><th>Total</th></tr></thead>
        <tbody>
          <tr>
            <td>${log.serviceName}</td>
            <td>${log.qty}</td>
            <td>QAR ${fmt(log.unitPrice)}</td>
            <td>QAR ${fmt(log.total)}</td>
          </tr>
        </tbody>
      </table>

      <div class="invoice-total">
        <div style="font-size:11px;color:var(--g500);margin-bottom:4px">Total Amount Due</div>
        <div style="font-size:24px;font-weight:800;color:var(--navy)">QAR ${fmt(log.total)}</div>
      </div>

      <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:10px;color:var(--g500)">Generated by ${log.invoicedByName} · ${fmtDT(log.invoicedAt)}</div>
        <button class="btn btn-navy btn-sm" onclick="window.print()">🖨 Print / PDF</button>
      </div>
    </div>`;
}

      <div class="stat" style="--sc:var(--green)"><div class="stat-lbl">Total Revenue</div><div class="stat-val">QAR ${fmt(total)}</div><div class="stat-sub">Processed</div></div>

    <div class="card">

            <div style="font-size:20px;font-weight:800;color:var(--navy)">${byStatus(s)}</div>

            <div style="font-size:10px;color:var(--g500);margin-top:2px">${l.qty} emp · QAR ${fmt(l.total)} · ${fmtDate(l.submittedAt)} · by ${l.submittedByName}</div>
          </div>
          ${statusBadge(l.status)}
        </div>`).join('')}
    </div>`;
}

// ═══════════════════════════════════
// SHARED: Log Card
// ═══════════════════════════════════
function renderLogCard(l, showActions, action) {
  const actionsHTML = showActions
    ? `<div class="log-card-actions">
        <button class="btn btn-success btn-xs" onclick="approveLog('${l.id}')">✓ Approve</button>
        <button class="btn btn-danger btn-xs" onclick="set({rejectId:'${l.id}'})">✗ Reject</button>
      </div>`
    : action === 'expense'
      ? `<button class="btn btn-primary btn-xs" onclick="expenseLog('${l.id}')">Mark Expensed</button>`
      : action === 'invoice'
        ? `<button class="btn btn-navy btn-xs" onclick="generateInvoice('${l.id}')">Generate Invoice</button>`
        : '';

  return `
    <div class="log-card">
      <div class="log-card-top">
        <div>
          <span style="font-weight:700;font-size:13px">${l.clientName}</span>
          <span style="color:var(--g500);font-size:12px"> · ${l.serviceName}</span>
          ${statusBadge(l.status)}
        </div>
        ${actionsHTML}
      </div>
      <div class="log-meta">
        <span class="log-meta-item">👥 ${l.qty} employee(s)</span>
        <span class="log-meta-item">💰 QAR ${fmt(l.total)}</span>
        <span class="log-meta-item">💳 ${l.cardLabel}</span>
        <span class="log-meta-item">📅 ${fmtDate(l.submittedAt)}</span>
        <span class="log-meta-item">👤 ${l.submittedByName}</span>
      </div>
      ${l.rejectedReason ? `<div style="margin-top:8px;padding:8px 10px;background:var(--red-lt);border-radius:6px;font-size:11px;color:var(--red)">Rejected: ${l.rejectedReason}</div>` : ''}
    </div>`;
}

function renderRejectModal() {
  return `
    <div style="position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100" onclick="if(event.target===this)set({rejectId:null})">
      <div style="background:white;border-radius:14px;padding:28px;width:400px;box-shadow:0 20px 60px rgba(0,0,0,.2)">
        <div style="font-size:15px;font-weight:700;color:var(--navy);margin-bottom:14px">Reject Submission</div>
        <div class="form-group">
          <label class="form-label">Reason for rejection</label>
          <textarea class="form-input" rows="3" placeholder="Explain why..." oninput="S.rejectReason=this.value">${S.rejectReason}</textarea>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button class="btn btn-ghost btn-sm" onclick="set({rejectId:null,rejectReason:''})">Cancel</button>
          <button class="btn btn-danger btn-sm" onclick="rejectLog('${S.rejectId}',S.rejectReason)">Confirm Reject</button>
        </div>
      </div>
    </div>`;
}

// ═══════════════════════════════════
// NAV CONFIG PER ROLE
// ═══════════════════════════════════
function getNav(type) {
  const counts = (() => {
    const logs = dbGet();
    return {
      ops_pending: logs.filter(l=>l.status==='ops_pending').length,
      pending: logs.filter(l=>l.status==='pending').length,
      approved: logs.filter(l=>l.status==='approved').length,
      expensed: logs.filter(l=>l.status==='expensed').length,
    };
  })();

  const item = (view, icon, label, badge) =>
    `<div class="nav-item ${S.view===view?'active':''}" onclick="set({view:'${view}',invoiceLogId:null})">
      <span class="nav-icon">${icon}</span><span>${label}</span>
      ${badge ? `<span class="nav-badge">${badge}</span>` : ''}
    </div>`;

  const defs = {
    am: [
      item('dashboard','◈','Dashboard',''),
      item('clients','👥','Clients',''),
      item('log','⊕','Log Service',''),
      item('submissions','📋','My Submissions',''),
    ],
    tl: [
      item('dashboard','◈','Dashboard',''),
      item('clients','👥','Clients',''),
      item('log','⊕','Log Service',''),
      item('approvals','✓','Approval Queue', counts.pending||''),
      item('submissions','📋','All Submissions',''),
    ],
    expense: [
      item('expense','💰','Expense Tracker', counts.approved||''),
    ],
    finance: [
      item('finance','🧾','Finance Queue', counts.expensed||''),
    ],
    cfo: [
      item('cfo','📊','Overview',''),
    ],
  };
  return (defs[type]||[]).join('');
}

function getViewTitle() {
  const map = {dashboard:'Dashboard',clients:'Clients',log:'Log Service',submissions:'Submissions',approvals:'Approval Queue',expense:'Expense Tracker',finance:'Finance Queue',cfo:'Management',invoiceLogId:'Invoice'};
  if (S.invoiceLogId) return 'Invoice Preview';
  return map[S.view]||'Dashboard';
}

function renderView() {
  const t = S.user?.type;
  if (S.view==='dashboard'  && (t==='am'||t==='tl')) return vDashboardAM();
  if (S.view==='clients'   && (t==='am'||t==='tl')) return vClients();
  if (S.view==='log')                                  return vLogService();
  if (S.view==='submissions')                          return vSubmissions();
  if (S.view==='approvals'  && t==='tl')               return vApprovals();
  if (S.view==='expense'    && t==='expense')          return vExpense();
  if (S.view==='finance'    && t==='finance')          return vFinance();
  if (S.view==='cfo'        && t==='cfo')              return vCFO();
  // Default landing per type
  if (t==='expense') return vExpense();
  if (t==='finance') return vFinance();
  if (t==='cfo')     return vCFO();
  return vDashboardAM();
}

// ═══════════════════════════════════
// RENDER
// ═══════════════════════════════════
function render() {
  const root = document.getElementById('app');

  if (S.screen === 'login') {
    root.innerHTML = `
      <div class="login-wrap">
        <div class="login-box">
          <div class="login-hd">
            <div class="login-logo">${logoSVG(44)}<span style="font-size:26px;font-weight:800;color:white">RCH CRM</span></div>
            <div style="font-size:14px;color:rgba(255,255,255,.55);margin-top:4px">Service Management Platform</div>
          </div>
          <form class="login-form" onsubmit="handleLogin(event)">
            <h2>Sign In</h2>
            <div class="form-group">
              <label class="form-label">Select Your Role</label>
              <select id="uid" class="form-input" required>
                <option value="">Choose a user...</option>
                ${USERS.map(u=>`<option value="${u.id}">${u.name} — ${u.role}</option>`).join('')}
              </select>
            </div>
            ${S.loginError ? `<div class="login-err">⚠ ${S.loginError}</div>` : ''}
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:6px;padding:12px;font-size:14px">Enter</button>
            <div class="login-hint">Demo mode — select any role to continue</div>
          </form>
        </div>
      </div>`;
    return;
  }

  root.innerHTML = `
    <div class="app">
      <div class="sidebar">
        <div class="sb-brand">
          ${logoSVG(30)}
          <div><div class="brand-rch">RCH</div><div class="brand-sub">CRM System</div></div>
        </div>
        <div class="sb-nav">
          ${getNav(S.user.type)}
          <div style="height:1px;background:rgba(255,255,255,.07);margin:12px 8px"></div>
          <div class="nav-item" onclick="dbReset();set({})" style="font-size:11px;color:rgba(255,255,255,.25)">
            <span class="nav-icon">↺</span><span>Reset Demo Data</span>
          </div>
        </div>
        <div class="sb-footer">
          <div class="user-row">
            <div class="u-avatar">${S.user.avatar}</div>
            <div><div class="u-name">${S.user.name}</div><div class="u-role">${S.user.role}</div></div>
          </div>
          <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>
      </div>
      <div class="main">
        <div class="topbar">
          <div>
            <div class="tb-title">${getViewTitle()}</div>
            <div class="tb-sub">${new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
          </div>
        </div>
        <div class="content"><div class="fade">${renderView()}</div></div>
      </div>
    </div>`;
}

// boot
render();
</script>
</body>
