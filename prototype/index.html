<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCH CRM — Account Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy:        #1B2D5E;
  --navy-dark:   #131f43;
  --navy-light:  #e8ecf5;
  --magenta:     #C4006A;
  --magenta-dk:  #9c0054;
  --magenta-lt:  #fce8f3;
  --green:       #1a7a4a;
  --green-lt:    #e6f4ed;
  --orange:      #d05a00;
  --orange-lt:   #fff3e6;
  --red:         #c0272d;
  --red-lt:      #fdeaea;
  --bg:          #f2f4f8;
  --white:       #ffffff;
  --border:      #e3e7f0;
  --gray50:      #f8f9fc;
  --gray100:     #f0f2f7;
  --gray300:     #d4d9e8;
  --gray500:     #8a93b0;
  --gray700:     #4a5170;
  --gray900:     #1a1f36;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--gray900); -webkit-font-smoothing: antialiased; }

/* ════════════════════════════════════════
   LOGIN SCREEN
   ════════════════════════════════════════ */
.login-screen {
  display: flex; align-items: center; justify-content: center;
  height: 100vh; background: linear-gradient(135deg, var(--navy) 0%, var(--navy-dark) 100%);
  padding: 20px;
}
.login-container { width: 100%; max-width: 480px; }
.login-header {
  text-align: center; margin-bottom: 48px;
}
.login-logo { display: inline-flex; align-items: center; gap: 12px; margin-bottom: 24px; }
.login-logo svg { width: 44px; height: 44px; }
.login-title { font-size: 28px; font-weight: 800; color: white; margin-bottom: 6px; }
.login-subtitle { font-size: 14px; color: rgba(255,255,255,0.6); }

.login-form { background: white; border-radius: 16px; padding: 32px; box-shadow: 0 20px 60px rgba(27,45,94,0.2); }
.login-form h2 { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 24px; text-align: center; }

.form-group { margin-bottom: 16px; }
.form-label { font-size: 12px; font-weight: 700; color: var(--gray700); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px; }
.form-input {
  width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
  border-radius: 9px; background: var(--gray50); font-size: 14px;
  font-family: inherit; color: var(--gray900); transition: border-color 0.2s;
}
.form-input:focus { outline: none; border-color: var(--magenta); background: white; box-shadow: 0 0 0 3px var(--magenta-lt); }

.login-btn {
  width: 100%; padding: 12px; background: var(--magenta); color: white;
  border: none; border-radius: 9px; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: background 0.2s; margin-top: 8px;
}
.login-btn:hover { background: var(--magenta-dk); }
.login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.login-error { color: var(--red); font-size: 12px; margin-top: 8px; }
.login-hint { font-size: 11px; color: var(--gray500); margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); text-align: center; }

/* ════════════════════════════════════════
   MAIN APP
   ════════════════════════════════════════ */
.app { display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--navy);
  display: flex; flex-direction: column;
  border-right: 1px solid rgba(255,255,255,0.06);
}
.sidebar-brand {
  padding: 22px 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; gap: 11px;
}
.brand-logo { display: flex; align-items: center; gap: 9px; }
.brand-logo svg { width: 32px; height: 32px; flex-shrink: 0; }
.brand-wordmark { display: flex; flex-direction: column; }
.brand-rch { font-size: 20px; font-weight: 800; color: white; letter-spacing: -0.5px; line-height: 1; }
.brand-sub { font-size: 9px; font-weight: 500; color: rgba(255,255,255,0.38); letter-spacing: 1.2px; text-transform: uppercase; margin-top: 2px; }

.sidebar-nav { padding: 12px 10px; flex: 1; overflow-y: auto; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 7px;
  cursor: pointer; color: rgba(255,255,255,0.5);
  font-size: 13px; font-weight: 500; margin-bottom: 1px;
  transition: background 0.14s, color 0.14s;
  position: relative;
}
.nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.8); }
.nav-item.active {
  background: rgba(196,0,106,0.18);
  color: #f0a0cc;
  font-weight: 600;
}
.nav-item.active::before {
  content: '';
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 18px; background: var(--magenta);
  border-radius: 0 2px 2px 0;
}
.nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }

.sidebar-footer {
  padding: 14px 18px; border-top: 1px solid rgba(255,255,255,0.08);
}
.user-row { display: flex; align-items: center; gap: 10px; }
.user-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: linear-gradient(135deg, var(--magenta) 0%, var(--magenta-dk) 100%);
  color: white; font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.user-name { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.85); }
.user-role { font-size: 10px; color: rgba(255,255,255,0.35); margin-top: 1px; }
.logout-btn {
  margin-top: 8px; width: 100%;
  padding: 6px; background: rgba(255,255,255,0.1);
  border: none; border-radius: 5px; color: rgba(255,255,255,0.7);
  font-size: 11px; cursor: pointer; transition: all 0.14s;
}
.logout-btn:hover { background: rgba(255,255,255,0.15); color: white; }

/* Main area */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

.topbar {
  background: white; border-bottom: 1px solid var(--border);
  padding: 0 28px; height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.topbar-left { display: flex; flex-direction: column; }
.topbar-title { font-size: 16px; font-weight: 700; color: var(--navy); }
.topbar-sub { font-size: 11px; color: var(--gray500); margin-top: 1px; }

.content { flex: 1; overflow-y: auto; padding: 24px 28px; }
.content::-webkit-scrollbar { width: 5px; }
.content::-webkit-scrollbar-thumb { background: var(--gray300); border-radius: 3px; }

/* Cards & Components */
.card {
  background: white; border-radius: 12px;
  box-shadow: 0 1px 3px rgba(27,45,94,0.07), 0 0 0 1px rgba(27,45,94,0.05);
  padding: 20px;
}
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.card-title { font-size: 13px; font-weight: 700; color: var(--navy); }

.stat-card {
  background: white; border-radius: 12px;
  padding: 18px 20px 16px;
  box-shadow: 0 1px 3px rgba(27,45,94,0.07), 0 0 0 1px rgba(27,45,94,0.05);
  flex: 1; min-width: 140px; position: relative; overflow: hidden;
}
.stat-card::after {
  content: ''; position: absolute;
  top: 0; left: 0; width: 4px; height: 100%;
  background: var(--stat-color, var(--navy));
  border-radius: 12px 0 0 12px;
}
.stat-label { font-size: 10px; font-weight: 600; color: var(--gray500); text-transform: uppercase; letter-spacing: 0.6px; }
.stat-value { font-size: 26px; font-weight: 800; color: var(--stat-color, var(--navy)); margin-top: 5px; line-height: 1; }
.stat-sub { font-size: 11px; color: var(--gray500); margin-top: 4px; }

.stats-row { display: flex; gap: 14px; margin-bottom: 22px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

.btn {
  border: none; padding: 9px 18px; border-radius: 8px;
  font-weight: 600; cursor: pointer; font-size: 13px;
  font-family: inherit; transition: all 0.14s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn:hover { filter: brightness(1.08); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: var(--magenta); color: white; }
.btn-ghost { background: var(--gray100); color: var(--gray700); border: 1px solid var(--border); }
.btn-sm { padding: 5px 12px; font-size: 11px; border-radius: 6px; }

.client-card {
  background: white; border: 1.5px solid var(--border);
  border-radius: 10px; padding: 16px; cursor: pointer;
  transition: all 0.2s;
}
.client-card:hover { border-color: var(--magenta); background: var(--magenta-lt); }
.client-name { font-weight: 700; font-size: 13px; color: var(--gray900); }
.client-role { font-size: 11px; color: var(--gray500); margin-top: 3px; }

.form-group { margin-bottom: 16px; }
.form-label { font-size: 10px; font-weight: 700; color: var(--gray500); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 6px; }
.form-input {
  width: 100%; padding: 9px 13px; border: 1.5px solid var(--border);
  border-radius: 8px; background: var(--gray50);
  font-size: 13px; font-family: inherit; color: var(--gray900);
  transition: border-color 0.14s;
}
.form-input:focus { outline: none; border-color: var(--magenta); background: white; }

.alert {
  border-radius: 10px; padding: 12px 16px; font-size: 12px;
  margin-bottom: 18px; display: flex; align-items: flex-start; gap: 10px;
  border: 1px solid transparent;
}
.alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.alert-success { background: var(--green-lt); border-color: #5dbf8a; }

.stepper { display: flex; align-items: flex-start; gap: 0; margin-bottom: 24px; }
.step { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
.step:not(:last-child)::after {
  content: ''; position: absolute;
  top: 14px; left: 50%; width: 100%; height: 2px;
  background: var(--gray300);
}
.step.done::after, .step.active::after { background: var(--magenta); }
.step-circle {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; z-index: 1;
  background: var(--gray300); color: var(--gray500);
  transition: all 0.25s;
}
.step.done .step-circle { background: var(--magenta); color: white; }
.step.active .step-circle { background: var(--navy); color: white; box-shadow: 0 0 0 4px var(--navy-light); }
.step-label { font-size: 9px; margin-top: 5px; text-align: center; color: var(--gray500); font-weight: 500; }
.step.active .step-label { color: var(--navy); font-weight: 700; }
.step.done .step-label { color: var(--magenta); }

.fade-in { animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }

.row-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--gray100); }
.row-item:last-child { border-bottom: none; }

.badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; margin-left: 5px; }
.tag { display: inline-flex; align-items: center; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; }

.divider { height: 1px; background: var(--border); margin: 14px 0; }

.input-with-hint { position: relative; }
.input-hint { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--gray500); pointer-events: none; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ═══════════════════════════════════════════
// USERS & AUTH
// ═══════════════════════════════════════════
const USERS = [
  { id: 'violetta',  name: 'Violetta A.', role: 'Account Manager', password: 'rch2026', avatar: 'VA' },
  { id: 'elena',     name: 'Elena F.',    role: 'Team Leader', password: 'rch2026', avatar: 'EF' },
];

// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
const CLIENTS = [
  { id:1, name:"ABB Qatar",              company:"Rapid", contact:"Sarah Al-Mansour", email:"sarah@abb.qa" },
  { id:2, name:"Acrogym Sport Center",   company:"Rapid", contact:"Kirill Bazhanov",  email:"info@acrogym.qa" },
  { id:3, name:"Seaquest Services",      company:"RCHBS", contact:"Ahmad Siregar",    email:"accounts@seaquest.qa" },
  { id:4, name:"EY Qatar",              company:"Rapid", contact:"Finance Dept",     email:"invoices@ey.qa" },
  { id:5, name:"Hitachi Energy",         company:"Rapid", contact:"HR Dept",          email:"hr@hitachi.qa" },
  { id:6, name:"Property Finder Qatar", company:"RCHBS", contact:"Ops Team",         email:"ops@pf.qa" },
];

const SERVICES = [
  { id: 'qid', label: 'QID Renewal', price: 1220 },
  { id: 'visa', label: 'Work Visa', price: 300 },
  { id: 'hc', label: 'HC Issuance', price: 100 },
  { id: 'smartid', label: 'Smart ID Issuance', price: 200 },
  { id: 'gate', label: 'Gate Passes', price: 200 },
  { id: 'company', label: 'Company Registration Renewal', price: 2500 },
];

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let state = {
  screen: 'login',
  user: null,
  loginError: '',
  selectedClient: null,
  logStep: 0,
  logForm: { service: null, employees: [], card: null, govtFee: null, receipt: false },
};

function setState(patch) { Object.assign(state, patch); render(); }

// ═══════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════
function handleLogin(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  const user = USERS.find(u => u.id === username);
  if (!user || user.password !== password) {
    setState({ loginError: 'Invalid credentials' });
    return;
  }
  setState({ screen: 'app', user, loginError: '' });
}

function handleLogout() {
  setState({ screen: 'login', user: null, loginError: '', logStep: 0, selectedClient: null });
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function fmt(n) { return n.toLocaleString(); }

function logoSVG(size) {
  size = size || 36;
  return `<svg width="${size}" height="${size}" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <polygon points="8,90 92,10 58,90" fill="#8c0050"/>
    <polygon points="8,90 92,10 36,54" fill="#C4006A"/>
    <polygon points="92,10 58,90 36,54" fill="#e0439a"/>
  </svg>`;
}

// ═══════════════════════════════════════════
// VIEWS
// ═══════════════════════════════════════════
function viewDashboard() {
  return `
    <div class="stats-row">
      <div class="stat-card" style="--stat-color:var(--navy)">
        <div class="stat-label">My Clients</div>
        <div class="stat-value">${CLIENTS.length}</div>
        <div class="stat-sub">Active accounts</div>
      </div>
      <div class="stat-card" style="--stat-color:var(--magenta)">
        <div class="stat-label">Services Logged</div>
        <div class="stat-value">12</div>
        <div class="stat-sub">This month</div>
      </div>
      <div class="stat-card" style="--stat-color:var(--green)">
        <div class="stat-label">Pending Approval</div>
        <div class="stat-value">3</div>
        <div class="stat-sub">Waiting on Finance</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-header"><span class="card-title">My Clients</span></div>
        ${CLIENTS.map(c => `
          <div class="row-item">
            <div>
              <div style="font-weight:600;font-size:13px;color:var(--gray900)">${c.name}</div>
              <div style="font-size:10px;color:var(--gray500);margin-top:2px">${c.company}</div>
            </div>
            <button class="btn btn-primary btn-sm" onclick="setState({selectedClient:${c.id},logStep:0})">Log Service</button>
          </div>
        `).join('')}
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">Quick Stats</span></div>
        <div class="row-item">
          <span style="color:var(--gray500);font-size:12px">Services logged today</span>
          <strong style="color:var(--navy);font-size:14px">2</strong>
        </div>
        <div class="row-item">
          <span style="color:var(--gray500);font-size:12px">Awaiting approval</span>
          <strong style="color:var(--orange);font-size:14px">1</strong>
        </div>
        <div class="row-item">
          <span style="color:var(--gray500);font-size:12px">Total value (this month)</span>
          <strong style="color:var(--green);font-size:14px">QAR 18,500</strong>
        </div>
      </div>
    </div>
  `;
}

function viewLogService() {
  if (!state.selectedClient) return `<div style="padding:40px;text-align:center;color:var(--gray500)">Select a client to begin</div>`;

  const client = CLIENTS.find(c => c.id === state.selectedClient);
  const steps = ["Select Service", "Employee Details", "Payment Info", "Submit"];

  let html = `
    <button class="btn btn-ghost btn-sm" onclick="setState({selectedClient:null,logStep:0})" style="margin-bottom:16px">← Back</button>
    <div class="card" style="max-width:680px">
      <div class="card-header"><span class="card-title" style="font-size:15px">Log Service — ${client.name}</span></div>

      <div class="stepper">`;
  steps.forEach((s, i) => {
    const done   = i < state.logStep;
    const active = i === state.logStep;
    html += `<div class="step ${done ? 'done' : active ? 'active' : ''}">
      <div class="step-circle">${done ? '✓' : i + 1}</div>
      <div class="step-label">${s}</div>
    </div>`;
  });
  html += `</div>`;

  // Step 0: Select Service
  if (state.logStep === 0) {
    html += `<div style="padding:16px;border:1.5px solid var(--border);border-radius:10px">
      <label class="form-label">Service Type</label>
      <select class="form-input" onchange="setState({logForm:{...state.logForm, service: this.value}})">
        <option value="">Choose a service...</option>
        ${SERVICES.map(s => `<option value="${s.id}">${s.label} (QAR ${fmt(s.price)})</option>`).join('')}
      </select>
    </div>`;
  }

  // Step 1: Employee Details
  if (state.logStep === 1) {
    html += `<div style="padding:16px;border:1.5px solid var(--border);border-radius:10px">
      <label class="form-label">Number of Employees</label>
      <input type="number" class="form-input" value="1" min="1" max="20" onchange="setState({logForm:{...state.logForm, employees: Array(parseInt(this.value)).fill({name:'',date:''})}})" style="margin-bottom:12px">
      ${state.logForm.employees.map((e, i) => `
        <div style="margin-bottom:12px">
          <input class="form-input" type="text" placeholder="Employee ${i+1} name" value="${e.name || ''}" style="margin-bottom:6px">
          <input class="form-input" type="date" placeholder="Service date" value="${e.date || ''}">
        </div>
      `).join('')}
    </div>`;
  }

  // Step 2: Payment Info
  if (state.logStep === 2) {
    const svc = SERVICES.find(s => s.id === state.logForm.service);
    const total = svc ? svc.price * state.logForm.employees.length : 0;
    html += `<div style="padding:16px;border:1.5px solid var(--border);border-radius:10px">
      <label class="form-label">Payment Card</label>
      <select class="form-input" onchange="setState({logForm:{...state.logForm, card: this.value}})" style="margin-bottom:12px">
        <option value="">Select card...</option>
        <option value="rapid1">Rapid CC-1 (xxx1001)</option>
        <option value="rapid2">Rapid CC-2 (xxx3139)</option>
        <option value="rchbs">RCHBS CC (xxx5958)</option>
      </select>
      <label class="form-label">Total Amount</label>
      <div class="form-input" style="background:var(--navy-light);color:var(--navy);font-weight:700;font-size:16px">QAR ${fmt(total)}</div>
      <div style="margin-top:12px;padding:12px;background:var(--gray50);border-radius:8px">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px">
          <input type="checkbox" onchange="setState({logForm:{...state.logForm, receipt: this.checked}})">
          <span>Receipt uploaded & verified</span>
        </label>
      </div>
    </div>`;
  }

  // Step 3: Confirm
  if (state.logStep === 3) {
    const svc = SERVICES.find(s => s.id === state.logForm.service);
    const total = svc ? svc.price * state.logForm.employees.length : 0;
    html += `<div style="padding:24px;border:2px solid var(--green);border-radius:10px;background:var(--green-lt);text-align:center">
      <div style="font-size:36px;margin-bottom:10px">✅</div>
      <div style="font-weight:700;color:var(--green);font-size:16px;margin-bottom:12px">Service Logged Successfully</div>
      <div style="font-size:12px;color:var(--gray700);line-height:1.8;text-align:left;max-width:400px;margin:0 auto">
        → <strong>${svc?.label}</strong> for <strong>${state.logForm.employees.length}</strong> employee(s)<br>
        → Total: <strong>QAR ${fmt(total)}</strong><br>
        → Payment: <strong>${state.logForm.card}</strong><br>
        → Status: <strong style="color:var(--orange)">Awaiting approval</strong><br><br>
        Elena will review and Elena will verify payment via SMS.
      </div>
    </div>`;
  }

  html += `<div style="display:flex;justify-content:space-between;margin-top:20px">
    <button class="btn btn-ghost btn-sm" onclick="setState({logStep:Math.max(0,state.logStep-1)})" ${state.logStep === 0 ? 'disabled' : ''}>← Back</button>
    <button class="btn btn-primary btn-sm" onclick="setState({logStep:Math.min(3,state.logStep+1)})" ${state.logStep === 3 ? 'disabled' : ''}>Next →</button>
  </div></div>`;

  return html;
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render() {
  const app = document.getElementById('app');

  if (state.screen === 'login') {
    app.innerHTML = `
      <div class="login-screen">
        <div class="login-container">
          <div class="login-header">
            <div class="login-logo">${logoSVG(44)}<span style="font-size:24px;font-weight:800;color:white">RCH</span></div>
            <h1 class="login-title">Account Manager</h1>
            <p class="login-subtitle">Log services and manage client accounts</p>
          </div>
          <form class="login-form" onsubmit="handleLogin(event)">
            <h2>Sign In</h2>
            <div class="form-group">
              <label class="form-label">Username</label>
              <select id="username" class="form-input" required>
                <option value="">Select your account...</option>
                ${USERS.map(u => `<option value="${u.id}">${u.name} (${u.role})</option>`).join('')}
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Password</label>
              <input type="password" id="password" class="form-input" placeholder="••••••" required>
            </div>
            ${state.loginError ? `<div class="login-error">❌ ${state.loginError}</div>` : ''}
            <button type="submit" class="login-btn">Sign In</button>
            <div class="login-hint">Demo password: <strong>rch2026</strong></div>
          </form>
        </div>
      </div>`;
    return;
  }

  // Main app
  const views = {
    dashboard: viewDashboard,
    log: viewLogService,
  };
  const currentView = state.selectedClient ? 'log' : 'dashboard';

  app.innerHTML = `
    <div class="app">
      <div class="sidebar">
        <div class="sidebar-brand">
          <div class="brand-logo">${logoSVG(32)}<div class="brand-wordmark"><div class="brand-rch">RCH</div><div class="brand-sub">CRM System</div></div></div>
        </div>
        <div class="sidebar-nav">
          <div class="nav-item ${!state.selectedClient ? 'active' : ''}" onclick="setState({selectedClient:null,logStep:0})">
            <span class="nav-icon">◈</span><span>Dashboard</span>
          </div>
          <div class="nav-item ${state.selectedClient ? 'active' : ''}" onclick="setState({selectedClient:CLIENTS[0].id,logStep:0})">
            <span class="nav-icon">⊕</span><span>Log Service</span>
          </div>
        </div>
        <div class="sidebar-footer">
          <div class="user-row">
            <div class="user-avatar">${state.user.avatar}</div>
            <div>
              <div class="user-name">${state.user.name}</div>
              <div class="user-role">${state.user.role}</div>
            </div>
          </div>
          <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>
      </div>
      <div class="main">
        <div class="topbar">
          <div class="topbar-left">
            <div class="topbar-title">${currentView === 'log' ? 'Log Service' : 'Dashboard'}</div>
            <div class="topbar-sub">Thursday, 6 March 2026</div>
          </div>
        </div>
        <div class="content"><div class="fade-in">${views[currentView]()}</div></div>
      </div>
    </div>`;
}

render();
</script>
</body>
</html>
