<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCH CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy:      #1B2D5E;
  --navy-dk:   #131f43;
  --navy-lt:   #e8ecf5;
  --magenta:   #C4006A;
  --mag-dk:    #9c0054;
  --mag-lt:    #fce8f3;
  --green:     #1a7a4a;
  --green-lt:  #e6f4ed;
  --orange:    #c97000;
  --orange-lt: #fff3e6;
  --red:       #c0272d;
  --red-lt:    #fdeaea;
  --purple:    #5c3d9e;
  --purple-lt: #ece8f7;
  --bg:        #f2f4f8;
  --white:     #ffffff;
  --border:    #e3e7f0;
  --g50:       #f8f9fc;
  --g100:      #f0f2f7;
  --g300:      #d4d9e8;
  --g500:      #8a93b0;
  --g700:      #4a5170;
  --g900:      #1a1f36;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--g900);-webkit-font-smoothing:antialiased}

/* ── Login ── */
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-dk) 100%);padding:20px}
.login-box{width:100%;max-width:440px}
.login-hd{text-align:center;margin-bottom:40px}
.login-logo{display:inline-flex;align-items:center;gap:12px;margin-bottom:18px}
.login-form{background:white;border-radius:16px;padding:32px;box-shadow:0 24px 60px rgba(0,0,0,.18)}
.login-form h2{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:22px;text-align:center}
.login-hint{font-size:11px;color:var(--g500);margin-top:18px;padding-top:16px;border-top:1px solid var(--border);text-align:center}
.login-err{color:var(--red);font-size:12px;margin-top:6px;font-weight:500}

/* ── Layout ── */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:var(--navy);display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.06)}
.sb-brand{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:9px}
.brand-rch{font-size:20px;font-weight:800;color:white;letter-spacing:-.5px;line-height:1}
.brand-sub{font-size:9px;font-weight:500;color:rgba(255,255,255,.35);letter-spacing:1.2px;text-transform:uppercase;margin-top:2px}
.sb-nav{padding:10px 8px;flex:1;overflow-y:auto}
.nav-section{font-size:9px;font-weight:700;color:rgba(255,255,255,.25);letter-spacing:1px;text-transform:uppercase;padding:12px 12px 5px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:7px;cursor:pointer;color:rgba(255,255,255,.5);font-size:13px;font-weight:500;margin-bottom:1px;transition:background .14s,color .14s;position:relative}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.8)}
.nav-item.active{background:rgba(196,0,106,.18);color:#f0a0cc;font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--magenta);border-radius:0 2px 2px 0}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--magenta);color:white;font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px}
.sb-footer{padding:14px 16px;border-top:1px solid rgba(255,255,255,.08)}
.user-row{display:flex;align-items:center;gap:9px}
.u-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--magenta),var(--mag-dk));color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.u-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.85)}
.u-role{font-size:10px;color:rgba(255,255,255,.32);margin-top:1px}
.logout-btn{margin-top:8px;width:100%;padding:6px;background:rgba(255,255,255,.09);border:none;border-radius:5px;color:rgba(255,255,255,.65);font-size:11px;cursor:pointer;transition:all .14s}
.logout-btn:hover{background:rgba(255,255,255,.15);color:white}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:white;border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-title{font-size:15px;font-weight:700;color:var(--navy)}
.tb-sub{font-size:11px;color:var(--g500);margin-top:1px}
.content{flex:1;overflow-y:auto;padding:22px 28px}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--g300);border-radius:3px}

/* ── Components ── */
.card{background:white;border-radius:12px;box-shadow:0 1px 3px rgba(27,45,94,.07),0 0 0 1px rgba(27,45,94,.05);padding:20px;margin-bottom:16px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:13px;font-weight:700;color:var(--navy)}

.stats-row{display:flex;gap:14px;margin-bottom:20px}
.stat{background:white;border-radius:12px;padding:16px 18px;box-shadow:0 1px 3px rgba(27,45,94,.07),0 0 0 1px rgba(27,45,94,.05);flex:1;position:relative;overflow:hidden}
.stat::after{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--sc,var(--navy));border-radius:12px 0 0 12px}
.stat-lbl{font-size:10px;font-weight:600;color:var(--g500);text-transform:uppercase;letter-spacing:.6px}
.stat-val{font-size:24px;font-weight:800;color:var(--sc,var(--navy));margin-top:4px;line-height:1}
.stat-sub{font-size:10px;color:var(--g500);margin-top:3px}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

.btn{border:none;padding:8px 16px;border-radius:8px;font-weight:600;cursor:pointer;font-size:13px;font-family:inherit;transition:all .14s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{filter:brightness(1.08)}
.btn:disabled{opacity:.35;cursor:not-allowed;filter:none}
.btn-primary{background:var(--magenta);color:white}
.btn-navy{background:var(--navy);color:white}
.btn-success{background:var(--green);color:white}
.btn-danger{background:var(--red);color:white}
.btn-ghost{background:var(--g100);color:var(--g700);border:1px solid var(--border)}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:6px}
.btn-xs{padding:3px 9px;font-size:10px;border-radius:5px}

.form-group{margin-bottom:15px}
.form-label{font-size:10px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px}
.form-input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--g50);font-size:13px;font-family:inherit;color:var(--g900);transition:border-color .14s}
.form-input:focus{outline:none;border-color:var(--magenta);background:white}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.row-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--g100)}
.row-item:last-child{border-bottom:none}

/* Status badges */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;letter-spacing:.2px}
.b-pending{background:var(--orange-lt);color:var(--orange)}
.b-approved{background:var(--green-lt);color:var(--green)}
.b-rejected{background:var(--red-lt);color:var(--red)}
.b-expensed{background:var(--purple-lt);color:var(--purple)}
.b-invoiced{background:var(--navy-lt);color:var(--navy)}
.b-ops{background:#e0f2fe;color:#0369a1}

/* Stepper */
.stepper{display:flex;align-items:flex-start;margin-bottom:22px}
.step{flex:1;display:flex;flex-direction:column;align-items:center;position:relative}
.step:not(:last-child)::after{content:'';position:absolute;top:13px;left:50%;width:100%;height:2px;background:var(--g300)}
.step.done::after,.step.active::after{background:var(--magenta)}
.step-circle{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;z-index:1;background:var(--g300);color:var(--g500);transition:all .25s}
.step.done .step-circle{background:var(--magenta);color:white}
.step.active .step-circle{background:var(--navy);color:white;box-shadow:0 0 0 4px var(--navy-lt)}
.step-lbl{font-size:9px;margin-top:4px;text-align:center;color:var(--g500);font-weight:500}
.step.active .step-lbl{color:var(--navy);font-weight:700}
.step.done .step-lbl{color:var(--magenta)}

/* Log entry card */
.log-card{border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;background:white;transition:border-color .15s}
.log-card:hover{border-color:var(--g300)}
.log-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.log-card-actions{display:flex;gap:6px;flex-shrink:0}
.log-meta{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.log-meta-item{font-size:11px;color:var(--g500);display:flex;align-items:center;gap:4px}

/* Invoice */
.invoice-box{border:2px solid var(--border);border-radius:12px;padding:24px;max-width:640px;margin:0 auto}
.invoice-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
.invoice-table{width:100%;border-collapse:collapse;margin:16px 0}
.invoice-table th{text-align:left;font-size:10px;font-weight:700;color:var(--g500);text-transform:uppercase;padding:6px 10px;border-bottom:2px solid var(--border)}
.invoice-table td{padding:9px 10px;font-size:12px;border-bottom:1px solid var(--g100)}
.invoice-total{text-align:right;margin-top:12px}

.fade{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}


.empty-state{text-align:center;padding:48px 20px;color:var(--g500)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-txt{font-size:14px;font-weight:600;margin-bottom:4px}
.empty-sub{font-size:12px}

/* ── AM Dashboard Kanban ── */
.kanban-wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:4px}
.kanban-col{background:var(--g50);border-radius:12px;border:1px solid var(--border);padding:12px;min-height:220px;display:flex;flex-direction:column}
.kanban-col-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.kanban-col-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.kanban-count{font-size:10px;font-weight:700;background:var(--g300);color:var(--g700);border-radius:10px;padding:1px 7px}
.k-card{background:white;border-radius:8px;border:1px solid var(--border);padding:10px 12px;margin-bottom:8px;border-left:3px solid var(--kc,var(--border));box-shadow:0 1px 2px rgba(27,45,94,.05)}
.k-card:last-child{margin-bottom:0}
.k-card-client{font-size:12px;font-weight:700;color:var(--g900);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.k-card-svc{font-size:10px;color:var(--g500);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.k-card-footer{display:flex;justify-content:space-between;align-items:center}
.k-card-date{font-size:10px;color:var(--g500)}
.k-card-amt{font-size:11px;font-weight:700;color:var(--navy)}
/* AM Client Table */
.client-table{width:100%;border-collapse:collapse}
.client-table th{text-align:left;font-size:10px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.5px;padding:7px 12px;border-bottom:2px solid var(--border)}
.client-table td{padding:10px 12px;font-size:12px;border-bottom:1px solid var(--g100);vertical-align:middle}
.client-table tr:last-child td{border-bottom:none}
.client-table tr:hover td{background:var(--g50)}
.ar-bar-wrap{width:80px;height:5px;background:var(--g100);border-radius:3px;display:inline-block;vertical-align:middle;margin-right:6px}
.ar-bar-fill{height:100%;border-radius:3px;background:var(--bc,var(--green))}

function dbLoad() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function dbSave(logs) {
  localStorage.setItem(DB_KEY, JSON.stringify(logs));
}

function dbGet() {
  let logs = dbLoad();
  if (!logs) { logs = SEED; dbSave(logs); }
  return logs;
}

function dbUpdate(id, patch) {
  const logs = dbGet();
  const idx = logs.findIndex(l => l.id === id);
  if (idx !== -1) { Object.assign(logs[idx], patch); dbSave(logs); }
  return logs;
}

function dbAdd(log) {
  const logs = dbGet();
  logs.unshift(log);
  dbSave(logs);
}

function dbReset() {
  localStorage.removeItem(DB_KEY);
}

function handleLogin(e) {
  e.preventDefault();
  const uid2 = document.getElementById('uid').value;
  const user = USERS.find(u => u.id === uid2);
  if (!user) { set({loginError:'Please select a user'}); return; }
  set({screen:'app', user, loginError:'', view:'dashboard'});
}

function handleLogout() {
  set({screen:'login', user:null, loginError:'', view:'dashboard', logClient:null, logDone:false});
}

function startLog(clientId) {
  set({view:'log', logClient:clientId, logStep:0, logForm:{serviceId:'',qty:1,employees:[{name:'',date:''}],card:'',notes:''}, logDone:false});
}

function submitLog() {
  const client = CLIENTS.find(c=>c.id===S.logClient);
  const svc = SERVICES.find(s=>s.id===S.logForm.serviceId);
  if (!svc || !S.logForm.card) { alert('Please fill all fields'); return; }
  const total = svc.price * S.logForm.qty;
  const card = CARDS.find(c=>c.id===S.logForm.card);
  const log = {
    id: uid(),
    clientId: client.id, clientName: client.name,
    serviceId: svc.id, serviceName: svc.label,
    qty: S.logForm.qty, unitPrice: svc.price, total,
    card: S.logForm.card, cardLabel: card.label,
    employees: S.logForm.employees.slice(0, S.logForm.qty),
    submittedBy: S.user.id, submittedByName: S.user.name,
    submittedAt: new Date().toISOString(),
    status:'ops_pending',
    approvedBy:null, approvedByName:null, approvedAt:null, rejectedReason:null,
    expensedBy:null, expensedByName:null, expensedAt:null,
    invoiceId:null, invoicedBy:null, invoicedByName:null, invoicedAt:null,
    notes: S.logForm.notes
  };
  dbAdd(log);
  set({logDone:true, logStep:3});
}

function markOpsComplete(id) {
  dbUpdate(id, {status:'pending'});
  set({});
}

function approveLog(id) {
  dbUpdate(id, {status:'approved', approvedBy:S.user.id, approvedByName:S.user.name, approvedAt:new Date().toISOString()});
  set({});
}

function rejectLog(id, reason) {
  dbUpdate(id, {status:'rejected', rejectedReason:reason, approvedBy:S.user.id, approvedByName:S.user.name, approvedAt:new Date().toISOString()});
  set({rejectId:null, rejectReason:''});
}

function expenseLog(id) {
  dbUpdate(id, {status:'expensed', expensedBy:S.user.id, expensedByName:S.user.name, expensedAt:new Date().toISOString()});
  set({});
}

function generateInvoice(id) {
  const invId = 'INV-'+new Date().getFullYear()+'-'+String(dbGet().filter(l=>l.invoiceId).length+1).padStart(3,'0');
  dbUpdate(id, {status:'invoiced', invoiceId:invId, invoicedBy:S.user.id, invoicedByName:S.user.name, invoicedAt:new Date().toISOString()});
  set({view:'finance', invoiceLogId:id});
}

function updateEmp(idx, field, value) {
  const emps = [...S.logForm.employees];
  emps[idx] = {...emps[idx], [field]:value};
  S.logForm.employees = emps;
}

function updateQty(val) {
  const qty = Math.max(1, Math.min(20, parseInt(val)||1));
  const emps = Array.from({length:qty}, (_,i) => S.logForm.employees[i]||{name:'',date:''});
  S.logForm = {...S.logForm, qty, employees:emps};
}

function arStatus(ar, limit) {
  const pct = limit > 0 ? ar / limit : 0;
  if (pct >= 1)    return { label:'Follow up required', cls:'b-rejected', color:'var(--red)'    };
  if (pct >= 0.75) return { label:'Follow up soon',     cls:'b-pending',  color:'var(--orange)' };
  return                  { label:'Good to service',    cls:'b-approved', color:'var(--green)'  };
}

function vDashboardAM() {
  const allLogs = dbGet();
  const myLogs  = allLogs.filter(l => l.submittedBy === S.user.id);

  // Stats
  const now        = new Date();
  const weekAgo    = new Date(now); weekAgo.setDate(now.getDate() - 7);
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const thisWeekCount  = myLogs.filter(l => new Date(l.submittedAt) >= weekAgo).length;
  const thisMonthCount = myLogs.filter(l => new Date(l.submittedAt) >= monthStart).length;
  const pendingCount   = myLogs.filter(l => l.status === 'pending').length;
  const rejectedCount  = myLogs.filter(l => l.status === 'rejected').length;

  // Client list — grouped by company: Rapid first, then RCHBS
  const rapidClients = [...CLIENTS].filter(c => c.company === 'Rapid').sort((a,b) => a.name.localeCompare(b.name));
  const rchbsClients = [...CLIENTS].filter(c => c.company === 'RCHBS').sort((a,b) => a.name.localeCompare(b.name));

  const buildClientRows = (clients) => clients.map(c => {
    const invoicedLogs  = allLogs.filter(l => l.clientId === c.id && l.status === 'invoiced');
    const ar            = invoicedLogs.reduce((s,l) => s + l.total, 0);
    const invCount      = invoicedLogs.length;
    const limit         = c.creditLimit || 0;
    const st            = arStatus(ar, limit);
    const pct           = limit > 0 ? Math.min(ar / limit, 1) : 0;
    const blocked       = pct >= 1;
    return `
      <tr>
        <td>
          <div style="font-weight:600;font-size:13px;color:var(--g900)">${c.name}</div>
          <div style="font-size:10px;color:var(--g500);margin-top:2px">${c.contact}</div>
        </td>
        <td>
          <div style="font-weight:700;font-size:13px;color:var(--navy)">QAR ${fmt(ar)}</div>
          <div style="font-size:10px;color:var(--g500);margin-top:2px">${invCount} unpaid invoice${invCount!==1?'s':''}</div>
        </td>
        <td style="color:var(--g700);font-size:12px">QAR ${fmt(limit)}</td>
        <td>
          <div style="display:flex;align-items:center;gap:6px">
            <div class="ar-bar-wrap"><div class="ar-bar-fill" style="width:${Math.round(pct*100)}%;--bc:${st.color}"></div></div>
            <span style="font-size:10px;font-weight:600;color:${st.color}">${Math.round(pct*100)}%</span>
          </div>
        </td>
        <td>
          ${blocked
            ? `<span class="badge b-rejected" style="font-size:9px">Follow Up Required</span>`
            : pct >= 0.75
              ? `<span class="badge b-pending" style="font-size:9px">Follow Up Soon</span>`
              : `<button class="btn btn-primary btn-xs" onclick="startLog(${c.id})">+ Log Service</button>`
          }
        </td>
      </tr>`;
  }).join('');

  // Kanban — services removed from board once client pays
  const kanbanCols = [

    { title:'Pending Approval',  statuses:['pending'],             color:'var(--orange)', icon:'◷' },

    { title:'Invoiced',          statuses:['invoiced'],            color:'var(--navy)',   icon:'✓' },
  ];

  const kanbanHTML = kanbanCols.map(col => {
    const cards = allLogs.filter(l =>
      col.statuses.includes(l.status) &&
      (l.submittedBy === S.user.id || S.user.type === 'tl')

    const cardsHTML = cards.length === 0

      : cards.map(l => {
          const client = CLIENTS.find(c => c.id === l.clientId);
          const accent = client?.company === 'Rapid' ? 'var(--navy)' : 'var(--magenta)';
          const isOps = l.status === 'ops_pending';
          return `<div class="k-card" style="--kc:${accent}">

function vLogService() {
  if (!S.logClient) return `<div style="text-align:center;padding:48px;color:var(--g500)">Select a client to begin</div>`;
  const client = CLIENTS.find(c=>c.id===S.logClient);
  const svc = SERVICES.find(s=>s.id===S.logForm.serviceId);
  const total = svc ? svc.price * S.logForm.qty : 0;

  const steps = ['Service','Employees','Payment','Done'];
  let stepsHTML = `<div class="stepper">${steps.map((s,i)=>{
    const done=i<S.logStep, active=i===S.logStep;
    return `<div class="step ${done?'done':active?'active':''}">
      <div class="step-circle">${done?'✓':i+1}</div>
      <div class="step-lbl">${s}</div>
    </div>`;
  }).join('')}</div>`;

  let body = '';

  if (S.logStep === 0) {
    body = `
      <div class="form-group">
        <label class="form-label">Service Type</label>
        <select class="form-input" onchange="S.logForm.serviceId=this.value;render()">
          <option value="">Choose a service...</option>

      <div class="form-group">
        <label class="form-label">Number of Employees</label>

  }

  if (S.logStep === 1) {
    body = `
      <div style="font-size:12px;color:var(--g500);margin-bottom:14px">Enter name &amp; service date for each employee</div>
      ${S.logForm.employees.map((e,i)=>`
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
          <input class="form-input" type="text" placeholder="Employee ${i+1} name" value="${e.name||''}"

          <input class="form-input" type="date" value="${e.date||''}"
            onchange="updateEmp(${i},'date',this.value)">
        </div>`).join('')}`;
  }

  if (S.logStep === 2) {
    body = `
      <div class="form-group">
        <label class="form-label">Payment Card</label>
        <select class="form-input" onchange="S.logForm.card=this.value;render()">
          <option value="">Select card...</option>

        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Total Amount</label>
        <div class="form-input" style="background:var(--navy-lt);color:var(--navy);font-weight:800;font-size:16px">QAR ${fmt(total)}</div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes (optional)</label>
        <textarea class="form-input" rows="2" placeholder="Any notes..." oninput="S.logForm.notes=this.value">${S.logForm.notes||''}</textarea>
      </div>

        📋 Summary: <strong>${svc?.label}</strong> × ${S.logForm.qty} employee(s) = <strong>QAR ${fmt(total)}</strong>
      </div>`;
  }

  if (S.logStep === 3) {
    body = S.logDone
      ? `<div style="text-align:center;padding:24px">
          <div style="font-size:48px;margin-bottom:12px">✅</div>
          <div style="font-weight:800;font-size:16px;color:var(--green);margin-bottom:8px">Service Logged!</div>

          </div>
        </div>`
      : `<div style="text-align:center;padding:24px;color:var(--g500)">Loading...</div>`;
  }

  const canNext =
    (S.logStep===0 && S.logForm.serviceId && S.logForm.qty > 0) ||

    (S.logStep===2 && S.logForm.card);

function vAccountantDashboard() {
  const all = dbGet();
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);

  const expensed = all.filter(l => l.status === 'expensed');
  const invoiced = all.filter(l => l.status === 'invoiced');
  const invoicedThisMonth = invoiced.filter(l => new Date(l.invoicedAt) >= monthStart);
  const totalReceivables = invoiced.reduce((s, l) => s + l.total, 0);
  const totalExpensed = expensed.reduce((s, l) => s + l.total, 0);
  const invoicedThisMonthTotal = invoicedThisMonth.reduce((s, l) => s + l.total, 0);

  // Card spending
  const activeCards = all.filter(l => l.status !== 'rejected');
  const cardSpending = CARDS.map(c => {
    const spent = activeCards.filter(l => l.card === c.id).reduce((s, l) => s + l.total, 0);
    const pct = c.limit > 0 ? Math.min(spent / c.limit, 1) : 0;
    return { ...c, spent, pct };
  });
  const totalCardSpent = cardSpending.reduce((s, c) => s + c.spent, 0);

  // Aging: days since expensed but not invoiced
  const agingItems = expensed.map(l => {
    const expDate = new Date(l.expensedAt);
    const days = Math.floor((now - expDate) / (1000 * 60 * 60 * 24));
    return { ...l, ageDays: days };
  }).sort((a, b) => b.ageDays - a.ageDays);

  // Thursday invoice schedule
  const today = now.getDay(); // 0=Sun
  const daysToThurs = (4 - today + 7) % 7 || 7;
  const nextThursday = new Date(now);
  nextThursday.setDate(now.getDate() + daysToThurs);
  const isThursday = today === 4;

  return `
    <div style="margin-bottom:18px">
      <div style="font-size:15px;font-weight:700;color:var(--navy)">Accountant Dashboard</div>

      <div class="stat" style="--sc:var(--purple)">

      <div class="stat" style="--sc:var(--green)">
        <div class="stat-lbl">Invoiced This Month</div>
        <div class="stat-val">${invoicedThisMonth.length}</div>
        <div class="stat-sub">QAR ${fmt(invoicedThisMonthTotal)}</div>

        <div class="stat-lbl">Total Receivables</div>
        <div class="stat-val">QAR ${fmt(totalReceivables)}</div>

      <div class="stat" style="--sc:var(--orange)">
        <div class="stat-lbl">Card Spending</div>
        <div class="stat-val">QAR ${fmt(totalCardSpent)}</div>
        <div class="stat-sub">Across ${CARDS.length} cards</div>
      </div>
    </div>

    ${isThursday ? `
      <div style="background:linear-gradient(135deg,var(--magenta),var(--mag-dk));color:white;border-radius:12px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:14px;font-weight:700">It's Thursday — Invoice Day</div>
          <div style="font-size:12px;opacity:.8;margin-top:2px">${expensed.length} service${expensed.length !== 1 ? 's' : ''} ready to invoice · QAR ${fmt(totalExpensed)} total</div>
        </div>
        <button class="btn" style="background:white;color:var(--magenta);font-weight:700" onclick="set({view:'finance'})">Start Invoicing →</button>
      </div>
    ` : `
      <div style="background:var(--navy-lt);border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:12px;font-weight:600;color:var(--navy)">Next Invoice Day: ${nextThursday.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'})}</div>
          <div style="font-size:11px;color:var(--g500);margin-top:2px">${expensed.length} service${expensed.length !== 1 ? 's' : ''} queued · ${daysToThurs} day${daysToThurs !== 1 ? 's' : ''} away</div>
        </div>
        ${expensed.length > 0 ? `<button class="btn btn-navy btn-sm" onclick="set({view:'finance'})">View Queue</button>` : ''}

    `}

    <div class="grid-2">
      <div class="card">
        <div class="card-hd">
          <span class="card-title">Uninvoiced Services</span>
          <span class="badge" style="background:var(--purple-lt);color:var(--purple)">${agingItems.length} items</span>

              <span style="font-size:11px;font-weight:700;color:${c.pct >= 0.9 ? 'var(--red)' : c.pct >= 0.7 ? 'var(--orange)' : 'var(--navy)'}">QAR ${fmt(c.spent)} / ${fmt(c.limit)}</span>
            </div>
            <div style="height:6px;background:var(--g100);border-radius:3px;overflow:hidden">
              <div style="height:100%;width:${Math.round(c.pct * 100)}%;background:${c.pct >= 0.9 ? 'var(--red)' : c.pct >= 0.7 ? 'var(--orange)' : 'var(--green)'};border-radius:3px;transition:width .3s"></div>
            </div>
          </div>`).join('')}
        <div style="padding-top:10px;border-top:1px solid var(--g100);display:flex;justify-content:space-between">
          <span style="font-size:11px;font-weight:600;color:var(--g500)">Total across all cards</span>
          <span style="font-size:12px;font-weight:700;color:var(--navy)">QAR ${fmt(totalCardSpent)}</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-hd">

// ═══════════════════════════════════
// VIEW: Accounting Manager Dashboard (Arlene)
// ═══════════════════════════════════
function vAcctMgrDashboard() {
  const all = dbGet();
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const prevMonthStart = new Date(now.getFullYear(), now.getMonth() - 1, 1);

  const expensed = all.filter(l => l.status === 'expensed');
  const invoiced = all.filter(l => l.status === 'invoiced');
  const pending = all.filter(l => l.status === 'pending');
  const approved = all.filter(l => l.status === 'approved');
  const rejected = all.filter(l => l.status === 'rejected');
  const totalReceivables = invoiced.reduce((s, l) => s + l.total, 0);
  const totalExpensed = expensed.reduce((s, l) => s + l.total, 0);
  const invoicedThisMonth = invoiced.filter(l => new Date(l.invoicedAt) >= monthStart);
  const invoicedThisMonthTotal = invoicedThisMonth.reduce((s, l) => s + l.total, 0);
  const invoicedPrevMonth = invoiced.filter(l => { const d = new Date(l.invoicedAt); return d >= prevMonthStart && d < monthStart; });
  const invoicedPrevMonthTotal = invoicedPrevMonth.reduce((s, l) => s + l.total, 0);

  // Pipeline counts
  const pipeline = [
    { label: 'With OPs', count: all.filter(l=>l.status==='ops_pending').length, color: '#0369a1', bg: '#e0f2fe' },
    { label: 'Pending Approval', count: pending.length, color: 'var(--orange)', bg: 'var(--orange-lt)' },
    { label: 'Approved', count: approved.length, color: 'var(--green)', bg: 'var(--green-lt)' },
    { label: 'Expensed', count: expensed.length, color: 'var(--purple)', bg: 'var(--purple-lt)' },
    { label: 'Invoiced', count: invoiced.length, color: 'var(--navy)', bg: 'var(--navy-lt)' },
    { label: 'Rejected', count: rejected.length, color: 'var(--red)', bg: 'var(--red-lt)' },
  ];

  // Card spending
  const activeCards = all.filter(l => l.status !== 'rejected');
  const cardSpending = CARDS.map(c => {
    const spent = activeCards.filter(l => l.card === c.id).reduce((s, l) => s + l.total, 0);
    const pct = c.limit > 0 ? Math.min(spent / c.limit, 1) : 0;
    return { ...c, spent, pct };
  });

  // Revenue by company
  const rapidRevenue = invoiced.filter(l => CLIENTS.find(c=>c.id===l.clientId)?.company === 'Rapid').reduce((s,l) => s + l.total, 0);
  const rchbsRevenue = invoiced.filter(l => CLIENTS.find(c=>c.id===l.clientId)?.company === 'RCHBS').reduce((s,l) => s + l.total, 0);

  // Aging buckets for receivables
  const agingBuckets = { current: 0, days30: 0, days60: 0, over60: 0 };
  invoiced.forEach(l => {
    const days = Math.floor((now - new Date(l.invoicedAt)) / (1000 * 60 * 60 * 24));
    if (days <= 15) agingBuckets.current += l.total;
    else if (days <= 30) agingBuckets.days30 += l.total;
    else if (days <= 60) agingBuckets.days60 += l.total;
    else agingBuckets.over60 += l.total;
  });

  // Thursday
  const today = now.getDay();
  const isThursday = today === 4;
  const daysToThurs = (4 - today + 7) % 7 || 7;
  const nextThursday = new Date(now);
  nextThursday.setDate(now.getDate() + daysToThurs);

  // Receivables by client
  const clientReceivables = {};
  invoiced.forEach(l => {
    if (!clientReceivables[l.clientId]) {
      const cl = CLIENTS.find(c => c.id === l.clientId);
      clientReceivables[l.clientId] = { name: l.clientName, company: cl?.company || '', limit: cl?.creditLimit || 0, total: 0, count: 0, oldestDays: 0 };
    }
    clientReceivables[l.clientId].total += l.total;
    clientReceivables[l.clientId].count++;
    const days = Math.floor((now - new Date(l.invoicedAt)) / (1000 * 60 * 60 * 24));
    clientReceivables[l.clientId].oldestDays = Math.max(clientReceivables[l.clientId].oldestDays, days);
  });

  return `
    <div style="margin-bottom:18px">
      <div style="font-size:15px;font-weight:700;color:var(--navy)">Accounting Manager Dashboard</div>
      <div style="font-size:12px;color:var(--g500);margin-top:2px">${now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}${isThursday ? ' · <span style="color:var(--magenta);font-weight:600">Invoice Day</span>' : ''}</div>
    </div>

    <div class="stats-row">
      <div class="stat" style="--sc:var(--navy)">
        <div class="stat-lbl">Total Receivables</div>
        <div class="stat-val">QAR ${fmt(totalReceivables)}</div>
        <div class="stat-sub">${invoiced.length} outstanding</div>
      </div>
      <div class="stat" style="--sc:var(--green)">
        <div class="stat-lbl">Invoiced This Month</div>
        <div class="stat-val">QAR ${fmt(invoicedThisMonthTotal)}</div>
        <div class="stat-sub">${invoicedThisMonth.length} invoices · ${invoicedPrevMonthTotal > 0 ? (invoicedThisMonthTotal >= invoicedPrevMonthTotal ? '<span style="color:var(--green)">▲</span>' : '<span style="color:var(--red)">▼</span>') + ' vs last month' : 'first month'}</div>
      </div>
      <div class="stat" style="--sc:var(--purple)">
        <div class="stat-lbl">Pending Invoice</div>
        <div class="stat-val">${expensed.length}</div>
        <div class="stat-sub">QAR ${fmt(totalExpensed)} queued</div>
      </div>
      <div class="stat" style="--sc:var(--orange)">
        <div class="stat-lbl">Needs Attention</div>
        <div class="stat-val">${pending.length + rejected.length}</div>
        <div class="stat-sub">${pending.length} pending · ${rejected.length} rejected</div>
      </div>
    </div>

    ${isThursday ? `
      <div style="background:linear-gradient(135deg,var(--magenta),var(--mag-dk));color:white;border-radius:12px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between">
        <div>
          <div style="font-size:14px;font-weight:700">It's Thursday — Invoice Day</div>
          <div style="font-size:12px;opacity:.8;margin-top:2px">${expensed.length} service${expensed.length !== 1 ? 's' : ''} ready · QAR ${fmt(totalExpensed)} total</div>
        </div>
        <button class="btn" style="background:white;color:var(--magenta);font-weight:700" onclick="set({view:'finance'})">Start Invoicing →</button>
      </div>
    ` : ''}

    <div class="card" style="margin-bottom:16px">
      <div class="card-hd"><span class="card-title">Service Pipeline</span></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${pipeline.map(p => `
          <div style="background:${p.bg};border-radius:10px;padding:12px 16px;text-align:center;flex:1;min-width:100px">
            <div style="font-size:22px;font-weight:800;color:${p.color}">${p.count}</div>
            <div style="font-size:10px;color:${p.color};font-weight:600;margin-top:2px">${p.label}</div>
          </div>`).join('')}
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <div class="card-hd">
          <span class="card-title">Receivables Aging</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
          <div style="background:var(--green-lt);border-radius:8px;padding:12px;text-align:center">
            <div style="font-size:10px;font-weight:600;color:var(--green);margin-bottom:2px">0–15 DAYS</div>
            <div style="font-size:16px;font-weight:800;color:var(--green)">QAR ${fmt(agingBuckets.current)}</div>
          </div>
          <div style="background:var(--orange-lt);border-radius:8px;padding:12px;text-align:center">
            <div style="font-size:10px;font-weight:600;color:var(--orange);margin-bottom:2px">16–30 DAYS</div>
            <div style="font-size:16px;font-weight:800;color:var(--orange)">QAR ${fmt(agingBuckets.days30)}</div>
          </div>
          <div style="background:var(--red-lt);border-radius:8px;padding:12px;text-align:center">
            <div style="font-size:10px;font-weight:600;color:var(--red);margin-bottom:2px">31–60 DAYS</div>
            <div style="font-size:16px;font-weight:800;color:var(--red)">QAR ${fmt(agingBuckets.days60)}</div>
          </div>
          <div style="background:var(--purple-lt);border-radius:8px;padding:12px;text-align:center">
            <div style="font-size:10px;font-weight:600;color:var(--purple);margin-bottom:2px">60+ DAYS</div>
            <div style="font-size:16px;font-weight:800;color:var(--purple)">QAR ${fmt(agingBuckets.over60)}</div>
          </div>
        </div>
        <div style="padding-top:10px;border-top:1px solid var(--g100);display:flex;justify-content:space-between">
          <span style="font-size:11px;font-weight:600;color:var(--g500)">Total outstanding</span>
          <span style="font-size:13px;font-weight:700;color:var(--navy)">QAR ${fmt(totalReceivables)}</span>
        </div>
      </div>

      <div class="card">
        <div class="card-hd">
          <span class="card-title">Revenue by Company</span>
        </div>
        <div style="margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <span style="font-size:12px;font-weight:600;color:var(--navy)">Rapid Clearing House</span>
            <span style="font-size:13px;font-weight:700;color:var(--navy)">QAR ${fmt(rapidRevenue)}</span>
          </div>
          <div style="height:8px;background:var(--g100);border-radius:4px;overflow:hidden">
            <div style="height:100%;width:${totalReceivables > 0 ? Math.round(rapidRevenue/totalReceivables*100) : 0}%;background:var(--navy);border-radius:4px"></div>
          </div>
        </div>
        <div style="margin-bottom:16px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <span style="font-size:12px;font-weight:600;color:var(--magenta)">RCHBS</span>
            <span style="font-size:13px;font-weight:700;color:var(--magenta)">QAR ${fmt(rchbsRevenue)}</span>
          </div>
          <div style="height:8px;background:var(--g100);border-radius:4px;overflow:hidden">
            <div style="height:100%;width:${totalReceivables > 0 ? Math.round(rchbsRevenue/totalReceivables*100) : 0}%;background:var(--magenta);border-radius:4px"></div>
          </div>
        </div>
        <div style="padding-top:12px;border-top:1px solid var(--g100)">
          <div class="card-hd" style="margin-bottom:10px"><span class="card-title" style="font-size:11px">Card Utilization</span></div>
          ${cardSpending.map(c => `
            <div style="margin-bottom:8px">
              <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px">
                <span style="color:var(--g700)">${c.label}</span>
                <span style="font-weight:600;color:${c.pct >= 0.9 ? 'var(--red)' : 'var(--g700)'}">${Math.round(c.pct*100)}%</span>
              </div>
              <div style="height:4px;background:var(--g100);border-radius:2px;overflow:hidden">
                <div style="height:100%;width:${Math.round(c.pct*100)}%;background:${c.pct >= 0.9 ? 'var(--red)' : c.pct >= 0.7 ? 'var(--orange)' : 'var(--green)'};border-radius:2px"></div>
              </div>
            </div>`).join('')}
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-hd">
        <span class="card-title">Client Receivables</span>
        <span style="font-size:11px;color:var(--g500)">Outstanding balances by client</span>
      </div>
      ${Object.keys(clientReceivables).length === 0
        ? `<div style="text-align:center;padding:20px;color:var(--g500);font-size:12px">No outstanding receivables</div>`
        : `<table class="client-table">
          <thead><tr><th>Client</th><th>Company</th><th>Credit Limit</th><th>Outstanding</th><th>Utilization</th><th>Oldest</th><th>Status</th></tr></thead>
          <tbody>${Object.values(clientReceivables).sort((a,b) => b.total - a.total).map(c => {
            const utilPct = c.limit > 0 ? Math.min(c.total / c.limit, 1) : 0;
            const statusCls = utilPct >= 1 ? 'b-rejected' : utilPct >= 0.75 ? 'b-pending' : 'b-approved';
            const statusLbl = utilPct >= 1 ? 'Over Limit' : utilPct >= 0.75 ? 'Near Limit' : 'Healthy';
            return `<tr>
              <td style="font-weight:600">${c.name}</td>
              <td><span class="badge" style="background:${c.company==='Rapid'?'var(--navy-lt)':'var(--mag-lt)'};color:${c.company==='Rapid'?'var(--navy)':'var(--magenta)'}">${c.company}</span></td>
              <td>QAR ${fmt(c.limit)}</td>
              <td style="font-weight:700;color:var(--navy)">QAR ${fmt(c.total)} <span style="font-size:10px;font-weight:400;color:var(--g500)">(${c.count})</span></td>
              <td>
                <div style="display:flex;align-items:center;gap:6px">
                  <div class="ar-bar-wrap"><div class="ar-bar-fill" style="width:${Math.round(utilPct*100)}%;--bc:${utilPct>=1?'var(--red)':utilPct>=0.75?'var(--orange)':'var(--green)'}"></div></div>
                  <span style="font-size:10px;font-weight:600">${Math.round(utilPct*100)}%</span>
                </div>
              </td>
              <td style="font-size:11px;color:${c.oldestDays > 30 ? 'var(--red)' : 'var(--g700)'}">${c.oldestDays}d</td>
              <td><span class="badge ${statusCls}">${statusLbl}</span></td>
            </tr>`;
          }).join('')}
          </tbody>
        </table>`
      }
    </div>

    <div class="card">
      <div class="card-hd">
        <span class="card-title">Recent Activity</span>
        <button class="btn btn-ghost btn-xs" onclick="set({view:'finance'})">Invoice Queue →</button>
      </div>
      ${all.sort((a,b) => new Date(b.submittedAt) - new Date(a.submittedAt)).slice(0, 8).map(l => `
        <div class="row-item">
          <div style="flex:1">
            <div style="font-size:12px;font-weight:600">${l.clientName} · ${l.serviceName}</div>
            <div style="font-size:10px;color:var(--g500);margin-top:2px">${l.qty} emp · QAR ${fmt(l.total)} · ${fmtDate(l.submittedAt)} · by ${l.submittedByName}</div>
          </div>
          ${statusBadge(l.status)}
        </div>`).join('')}
    </div>`;
}

// ═══════════════════════════════════
// VIEW: CFO Dashboard
// ═══════════════════════════════════
function vCFO() {
  const all = dbGet();
  const total = all.filter(l=>l.status!=='rejected').reduce((s,l)=>s+l.total,0);
  const byStatus = s => all.filter(l=>l.status===s).length;
  return `
    <div style="margin-bottom:18px">
      <div style="font-size:15px;font-weight:700;color:var(--navy)">Management Overview</div>
      <div style="font-size:12px;color:var(--g500);margin-top:2px">${new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
    </div>

    <div class="stats-row">
      <div class="stat" style="--sc:var(--navy)"><div class="stat-lbl">Total Services</div><div class="stat-val">${all.length}</div><div class="stat-sub">All time</div></div>
      <div class="stat" style="--sc:var(--orange)"><div class="stat-lbl">Pending</div><div class="stat-val">${byStatus('pending')}</div><div class="stat-sub">Awaiting approval</div></div>
      <div class="stat" style="--sc:var(--green)"><div class="stat-lbl">Total Revenue</div><div class="stat-val">QAR ${fmt(total)}</div><div class="stat-sub">Processed</div></div>
    </div>

    <div class="card">
      <div class="card-hd"><span class="card-title">Pipeline Status</span></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        ${['pending','approved','expensed','invoiced','rejected'].map(s=>`
          <div style="background:var(--g50);border-radius:8px;padding:10px 16px;text-align:center;flex:1;min-width:90px">
            <div style="font-size:20px;font-weight:800;color:var(--navy)">${byStatus(s)}</div>
            <div style="font-size:10px;text-transform:capitalize;color:var(--g500);margin-top:2px">${s}</div>
          </div>`).join('')}
      </div>
    </div>

    <div class="card">
      <div class="card-hd"><span class="card-title">All Service Logs</span></div>
      ${all.map(l=>`
        <div class="row-item">
          <div>
            <div style="font-size:12px;font-weight:600">${l.clientName} · ${l.serviceName}</div>
            <div style="font-size:10px;color:var(--g500);margin-top:2px">${l.qty} emp · QAR ${fmt(l.total)} · ${fmtDate(l.submittedAt)} · by ${l.submittedByName}</div>
          </div>
          ${statusBadge(l.status)}
        </div>`).join('')}
    </div>`;
}

// ═══════════════════════════════════
// SHARED: Log Card
// ═══════════════════════════════════
function renderLogCard(l, showActions, action) {
  const actionsHTML = showActions
    ? `<div class="log-card-actions">
        <button class="btn btn-success btn-xs" onclick="approveLog('${l.id}')">✓ Approve</button>
        <button class="btn btn-danger btn-xs" onclick="set({rejectId:'${l.id}'})">✗ Reject</button>
      </div>`
    : action === 'expense'
      ? `<button class="btn btn-primary btn-xs" onclick="expenseLog('${l.id}')">Mark Expensed</button>`
      : action === 'invoice'
        ? `<button class="btn btn-navy btn-xs" onclick="generateInvoice('${l.id}')">Generate Invoice</button>`
        : '';

  return `
    <div class="log-card">
      <div class="log-card-top">
        <div>
          <span style="font-weight:700;font-size:13px">${l.clientName}</span>
          <span style="color:var(--g500);font-size:12px"> · ${l.serviceName}</span>
          ${statusBadge(l.status)}
        </div>
        ${actionsHTML}
      </div>
      <div class="log-meta">
        <span class="log-meta-item">👥 ${l.qty} employee(s)</span>
        <span class="log-meta-item">💰 QAR ${fmt(l.total)}</span>
        <span class="log-meta-item">💳 ${l.cardLabel}</span>
        <span class="log-meta-item">📅 ${fmtDate(l.submittedAt)}</span>
        <span class="log-meta-item">👤 ${l.submittedByName}</span>
      </div>
      ${l.rejectedReason ? `<div style="margin-top:8px;padding:8px 10px;background:var(--red-lt);border-radius:6px;font-size:11px;color:var(--red)">Rejected: ${l.rejectedReason}</div>` : ''}
    </div>`;
}

function renderRejectModal() {
  return `
    <div style="position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100" onclick="if(event.target===this)set({rejectId:null})">
      <div style="background:white;border-radius:14px;padding:28px;width:400px;box-shadow:0 20px 60px rgba(0,0,0,.2)">
        <div style="font-size:15px;font-weight:700;color:var(--navy);margin-bottom:14px">Reject Submission</div>
        <div class="form-group">
          <label class="form-label">Reason for rejection</label>
          <textarea class="form-input" rows="3" placeholder="Explain why..." oninput="S.rejectReason=this.value">${S.rejectReason}</textarea>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button class="btn btn-ghost btn-sm" onclick="set({rejectId:null,rejectReason:''})">Cancel</button>
          <button class="btn btn-danger btn-sm" onclick="rejectLog('${S.rejectId}',S.rejectReason)">Confirm Reject</button>
        </div>
      </div>
    </div>`;
}

// ═══════════════════════════════════
// NAV CONFIG PER ROLE
// ═══════════════════════════════════
function getNav(type) {
  const counts = (() => {
    const logs = dbGet();
    return {
      ops_pending: logs.filter(l=>l.status==='ops_pending').length,
      pending: logs.filter(l=>l.status==='pending').length,
      approved: logs.filter(l=>l.status==='approved').length,
      expensed: logs.filter(l=>l.status==='expensed').length,
    };
  })();

  const item = (view, icon, label, badge) =>
    `<div class="nav-item ${S.view===view?'active':''}" onclick="set({view:'${view}',invoiceLogId:null})">
      <span class="nav-icon">${icon}</span><span>${label}</span>
      ${badge ? `<span class="nav-badge">${badge}</span>` : ''}
    </div>`;

  const defs = {
    am: [
      item('dashboard','◈','Dashboard',''),
      item('log','⊕','Log Service',''),
      item('submissions','📋','My Submissions',''),
    ],
    tl: [
      item('dashboard','◈','Dashboard',''),
      item('log','⊕','Log Service',''),
      item('approvals','✓','Approval Queue', counts.pending||''),
      item('submissions','📋','All Submissions',''),
    ],
    expense: [
      item('expense','💰','Expense Tracker', counts.approved||''),
    ],
    accountant: [
      item('dashboard','◈','Dashboard',''),
      item('finance','🧾','Invoice Queue', counts.expensed||''),
      item('submissions','📋','All Submissions',''),
    ],
    acct_mgr: [
      item('dashboard','◈','Dashboard',''),
      item('finance','🧾','Invoice Queue', counts.expensed||''),
      item('submissions','📋','All Submissions',''),
    ],
    cfo: [
      item('cfo','📊','Overview',''),
    ],
  };
  return (defs[type]||[]).join('');
}

function getViewTitle() {
  const map = {dashboard:'Dashboard',log:'Log Service',submissions:'Submissions',approvals:'Approval Queue',expense:'Expense Tracker',finance:'Invoice Queue',cfo:'Management',invoiceLogId:'Invoice'};
  if (S.invoiceLogId) return 'Invoice Preview';
  return map[S.view]||'Dashboard';
}

function renderView() {
  const t = S.user?.type;
  if (S.view==='dashboard'  && (t==='am'||t==='tl'))        return vDashboardAM();
  if (S.view==='dashboard'  && t==='accountant')             return vAccountantDashboard();
  if (S.view==='dashboard'  && t==='acct_mgr')              return vAcctMgrDashboard();
  if (S.view==='log')                                        return vLogService();
  if (S.view==='submissions')                                return vSubmissions();
  if (S.view==='approvals'  && t==='tl')                     return vApprovals();
  if (S.view==='expense'    && t==='expense')                return vExpense();
  if (S.view==='finance'    && (t==='accountant'||t==='acct_mgr')) return vFinance();
  if (S.view==='cfo'        && t==='cfo')                   return vCFO();
  // Default landing per type
  if (t==='expense')    return vExpense();
  if (t==='accountant') return vAccountantDashboard();
  if (t==='acct_mgr')   return vAcctMgrDashboard();
  if (t==='cfo')        return vCFO();
  return vDashboardAM();
}

// ═══════════════════════════════════
// RENDER
// ═══════════════════════════════════
function render() {
  const root = document.getElementById('app');

  if (S.screen === 'login') {
    root.innerHTML = `
      <div class="login-wrap">
        <div class="login-box">
          <div class="login-hd">
            <div class="login-logo">${logoSVG(44)}<span style="font-size:26px;font-weight:800;color:white">RCH CRM</span></div>
            <div style="font-size:14px;color:rgba(255,255,255,.55);margin-top:4px">Service Management Platform</div>
          </div>
          <form class="login-form" onsubmit="handleLogin(event)">
            <h2>Sign In</h2>
            <div class="form-group">
              <label class="form-label">Select Your Role</label>
              <select id="uid" class="form-input" required>
                <option value="">Choose a user...</option>
                ${USERS.map(u=>`<option value="${u.id}">${u.name} — ${u.role}</option>`).join('')}
              </select>
            </div>
            ${S.loginError ? `<div class="login-err">⚠ ${S.loginError}</div>` : ''}
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:6px;padding:12px;font-size:14px">Enter</button>
            <div class="login-hint">Demo mode — select any role to continue</div>
          </form>
        </div>
      </div>`;
    return;
  }

  root.innerHTML = `
    <div class="app">
      <div class="sidebar">
        <div class="sb-brand">
          ${logoSVG(30)}
          <div><div class="brand-rch">RCH</div><div class="brand-sub">CRM System</div></div>
        </div>
        <div class="sb-nav">
          ${getNav(S.user.type)}
          <div style="height:1px;background:rgba(255,255,255,.07);margin:12px 8px"></div>
          <div class="nav-item" onclick="dbReset();set({})" style="font-size:11px;color:rgba(255,255,255,.25)">
            <span class="nav-icon">↺</span><span>Reset Demo Data</span>
          </div>
        </div>
        <div class="sb-footer">
          <div class="user-row">
            <div class="u-avatar">${S.user.avatar}</div>
            <div><div class="u-name">${S.user.name}</div><div class="u-role">${S.user.role}</div></div>
          </div>
          <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>
      </div>
      <div class="main">
        <div class="topbar">
          <div>
            <div class="tb-title">${getViewTitle()}</div>
            <div class="tb-sub">${new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
          </div>
        </div>
        <div class="content"><div class="fade">${renderView()}</div></div>
      </div>
    </div>`;
}

// boot
render();
</script>
</body>
</html>
