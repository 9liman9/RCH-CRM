<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCH CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy:      #1B2D5E;
  --navy-dk:   #131f43;
  --navy-lt:   #e8ecf5;
  --magenta:   #C4006A;
  --mag-dk:    #9c0054;
  --mag-lt:    #fce8f3;
  --green:     #1a7a4a;
  --green-lt:  #e6f4ed;
  --orange:    #c97000;
  --orange-lt: #fff3e6;
  --red:       #c0272d;
  --red-lt:    #fdeaea;
  --purple:    #5c3d9e;
  --purple-lt: #ece8f7;
  --bg:        #f2f4f8;
  --white:     #ffffff;
  --border:    #e3e7f0;
  --g50:       #f8f9fc;
  --g100:      #f0f2f7;
  --g300:      #d4d9e8;
  --g500:      #8a93b0;
  --g700:      #4a5170;
  --g900:      #1a1f36;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--g900);-webkit-font-smoothing:antialiased}

/* ── Login ── */
.login-wrap{display:flex;align-items:center;justify-content:center;height:100vh;
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-dk) 100%);padding:20px}
.login-box{width:100%;max-width:440px}
.login-hd{text-align:center;margin-bottom:40px}
.login-logo{display:inline-flex;align-items:center;gap:12px;margin-bottom:18px}
.login-form{background:white;border-radius:16px;padding:32px;box-shadow:0 24px 60px rgba(0,0,0,.18)}
.login-form h2{font-size:17px;font-weight:700;color:var(--navy);margin-bottom:22px;text-align:center}
.login-hint{font-size:11px;color:var(--g500);margin-top:18px;padding-top:16px;border-top:1px solid var(--border);text-align:center}
.login-err{color:var(--red);font-size:12px;margin-top:6px;font-weight:500}

/* ── Layout ── */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:var(--navy);display:flex;flex-direction:column;border-right:1px solid rgba(255,255,255,.06)}
.sb-brand{padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:9px}
.brand-rch{font-size:20px;font-weight:800;color:white;letter-spacing:-.5px;line-height:1}
.brand-sub{font-size:9px;font-weight:500;color:rgba(255,255,255,.35);letter-spacing:1.2px;text-transform:uppercase;margin-top:2px}
.sb-nav{padding:10px 8px;flex:1;overflow-y:auto}
.nav-section{font-size:9px;font-weight:700;color:rgba(255,255,255,.25);letter-spacing:1px;text-transform:uppercase;padding:12px 12px 5px;margin-top:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:7px;cursor:pointer;color:rgba(255,255,255,.5);font-size:13px;font-weight:500;margin-bottom:1px;transition:background .14s,color .14s;position:relative}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.8)}
.nav-item.active{background:rgba(196,0,106,.18);color:#f0a0cc;font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:18px;background:var(--magenta);border-radius:0 2px 2px 0}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--magenta);color:white;font-size:10px;font-weight:700;border-radius:10px;padding:1px 6px}
.sb-footer{padding:14px 16px;border-top:1px solid rgba(255,255,255,.08)}
.user-row{display:flex;align-items:center;gap:9px}
.u-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--magenta),var(--mag-dk));color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.u-name{font-size:12px;font-weight:600;color:rgba(255,255,255,.85)}
.u-role{font-size:10px;color:rgba(255,255,255,.32);margin-top:1px}
.logout-btn{margin-top:8px;width:100%;padding:6px;background:rgba(255,255,255,.09);border:none;border-radius:5px;color:rgba(255,255,255,.65);font-size:11px;cursor:pointer;transition:all .14s}
.logout-btn:hover{background:rgba(255,255,255,.15);color:white}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:white;border-bottom:1px solid var(--border);padding:0 28px;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-title{font-size:15px;font-weight:700;color:var(--navy)}
.tb-sub{font-size:11px;color:var(--g500);margin-top:1px}
.content{flex:1;overflow-y:auto;padding:22px 28px}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--g300);border-radius:3px}

/* ── Components ── */
.card{background:white;border-radius:12px;box-shadow:0 1px 3px rgba(27,45,94,.07),0 0 0 1px rgba(27,45,94,.05);padding:20px;margin-bottom:16px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:13px;font-weight:700;color:var(--navy)}

.stats-row{display:flex;gap:14px;margin-bottom:20px}
.stat{background:white;border-radius:12px;padding:16px 18px;box-shadow:0 1px 3px rgba(27,45,94,.07),0 0 0 1px rgba(27,45,94,.05);flex:1;position:relative;overflow:hidden}
.stat::after{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--sc,var(--navy));border-radius:12px 0 0 12px}
.stat-lbl{font-size:10px;font-weight:600;color:var(--g500);text-transform:uppercase;letter-spacing:.6px}
.stat-val{font-size:24px;font-weight:800;color:var(--sc,var(--navy));margin-top:4px;line-height:1}
.stat-sub{font-size:10px;color:var(--g500);margin-top:3px}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

.btn{border:none;padding:8px 16px;border-radius:8px;font-weight:600;cursor:pointer;font-size:13px;font-family:inherit;transition:all .14s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{filter:brightness(1.08)}
.btn:disabled{opacity:.35;cursor:not-allowed;filter:none}
.btn-primary{background:var(--magenta);color:white}
.btn-navy{background:var(--navy);color:white}
.btn-success{background:var(--green);color:white}
.btn-danger{background:var(--red);color:white}
.btn-ghost{background:var(--g100);color:var(--g700);border:1px solid var(--border)}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:6px}
.btn-xs{padding:3px 9px;font-size:10px;border-radius:5px}

.form-group{margin-bottom:15px}
.form-label{font-size:10px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px}
.form-input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--g50);font-size:13px;font-family:inherit;color:var(--g900);transition:border-color .14s}
.form-input:focus{outline:none;border-color:var(--magenta);background:white}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.row-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--g100)}
.row-item:last-child{border-bottom:none}

/* Status badges */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;letter-spacing:.2px}
.b-pending{background:var(--orange-lt);color:var(--orange)}
.b-approved{background:var(--green-lt);color:var(--green)}
.b-rejected{background:var(--red-lt);color:var(--red)}
.b-expensed{background:var(--purple-lt);color:var(--purple)}
.b-invoiced{background:var(--navy-lt);color:var(--navy)}
.b-ops{background:#e0f2fe;color:#0369a1}
.b-am-completing{background:var(--orange-lt);color:var(--orange)}

/* Stepper */
.stepper{display:flex;align-items:flex-start;margin-bottom:22px}
.step{flex:1;display:flex;flex-direction:column;align-items:center;position:relative}
.step:not(:last-child)::after{content:'';position:absolute;top:13px;left:50%;width:100%;height:2px;background:var(--g300)}
.step.done::after,.step.active::after{background:var(--magenta)}
.step-circle{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;z-index:1;background:var(--g300);color:var(--g500);transition:all .25s}
.step.done .step-circle{background:var(--magenta);color:white}
.step.active .step-circle{background:var(--navy);color:white;box-shadow:0 0 0 4px var(--navy-lt)}
.step-lbl{font-size:9px;margin-top:4px;text-align:center;color:var(--g500);font-weight:500}
.step.active .step-lbl{color:var(--navy);font-weight:700}
.step.done .step-lbl{color:var(--magenta)}

/* Log entry card */
.log-card{border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;background:white;transition:border-color .15s}
.log-card:hover{border-color:var(--g300)}
.log-card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.log-card-actions{display:flex;gap:6px;flex-shrink:0}
.log-meta{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.log-meta-item{font-size:11px;color:var(--g500);display:flex;align-items:center;gap:4px}

/* Invoice */
.invoice-box{border:2px solid var(--border);border-radius:12px;padding:24px;max-width:640px;margin:0 auto}
.invoice-hd{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
.invoice-table{width:100%;border-collapse:collapse;margin:16px 0}
.invoice-table th{text-align:left;font-size:10px;font-weight:700;color:var(--g500);text-transform:uppercase;padding:6px 10px;border-bottom:2px solid var(--border)}
.invoice-table td{padding:9px 10px;font-size:12px;border-bottom:1px solid var(--g100)}
.invoice-total{text-align:right;margin-top:12px}

.fade{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}


.empty-state{text-align:center;padding:48px 20px;color:var(--g500)}
.empty-icon{font-size:36px;margin-bottom:10px}
.empty-txt{font-size:14px;font-weight:600;margin-bottom:4px}
.empty-sub{font-size:12px}

/* ── AM Dashboard Kanban ── */
.kanban-wrap{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-top:4px}
.kanban-col{background:var(--g50);border-radius:12px;border:1px solid var(--border);padding:12px;min-height:220px;display:flex;flex-direction:column}
.kanban-col-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.kanban-col-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.kanban-count{font-size:10px;font-weight:700;background:var(--g300);color:var(--g700);border-radius:10px;padding:1px 7px}
.k-card{background:white;border-radius:8px;border:1px solid var(--border);padding:10px 12px;margin-bottom:8px;border-left:3px solid var(--kc,var(--border));box-shadow:0 1px 2px rgba(27,45,94,.05)}
.k-card:last-child{margin-bottom:0}
.k-card-client{font-size:12px;font-weight:700;color:var(--g900);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.k-card-svc{font-size:10px;color:var(--g500);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.k-card-footer{display:flex;justify-content:space-between;align-items:center}
.k-card-date{font-size:10px;color:var(--g500)}
.k-card-amt{font-size:11px;font-weight:700;color:var(--navy)}
/* AM Client Table */
.client-table{width:100%;border-collapse:collapse}
.client-table th{text-align:left;font-size:10px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.5px;padding:7px 12px;border-bottom:2px solid var(--border)}
.client-table td{padding:10px 12px;font-size:12px;border-bottom:1px solid var(--g100);vertical-align:middle}
.client-table tr:last-child td{border-bottom:none}
.client-table tr:hover td{background:var(--g50)}
.ar-bar-wrap{width:80px;height:5px;background:var(--g100);border-radius:3px;display:inline-block;vertical-align:middle;margin-right:6px}
.ar-bar-fill{height:100%;border-radius:3px;background:var(--bc,var(--green))}

/* ── Invoice Queue Groups ── */
.inv-group{border:1.5px solid var(--border);border-radius:12px;margin-bottom:18px;background:white;overflow:hidden}
.inv-group-hd{padding:12px 16px;background:var(--navy-lt);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.inv-group-client{font-size:13px;font-weight:700;color:var(--navy)}
.inv-group-co{font-size:10px;font-weight:700;border-radius:4px;padding:2px 7px;letter-spacing:.3px}
.inv-group-tbl{width:100%;border-collapse:collapse}
.inv-group-tbl th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--g500);padding:7px 14px;border-bottom:1px solid var(--border);text-align:left}
.inv-group-tbl th.r,.inv-group-tbl td.r{text-align:right}
.inv-group-tbl td{padding:8px 14px;font-size:12px;border-bottom:1px solid var(--g100);vertical-align:middle}
.inv-group-tbl tr:last-child td{border-bottom:none}
.inv-group-tbl tr:hover td{background:var(--g50)}
.inv-group-foot{padding:12px 16px;background:var(--g50);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.inv-group-totals{display:flex;gap:20px;align-items:center}
.inv-group-total-item{font-size:11px;color:var(--g500)}
.inv-group-total-item span{font-weight:700;color:var(--g900)}
.inv-group-grand{font-size:14px;font-weight:800;color:var(--navy)}

/* ── Invoice Print Template ── */
.inv-wrap{border:1px solid var(--border);border-radius:12px;padding:32px;max-width:780px;margin:0 auto;background:white;font-size:13px}
.inv-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.inv-co-name{font-size:16px;font-weight:800;color:var(--navy);margin-top:8px;margin-bottom:3px}
.inv-co-info{font-size:11px;color:var(--g700);line-height:1.6}
.inv-title{font-size:34px;font-weight:900;color:var(--magenta);letter-spacing:-1px;text-align:right}
.inv-divider{border:none;border-top:2.5px solid var(--navy);margin:14px 0}
.inv-meta-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px;align-items:start}
.inv-client-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--g500);margin-bottom:5px}
.inv-client-name{font-size:14px;font-weight:700;color:var(--g900)}
.inv-client-sub{font-size:11px;color:var(--g500);margin-top:2px}
.inv-ref-side{text-align:right}
.inv-ref-tbl{margin-left:auto;border-collapse:collapse}
.inv-ref-tbl td{padding:2px 0;font-size:12px}
.inv-ref-tbl td:first-child{color:var(--g500);font-weight:600;padding-right:12px;text-align:right}
.inv-ref-tbl td:last-child{font-weight:700;color:var(--g900)}
.inv-tbl{width:100%;border-collapse:collapse;margin-bottom:0}
.inv-tbl th{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:8px 10px;border-top:2px solid var(--navy);border-bottom:2px solid var(--navy);color:var(--navy);text-align:left}
.inv-tbl th.r,.inv-tbl td.r{text-align:right}
.inv-tbl td{padding:7px 10px;font-size:12px;border-bottom:1px solid var(--g100);vertical-align:middle}
.inv-tbl tfoot tr:first-child td{font-weight:700;background:var(--g50);border-top:2px solid var(--navy);border-bottom:none;padding-top:9px}
.inv-tbl .inv-words-row td{font-size:11px;font-weight:500;color:var(--g500);border-top:none;padding-top:3px;padding-bottom:8px;font-style:italic;background:var(--g50)}
.inv-section{margin-top:18px;padding-top:16px;border-top:1px solid var(--border)}
.inv-section-hd{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--navy);margin-bottom:8px}
.inv-bank-tbl{border-collapse:collapse;font-size:12px}
.inv-bank-tbl td{padding:3px 0}
.inv-bank-tbl td:first-child{color:var(--g500);font-weight:600;min-width:120px;padding-right:10px}
.inv-notes-list div{font-size:12px;color:var(--g700);line-height:1.8}
.inv-footer-wrap{margin-top:18px;padding-top:14px;border-top:2px solid var(--navy);text-align:center}
.inv-footer-thanks{font-size:12px;font-weight:700;color:var(--navy);letter-spacing:1px;text-transform:uppercase}
.inv-footer-meta{font-size:10px;color:var(--g500);margin-top:5px;display:flex;align-items:center;justify-content:center;gap:8px}
.inv-actions{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:12px;border-top:1px solid var(--border)}

@media print {
  .sidebar,.topbar,.inv-actions,.no-print{display:none!important}
  .main{overflow:visible!important}
  .content{padding:10px!important;overflow:visible!important}
  .inv-wrap{border:none;border-radius:0;max-width:100%;padding:10px;box-shadow:none}
  .content > .fade{animation:none}
  body,html{background:white}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════
// USERS
// ═══════════════════════════════════
const USERS = [
  { id:'violetta', name:'Violetta A.', role:'Account Manager',      password:'rch2026', avatar:'VA', type:'am'      },
  { id:'elena',    name:'Elena F.',    role:'Team Leader',           password:'rch2026', avatar:'EF', type:'tl'      },
  { id:'gabi',     name:'Gabi M.',     role:'Expense Tracker',       password:'rch2026', avatar:'GM', type:'expense' },
  { id:'suleiman', name:'Suleiman M.', role:'Accountant',            password:'rch2026', avatar:'SM', type:'accountant' },
  { id:'arlene',   name:'Arlene D.',   role:'Accounting Manager',    password:'rch2026', avatar:'AD', type:'acct_mgr' },
  { id:'mohamad',  name:'Mohamad J.',  role:'CFO',                   password:'rch2026', avatar:'MJ', type:'cfo'    },
];

// ═══════════════════════════════════
// REFERENCE DATA
// ═══════════════════════════════════
const CLIENTS_SEED = [];

const CLIENTS_DB_KEY = 'rch_clients_v1';
function clientsLoad() { try { const r = localStorage.getItem(CLIENTS_DB_KEY); return r ? JSON.parse(r) : null; } catch(e) { return null; } }
function clientsSave(c) { localStorage.setItem(CLIENTS_DB_KEY, JSON.stringify(c)); }
function clientsGet() { let c = clientsLoad(); if (!c) { c = CLIENTS_SEED.map(x=>({...x})); clientsSave(c); } return c; }
function clientUpdate(id, patch) { const cl = clientsGet(); const i = cl.findIndex(c=>c.id===id); if(i!==-1){Object.assign(cl[i],patch);clientsSave(cl);} return cl; }
function clientAdd(c) { const cl = clientsGet(); cl.push(c); clientsSave(cl); }
function clientsReset() { localStorage.removeItem(CLIENTS_DB_KEY); }

// Live accessor — always returns current client list
let CLIENTS = clientsGet();

// price = professional fee charged to client (gov charges are additional, as per receipt)
const SERVICES = [
  // ── COMPANY DOCUMENTS ──────────────────────────────────────────────────────
  { id:'cr-renewal',         label:'CR Renewal (incl. Chamber of Commerce)',         category:'Company Documents',      priceRapid:1000, priceRCHBS:500  },
  { id:'ml-renewal',         label:'Municipality License Renewal',                   category:'Company Documents',      priceRapid:3500, priceRCHBS:1000 },
  { id:'cc-renewal',         label:'Computer Card (CC) Renewal',                     category:'Company Documents',      priceRapid:500,  priceRCHBS:350  },
  { id:'cr-gov-renewal',     label:'CR Renewal (Gov. Contracted Company)',            category:'Company Documents',      priceRapid:3000, priceRCHBS:3000 },
  { id:'class-cert-renewal', label:'Classification Certificate Renewal',             category:'Company Documents',      priceRapid:1000, priceRCHBS:500  },
  { id:'class-cert-obtain',  label:'Classification Certificate Obtainment',          category:'Company Documents',      priceRapid:2000, priceRCHBS:1000 },
  { id:'aoa-amend',          label:'Articles of Association Amendment',               category:'Company Documents',      priceRapid:3000, priceRCHBS:1000 },
  { id:'cr-amend',           label:'CR Amendment (Address / Activities)',             category:'Company Documents',      priceRapid:1000, priceRCHBS:500  },
  { id:'ml-amend',           label:'Municipality License Amendment',                 category:'Company Documents',      priceRapid:2000, priceRCHBS:1000 },
  { id:'signatory-cr',       label:'Add / Remove Signatory – CR',                    category:'Company Documents',      priceRapid:1000, priceRCHBS:500  },
  { id:'signatory-cc-co',    label:'CC for Signatory (Under Company Sponsorship)',   category:'Company Documents',      priceRapid:500,  priceRCHBS:350  },
  { id:'signatory-cc-ext',   label:'CC for Signatory (Not Under Company Sponsorship)', category:'Company Documents',    priceRapid:500,  priceRCHBS:350  },
  { id:'cr-extract-ar',      label:'CR Extraction in Arabic',                        category:'Company Documents',      priceRapid:350,  priceRCHBS:150  },
  { id:'cr-extract-en',      label:'CR Extraction in English',                       category:'Company Documents',      priceRapid:350,  priceRCHBS:150  },

const DB_KEY = 'rch_logs_v6';

const SEED = []

function dbLoad() {
  try {
    const raw = localStorage.getItem(DB_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function dbSave(logs) {
  localStorage.setItem(DB_KEY, JSON.stringify(logs));
}

function dbGet() {
  let logs = dbLoad();
  if (!logs) { logs = SEED; dbSave(logs); }
  return logs;
}

function dbUpdate(id, patch) {
  const logs = dbGet();
  const idx = logs.findIndex(l => l.id === id);
  if (idx !== -1) { Object.assign(logs[idx], patch); dbSave(logs); }
  return logs;
}

function dbAdd(log) {
  const logs = dbGet();
  logs.unshift(log);
  dbSave(logs);
}

function dbReset() {
  localStorage.removeItem(DB_KEY);
  localStorage.removeItem(INV_KEY);
  clientsReset();
  CLIENTS = clientsGet();
}

// ── Invoice groups (consolidated invoices) ──
const INV_KEY = 'rch_invoices_v1';
function dbGetInvoices() { try { return JSON.parse(localStorage.getItem(INV_KEY)||'[]'); } catch(e) { return []; } }
function dbSaveInvoices(d) { localStorage.setItem(INV_KEY, JSON.stringify(d)); }

// Migrate old single-log invoiceIds into the new invoice groups store on first load
function migrateInvoices() {
  if (dbGetInvoices().length > 0) return;
  const logs = dbGet();
  const invoiced = logs.filter(l => l.invoiceId && l.status === 'invoiced');
  const groups = {};
  invoiced.forEach(l => {
    if (!groups[l.invoiceId]) groups[l.invoiceId] = [];
    groups[l.invoiceId].push(l);
  });
  const invoices = Object.entries(groups).map(([invId, grpLogs]) => {
    const first = grpLogs[0];
    return {
      id: invId,
      clientId: first.clientId,
      clientName: first.clientName,
      provider: first.provider,
      logIds: grpLogs.map(l => l.id),
      createdAt: first.invoicedAt,
      createdBy: first.invoicedBy,
      createdByName: first.invoicedByName,
      totalProfFee: grpLogs.reduce((s,l) => s + l.total, 0),
      totalGovFee: grpLogs.reduce((s,l) => s + (l.govFee||0), 0),
      grandTotal: grpLogs.reduce((s,l) => s + l.total + (l.govFee||0), 0)
    };
  });
  if (invoices.length > 0) dbSaveInvoices(invoices);
}

const fmt = n => Number(n).toLocaleString();
const fmtDate = iso => { const d = new Date(iso); return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); };
const fmtDT = iso => { const d = new Date(iso); return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); };
const fmtInvDate = iso => { const d = new Date(iso); const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return String(d.getDate()).padStart(2,'0')+'-'+mo[d.getMonth()]+'-'+d.getFullYear(); };

function numToWords(n) {
  const ones=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const tns=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function w(x){
    if(x===0)return'';
    if(x<20)return ones[x];
    if(x<100)return tns[Math.floor(x/10)]+(x%10?' '+ones[x%10]:'');
    if(x<1000)return ones[Math.floor(x/100)]+' Hundred'+(x%100?' and '+w(x%100):'');
    if(x<1000000)return w(Math.floor(x/1000))+' Thousand'+(x%1000?' '+w(x%1000):'');
    return w(Math.floor(x/1000000))+' Million'+(x%1000000?' '+w(x%1000000):'');
  }
  const r=Math.round(n); return r===0?'Zero':w(r);
}

// Service option groups — built once per company on first call, then cached
let _svcOpts = null;
function getServiceOpts(company, selectedId) {
  if (!_svcOpts) {
    const cats = [...new Set(SERVICES.map(s=>s.category))];
    _svcOpts = {};
    ['Rapid','RCHBS'].forEach(co => {
      _svcOpts[co] = cats.map(cat => {
        const items = SERVICES.filter(s=>s.category===cat);
        return `<optgroup label="${cat}">${items.map(s=>{
          const p = svcPrice(s, co);
          return `<option value="${s.id}">${s.label}${p?` — QAR ${fmt(p)}`:''}</option>`;
        }).join('')}</optgroup>`;
      }).join('');
    });
  }
  const base = _svcOpts[company] || '';
  if (selectedId) return base.replace(`value="${selectedId}"`, `value="${selectedId}" selected`);
  return base;
}

  set({

    completingIds: grouped.map(l=>l.id),
    completeForm: { paymentMethod:'', card:'', govFee:'', receiptRef:'', notes:'' }
  });
}

function applyInvoiceAmendment(invoiceId) {
  const overrides = S.amendedFees || {};
  if (!Object.keys(overrides).length) { S.amendingInvoice=false; render(); return; }
  const allDbLogs = dbGet();
  Object.entries(overrides).forEach(([logId, ov]) => {
    const patch = {};
    if (ov.govFee !== undefined) patch.govFee = ov.govFee;
    if (ov.profFee !== undefined) { patch.total = ov.profFee; patch.unitPrice = ov.profFee / (allDbLogs.find(l=>l.id===logId)?.qty||1); }
    if (Object.keys(patch).length) dbUpdate(logId, patch);
  });
  // Recalculate invoice totals
  const invoices = dbGetInvoices();
  const inv = invoices.find(i=>i.id===invoiceId);
  if (inv) {
    const logs = dbGet().filter(l=>inv.logIds.includes(l.id));
    const amendment = {date:new Date().toISOString(), by:S.user.name, changes:Object.keys(overrides).length+' line(s) updated'};
    Object.assign(inv, {
      totalProfFee: logs.reduce((s,l)=>s+l.total,0),
      totalGovFee: logs.reduce((s,l)=>s+(l.govFee||0),0),
      grandTotal: logs.reduce((s,l)=>s+l.total+(l.govFee||0),0),
      amendments: [...(inv.amendments||[]), amendment]
    });
    dbSaveInvoices(invoices);
  }
  S.amendingInvoice = false;
  S.amendedFees = {};
  set({});
}

// ── Receipt file storage ──
const RECEIPTS_KEY = 'rch_receipts_v1';
function dbGetReceipts() { try { return JSON.parse(localStorage.getItem(RECEIPTS_KEY)||'[]'); } catch(e) { return []; } }
function dbSaveReceipts(r) { localStorage.setItem(RECEIPTS_KEY, JSON.stringify(r)); }
function getReceiptsForLog(logId) { return dbGetReceipts().filter(r => r.logIds && r.logIds.includes(logId)); }

function handleReceiptUpload(files) {
  Array.from(files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      S.uploadedReceipts.push({
        id: 'RCT-'+Date.now().toString(36).toUpperCase()+'-'+Math.random().toString(36).slice(2,5).toUpperCase(),
        fileName: file.name,
        base64: e.target.result,
        mimeType: file.type
      });
      render();
    };
    reader.readAsDataURL(file);
  });
}

function removeUploadedReceipt(id) {
  S.uploadedReceipts = S.uploadedReceipts.filter(r => r.id !== id);
  render();
}

function toggleCompleteId(id) {
  const idx = S.completingIds.indexOf(id);
  if (idx === -1) S.completingIds.push(id);
  else S.completingIds.splice(idx, 1);
  render();
}

function submitCompletion() {
  const f = S.completeForm;
  if (!f.paymentMethod) { alert('Please select a payment method'); return; }
  if (f.paymentMethod === 'card' && !f.card) { alert('Please select a card'); return; }
  const card = f.paymentMethod === 'card' ? CARDS.find(c=>c.id===f.card) : null;
  const govFee = parseFloat(f.govFee) || 0;
  const receiptGroupId = 'RG-'+Date.now().toString(36).toUpperCase();
  const now = new Date().toISOString();

  // Save uploaded receipts
  if (S.uploadedReceipts.length > 0) {
    const existing = dbGetReceipts();
    S.uploadedReceipts.forEach(r => {
      existing.push({...r, logIds: [...S.completingIds], uploadedAt: now});
    });
    dbSaveReceipts(existing);
  }

  S.completingIds.forEach(id => {
    dbUpdate(id, {
      status:'pending',
      paymentMethod: f.paymentMethod,
      card: card ? card.id : '',
      cardLabel: card ? card.label : (f.paymentMethod === 'cash' ? 'Cash' : 'Other'),
      govFee,
      receiptRef: f.receiptRef || (S.uploadedReceipts.length > 0 ? S.uploadedReceipts.map(r=>r.fileName).join(', ') : ''),
      receiptGroupId,
      notes: f.notes || ''
    });
  });
  set({view:'dashboard', completingRequestId:null, completingIds:[], completeForm:{paymentMethod:'',card:'',govFee:'',receiptRef:'',notes:''}, uploadedReceipts:[]});
}

// ── Generate consolidated invoice for one client ──
function generateBatchInvoice(clientId) {
  migrateInvoices(); // ensure old invoices are migrated first
  const allLogs = dbGet().filter(l => l.clientId === clientId && l.status === 'expensed');
  const logIds = getClientSelection(clientId, allLogs.map(l => l.id)).filter(id => allLogs.find(l => l.id === id));
  if (!logIds.length) return;

  const year = new Date().getFullYear();
  let grpLogs = allLogs.filter(l => logIds.includes(l.id));
  // Apply fee overrides before generating invoice
  if (S.feeOverrides && Object.keys(S.feeOverrides).length) {
    const allDbLogs = dbGet();
    grpLogs = grpLogs.map(l => {
      const ov = S.feeOverrides[l.id];
      if (!ov) return l;
      const patch = {};
      if (ov.govFee !== undefined) patch.govFee = ov.govFee;
      if (ov.profFee !== undefined) { patch.total = ov.profFee; patch.unitPrice = ov.profFee / (l.qty||1); }
      if (Object.keys(patch).length) dbUpdate(l.id, patch);
      return {...l,...patch};
    });
  }
  const provider = grpLogs[0].provider;
  const prefix = provider === 'RCHBS' ? 'RCHBS' : 'RCH';
  const startSerial = provider === 'RCHBS' ? 2001 : 1001;
  const providerInvCount = dbGetInvoices().filter(i => i.provider === provider && i.id.includes('/' + year + '/')).length;
  const invId = 'INV/' + prefix + '/' + year + '/' + (startSerial + providerInvCount);
  const client = CLIENTS.find(c => c.id === clientId);
  const totalProfFee = grpLogs.reduce((s,l) => s + l.total, 0);
  const totalGovFee  = grpLogs.reduce((s,l) => s + (l.govFee||0), 0);

  const invoice = {
    id: invId,
    clientId,
    clientName: client ? client.name : grpLogs[0].clientName,
    provider: grpLogs[0].provider,
    logIds,
    createdAt: new Date().toISOString(),
    createdBy: S.user.id,
    createdByName: S.user.name,
    totalProfFee,
    totalGovFee,
    grandTotal: totalProfFee + totalGovFee
  };
  dbSaveInvoices([...dbGetInvoices(), invoice]);

  // Mark selected logs as invoiced
  const allDbLogs = dbGet();
  logIds.forEach(id => {
    const i = allDbLogs.findIndex(l => l.id === id);
    if (i >= 0) Object.assign(allDbLogs[i], {
      status: 'invoiced', invoiceId: invId,
      invoicedBy: S.user.id, invoicedByName: S.user.name,
      invoicedAt: new Date().toISOString()
    });
  });
  dbSave(allDbLogs);

  const sel = Object.assign({}, S.selectedLogs);
  delete sel[clientId];
  set({view: 'finance', invoiceId: invId, selectedLogs: sel});
}

function editLog(id) {
  const log = dbGet().find(l => l.id === id);
  if (!log) return;
  const client = CLIENTS.find(c=>c.id===log.clientId);
  set({

  const rchbsCount = CLIENTS.filter(c=>c.company==='RCHBS').length;

  const tabBtn = (label, count, company) => `
    <button class="btn ${tab===company ? 'btn-navy' : 'btn-ghost'} btn-sm" onclick="set({clientsTab:'${company}',editingClientId:null})" style="gap:4px">
      ${label} <span style="font-size:10px;opacity:.7">(${count})</span>
    </button>`;

  const tableRows = clients.map(c => {
    const logs = allLogs.filter(l => l.clientId === c.id);
    const invoicedTotal = logs.filter(l=>l.status==='invoiced').reduce((s,l)=>s+l.total, 0);
    const totalSpend = logs.filter(l=>l.status!=='rejected').reduce((s,l)=>s+l.total, 0);
    const serviceCount = logs.length;
    const pct = c.creditLimit > 0 ? Math.min(invoicedTotal / c.creditLimit, 1) : 0;
    const barColor = pct >= 1 ? 'var(--red)' : pct >= 0.75 ? 'var(--orange)' : 'var(--green)';

    if (S.editingClientId === c.id && S.editClientForm) {
      const f = S.editClientForm;
      return `<tr style="background:var(--navy-lt)">
        <td><input class="form-input" style="padding:5px 8px;font-size:12px" value="${f.name}" oninput="S.editClientForm.name=this.value"></td>
        <td><input class="form-input" style="padding:5px 8px;font-size:12px" value="${f.contact}" oninput="S.editClientForm.contact=this.value"></td>
        <td><input class="form-input" style="padding:5px 8px;font-size:12px" value="${f.email}" oninput="S.editClientForm.email=this.value"></td>
        <td><input class="form-input" style="padding:5px 8px;font-size:12px" value="${f.phone}" oninput="S.editClientForm.phone=this.value"></td>
        <td>
          <select class="form-input" style="padding:5px 8px;font-size:12px" onchange="S.editClientForm.type=this.value;render()">
            <option value="retainer" ${f.type==='retainer'?'selected':''}>Retainer</option>
            <option value="per-job" ${f.type==='per-job'?'selected':''}>Per-Job</option>
          </select>
        </td>
        <td>${['acct_mgr','cfo'].includes(S.user?.type)
          ? `<input class="form-input" style="padding:5px 8px;font-size:12px;width:90px" type="number" value="${f.creditLimit}" oninput="S.editClientForm.creditLimit=this.value">`
          : `<span style="font-size:12px">QAR ${fmt(f.creditLimit||0)}</span>`}</td>
        <td style="font-size:12px;color:var(--g500)" colspan="2">—</td>
        <td style="text-align:right">
          <div style="display:flex;gap:4px;justify-content:flex-end">
            <button class="btn btn-success btn-xs" onclick="saveEditClient()">Save</button>
            <button class="btn btn-ghost btn-xs" onclick="cancelEditClient()">Cancel</button>
          </div>
        </td>
      </tr>`;
    }

    return `<tr>
      <td><div style="font-weight:600;font-size:12px">${c.name}</div></td>
      <td style="font-size:12px">${c.contact}</td>
      <td style="font-size:11px;color:var(--g500)">${c.email||'—'}</td>
      <td style="font-size:11px;color:var(--g500);white-space:nowrap">${c.phone||'—'}</td>
      <td><span class="badge ${c.type==='retainer'?'b-invoiced':'b-ops'}" style="font-size:9px">${c.type==='retainer'?'Retainer':'Per-Job'}</span></td>
      <td style="font-size:12px;color:var(--g700)">QAR ${fmt(c.creditLimit)}</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="width:60px;height:5px;background:var(--g100);border-radius:3px">
            <div style="height:100%;border-radius:3px;background:${barColor};width:${Math.round(pct*100)}%"></div>
          </div>
          <span style="font-size:10px;font-weight:600;color:${barColor}">${Math.round(pct*100)}%</span>
        </div>
        <div style="font-size:10px;color:var(--g500);margin-top:2px">QAR ${fmt(invoicedTotal)} / ${fmt(c.creditLimit)}</div>
      </td>
      <td style="font-size:12px;text-align:center;color:var(--g700)">${serviceCount}</td>
      <td style="text-align:right">
        <button class="btn btn-ghost btn-xs" onclick="startEditClient(${c.id})">✎ Edit</button>
      </td>
    </tr>`;
  }).join('');

  // Add client form (inline row at top of table)
  const addRow = S.addingClient ? `<tr style="background:var(--green-lt)">
    <td><input class="form-input" style="padding:5px 8px;font-size:12px" placeholder="Company name" value="${S.newClientForm.name}" oninput="S.newClientForm.name=this.value"></td>
    <td><input class="form-input" style="padding:5px 8px;font-size:12px" placeholder="Contact person" value="${S.newClientForm.contact}" oninput="S.newClientForm.contact=this.value"></td>
    <td><input class="form-input" style="padding:5px 8px;font-size:12px" placeholder="Email" value="${S.newClientForm.email}" oninput="S.newClientForm.email=this.value"></td>
    <td><input class="form-input" style="padding:5px 8px;font-size:12px" placeholder="Phone" value="${S.newClientForm.phone}" oninput="S.newClientForm.phone=this.value"></td>
    <td>
      <select class="form-input" style="padding:5px 8px;font-size:12px" onchange="S.newClientForm.type=this.value;render()">
        <option value="per-job" ${S.newClientForm.type==='per-job'?'selected':''}>Per-Job</option>
        <option value="retainer" ${S.newClientForm.type==='retainer'?'selected':''}>Retainer</option>
      </select>
    </td>
    <td>${['acct_mgr','cfo'].includes(S.user?.type)
      ? `<input class="form-input" style="padding:5px 8px;font-size:12px;width:90px" type="number" placeholder="Limit" value="${S.newClientForm.creditLimit}" oninput="S.newClientForm.creditLimit=this.value">`
      : `<span style="font-size:11px;color:var(--g500)">Mgmt only</span>`}</td>
    <td colspan="2" style="font-size:10px;color:var(--g500)">New</td>
    <td style="text-align:right">
      <div style="display:flex;gap:4px;justify-content:flex-end">
        <button class="btn btn-success btn-xs" onclick="saveNewClient()">Add</button>
        <button class="btn btn-ghost btn-xs" onclick="set({addingClient:false})">Cancel</button>
      </div>
    </td>
  </tr>` : '';

  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div style="display:flex;gap:6px">
        ${tabBtn('Rapid Clearing House', rapidCount, 'Rapid')}
        ${tabBtn('RCHBS', rchbsCount, 'RCHBS')}
      </div>
      <button class="btn btn-primary btn-sm" onclick="set({addingClient:true,newClientForm:{name:'',company:'${tab}',contact:'',email:'',phone:'',type:'per-job',creditLimit:5000}})" style="gap:4px">
        <span style="font-size:14px">+</span> Add Client
      </button>
    </div>

    <div class="card" style="overflow-x:auto">
      <table class="client-table" style="min-width:900px">
        <thead><tr>
          <th>Client</th><th>Contact</th><th>Email</th><th>Phone</th><th>Type</th><th>Limit</th><th>A/R Usage</th><th style="text-align:center">Services</th><th style="text-align:right">Actions</th>
        </tr></thead>
        <tbody>
          ${addRow}
          ${tableRows}
        </tbody>
      </table>
    </div>`;
}

// ═══════════════════════════════════
// VIEW: New Service Wizard
// ═══════════════════════════════════
function vLogService() {
  const providerColor = S.logProvider === 'Rapid' ? 'var(--navy)' : S.logProvider === 'RCHBS' ? 'var(--magenta)' : 'var(--g500)';
  const providerBg    = S.logProvider === 'Rapid' ? 'var(--navy-lt)' : S.logProvider === 'RCHBS' ? 'var(--mag-lt)' : 'var(--g100)';
  const providerChip  = S.logProvider ? `<span style="font-size:11px;font-weight:700;color:${providerColor};background:${providerBg};padding:3px 9px;border-radius:20px">${S.logProvider}</span>` : '';

  const client = S.logClient ? CLIENTS.find(c=>c.id===S.logClient) : null;
  const steps = ['Client','Services','Details','Review','Done'];
  const stepsHTML = `<div class="stepper">${steps.map((s,i)=>{
    const done=i<S.logStep, active=i===S.logStep;
    return `<div class="step ${done?'done':active?'active':''}">
      <div class="step-circle">${done?'✓':i+1}</div>
      <div class="step-lbl">${s}</div>
    </div>`;
  }).join('')}</div>`;

  let body = '';

  // ── STEP 0: Client & Provider ──────────────────────────────────────────
  if (S.logStep === 0) {
    const allClients = [...CLIENTS].sort((a,b)=>a.name.localeCompare(b.name));
    const rapidClients = allClients.filter(c=>c.company==='Rapid');
    const rchbsClients = allClients.filter(c=>c.company==='RCHBS');
    body = `
      <div class="form-group">
        <label class="form-label">Client / Company</label>
        <select class="form-input" onchange="
          const cid=parseInt(this.value);
          const cl=CLIENTS.find(c=>c.id===cid);
          S.logClient=cid||null;
          if(cl && !S.logProvider) S.logProvider=cl.company;
          render()">
          <option value="">Choose a client...</option>
          <optgroup label="Rapid Clearing House">
            ${rapidClients.map(c=>`<option value="${c.id}" ${S.logClient===c.id?'selected':''}>${c.name}</option>`).join('')}
          </optgroup>
          <optgroup label="RCH Business Solutions">
            ${rchbsClients.map(c=>`<option value="${c.id}" ${S.logClient===c.id?'selected':''}>${c.name}</option>`).join('')}
          </optgroup>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Service Provided By</label>
        <div style="display:flex;gap:8px">
          <button class="btn ${S.logProvider==='Rapid'?'btn-navy':'btn-ghost'} btn-sm" onclick="S.logProvider='Rapid';render()" style="flex:1;justify-content:center">
            Rapid Clearing House
          </button>
          <button class="btn ${S.logProvider==='RCHBS'?'btn-primary':'btn-ghost'} btn-sm" onclick="S.logProvider='RCHBS';render()" style="flex:1;justify-content:center">
            RCH Business Solutions
          </button>
        </div>
        ${client && S.logProvider && client.company !== S.logProvider ? `<div style="margin-top:6px;font-size:11px;color:var(--orange);font-weight:500">Note: ${client.name} is usually under ${client.company} — using ${S.logProvider} for this request</div>` : ''}
      </div>`;
  }

  // ── STEP 1: Services ───────────────────────────────────────────────────
  if (S.logStep === 1) {
    const svcRows = S.logServices.map((s, idx) => {
      const svc = SERVICES.find(sv=>sv.id===s.serviceId);
      const listPrice = svc ? svcPrice(svc, S.logProvider) : 0;
      const up = s.unitPrice !== '' ? parseFloat(s.unitPrice)||0 : listPrice;
      const lineTotal = up * s.qty;
      const priceEdited = !!(svc && s.unitPrice !== '' && parseFloat(s.unitPrice) !== listPrice);
      return `
        <div style="border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;background:var(--g50);position:relative">
          ${S.logServices.length > 1 ? `<button onclick="removeServiceRow(${idx})" style="position:absolute;top:8px;right:10px;background:var(--red-lt);color:var(--red);border:none;border-radius:50%;width:22px;height:22px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center" title="Remove">✕</button>` : ''}
          <div style="font-size:10px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Service ${idx+1}</div>
          <div class="form-group" style="margin-bottom:10px">
            <select class="form-input" onchange="updateServiceField(${idx},'serviceId',this.value)">
              <option value="">Choose a service...</option>
              ${getServiceOpts(S.logProvider, s.serviceId)}
            </select>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
            <div>
              <label class="form-label" style="margin-bottom:3px">Qty</label>
              <input class="form-input" type="number" min="1" max="20" value="${s.qty}"
                onchange="updateServiceField(${idx},'qty',this.value)">
            </div>
            <div>
              <label class="form-label" style="margin-bottom:3px;display:flex;justify-content:space-between">
                <span>RCH Fee (QAR)</span>
                ${priceEdited ? `<span style="font-size:9px;color:var(--orange)">Custom</span>` : ''}
              </label>
              <input class="form-input" type="number" min="0" step="50" value="${s.unitPrice !== '' ? s.unitPrice : listPrice}"
                oninput="S.logServices[${idx}].unitPrice=this.value;render()">
            </div>
          </div>
          ${svc ? `<div style="margin-top:8px;font-size:11px;color:var(--g700)">Line total: <strong>QAR ${fmt(lineTotal)}</strong></div>` : ''}
        </div>`;
    }).join('');

    const grandTotal = S.logServices.reduce((sum, s) => {
      const svc = SERVICES.find(sv=>sv.id===s.serviceId);
      const listPrice = svc ? svcPrice(svc, S.logProvider) : 0;
      const up = s.unitPrice !== '' ? parseFloat(s.unitPrice)||0 : listPrice;
      return sum + up * s.qty;
    }, 0);

    body = `
      <div style="font-size:12px;color:var(--g500);margin-bottom:14px">Add the services being requested. You can add multiple services at once.</div>
      ${svcRows}
      <button class="btn btn-ghost btn-sm" onclick="addServiceRow()" style="width:100%;justify-content:center;margin-bottom:12px">+ Add Another Service</button>
      <div style="padding:10px 13px;background:var(--g50);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--g700);display:flex;justify-content:space-between">
        <span>Total RCH Fees (${S.logServices.length} service${S.logServices.length!==1?'s':''})</span>
        <strong>QAR ${fmt(grandTotal)}</strong>
      </div>`;
  }

  // ── STEP 2: Details ────────────────────────────────────────────────────
  if (S.logStep === 2) {
    const isEYClient = client && client.name === 'EY Qatar';
    const detailSections = S.logServices.map((s, idx) => {
      const svc = SERVICES.find(sv=>sv.id===s.serviceId);
      if (!svc) return '';
      const needsEmp = requiresEmployeeDetails(s.serviceId);
      const isGP = isGatePassService(s.serviceId);

      const empLabel = needsEmp ? `Employee Details (${s.qty})` : `Employee Name — optional (${s.qty})`;
      const empHTML = `
          <div style="margin-bottom:12px">
            <div style="font-size:10px;font-weight:700;color:var(--g500);text-transform:uppercase;margin-bottom:6px">${empLabel}</div>
            ${s.employees.slice(0, s.qty).map((e,i)=>`
              <div style="border:1px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:6px">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px">
                  <input class="form-input" type="text" placeholder="Employee name ${i+1}" value="${e.name||''}"
                    oninput="updateSvcEmp(${idx},${i},'name',this.value)">
                  <input class="form-input" type="date" value="${e.date||''}"
                    onchange="updateSvcEmp(${idx},${i},'date',this.value)">
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
                  <input class="form-input" type="text" placeholder="BU (optional)" value="${e.buCode||''}"
                    oninput="updateSvcEmp(${idx},${i},'buCode',this.value)" style="font-size:11px">
                  <input class="form-input" type="text" placeholder="Cost Center (optional)" value="${e.costCenter||''}"
                    oninput="updateSvcEmp(${idx},${i},'costCenter',this.value)" style="font-size:11px">
                </div>
              </div>`).join('')}
          </div>`;

      let deptHTML = '';
      if (isEYClient && isGP) {
        deptHTML = `
          <div class="form-group" style="margin-bottom:10px">
            <label class="form-label">EY Department (for Gate Pass)</label>
            <input class="form-input" list="ey-depts-${idx}" placeholder="Select or type department..." value="${s.department||''}"
              oninput="S.logServices[${idx}].department=this.value">
            <datalist id="ey-depts-${idx}">
              ${EY_DEPARTMENTS.map(d=>`<option value="${d}">`).join('')}
            </datalist>
          </div>`;
      }

      return `
        <div style="border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px">
          <div style="font-size:12px;font-weight:700;color:var(--navy);margin-bottom:10px">${svc.label} × ${s.qty}</div>
          ${empHTML}
          ${deptHTML}
          <div>
            <label class="form-label" style="margin-bottom:3px">Service Line <span style="font-weight:400;text-transform:none">(opt.)</span></label>
            <input class="form-input" type="text" placeholder="Service Line" value="${s.serviceLine||''}"
              oninput="S.logServices[${idx}].serviceLine=this.value">
          </div>
        </div>`;
    }).join('');

    body = `
      <div style="font-size:12px;color:var(--g500);margin-bottom:14px">Fill in details for each service. Employee fields apply to employee-based services. BU / Cost Center / Service Line are optional.</div>
      ${detailSections}`;
  }

  // ── STEP 3: Review & Submit ────────────────────────────────────────────
  if (S.logStep === 3) {
    const grandTotal = S.logServices.reduce((sum, s) => {
      const svc = SERVICES.find(sv=>sv.id===s.serviceId);
      const listPrice = svc ? svcPrice(svc, S.logProvider) : 0;
      const up = s.unitPrice !== '' ? parseFloat(s.unitPrice)||0 : listPrice;
      return sum + up * s.qty;
    }, 0);

    const reviewRows = S.logServices.map(s => {
      const svc = SERVICES.find(sv=>sv.id===s.serviceId);
      if (!svc) return '';
      const listPrice = svc ? svcPrice(svc, S.logProvider) : 0;
      const up = s.unitPrice !== '' ? parseFloat(s.unitPrice)||0 : listPrice;
      return `<tr>
        <td style="font-size:12px">${svc.label}</td>
        <td style="font-size:12px;text-align:center">${s.qty}</td>
        <td style="font-size:12px;text-align:right">QAR ${fmt(up)}</td>
        <td style="font-size:12px;text-align:right;font-weight:700">QAR ${fmt(up * s.qty)}</td>
      </tr>`;
    }).join('');

    body = `
      <div style="padding:14px;background:var(--g50);border-radius:10px;margin-bottom:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div>
            <div style="font-size:14px;font-weight:700;color:var(--navy)">${client?.name||'—'}</div>
            <div style="font-size:11px;color:var(--g500)">Provider: ${S.logProvider}</div>
          </div>
          ${providerChip}
        </div>
      </div>
      <table class="client-table" style="margin-bottom:14px">
        <thead><tr><th>Service</th><th style="text-align:center">Qty</th><th style="text-align:right">RCH Fee</th><th style="text-align:right">Subtotal</th></tr></thead>
        <tbody>${reviewRows}</tbody>
        <tfoot><tr style="border-top:2px solid var(--border)">
          <td colspan="3" style="font-weight:700;font-size:12px;padding-top:8px">Total RCH Fees</td>
          <td style="text-align:right;font-weight:800;font-size:14px;color:var(--navy);padding-top:8px">QAR ${fmt(grandTotal)}</td>
        </tr></tfoot>
      </table>
      <div style="padding:10px 13px;background:#e0f2fe;border:1px solid #bae6fd;border-radius:8px;font-size:11px;color:#0369a1">
        After submitting, the request goes to <strong>Operations</strong> for execution. Government fees will be recorded when OPs completes the service.
      </div>`;
  }

  // ── STEP 4: Done ───────────────────────────────────────────────────────
  if (S.logStep === 4) {
    const totalSvcs = S.logServices.length;
    body = S.logDone
      ? `<div style="text-align:center;padding:24px">
          <div style="font-size:48px;margin-bottom:12px">✅</div>
          <div style="font-weight:800;font-size:16px;color:var(--green);margin-bottom:8px">${S.editingLogId?'Service Updated!':'Service Request Created!'}</div>
          <div style="font-size:12px;color:var(--g500);line-height:1.8">
            <strong>${totalSvcs} service${totalSvcs!==1?'s':''}</strong> for <strong>${client?.name||'—'}</strong><br>
            Provider: <strong>${S.logProvider}</strong><br>
            Status: <span class="badge b-ops">With OPs</span><br><br>
            Operations team will execute these services.
          </div>
          <div style="display:flex;gap:10px;justify-content:center;margin-top:20px">
            <button class="btn btn-ghost" onclick="set({view:'dashboard',logClient:null,logDone:false})">Back to Dashboard</button>
            <button class="btn btn-primary" onclick="set({view:'submissions'})">View Submissions</button>
          </div>
        </div>`
      : `<div style="text-align:center;padding:24px;color:var(--g500)">Loading...</div>`;
  }

  // Navigation logic
  const hasValidServices = S.logServices.some(s => s.serviceId);
  const canNext =
    (S.logStep===0 && S.logClient && S.logProvider) ||
    (S.logStep===1 && hasValidServices) ||
    (S.logStep===2) ||
    (S.logStep===3);

  const backAction = S.logStep === 0
    ? `set({view:'dashboard'})`
    : `set({logStep:S.logStep-1})`;

  return `
    <button class="btn btn-ghost btn-sm" onclick="${backAction}" style="margin-bottom:14px">← Back</button>
    <div class="card" style="max-width:680px">
      <div class="card-hd">
        <span class="card-title" style="font-size:15px">${S.editingLogId?'Edit':'New'} Service${client?' — '+client.name:''}</span>
        ${providerChip}
      </div>
      ${stepsHTML}
      <div class="fade">${body}</div>
      ${S.logStep < 4 ? `
        <div style="display:flex;justify-content:space-between;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)">
          <button class="btn btn-ghost btn-sm" onclick="${backAction}" ${S.logStep===0?'disabled':''}>← Back</button>
          ${S.logStep < 3
            ? `<button class="btn btn-primary btn-sm" onclick="set({logStep:S.logStep+1})" ${!canNext?'disabled':''}>Next →</button>`
            : `<button class="btn btn-success btn-sm" onclick="submitNewServices()" ${!canNext?'disabled':''}>Submit to Operations →</button>`
          }
        </div>` : ''}
    </div>`;
}

// ═══════════════════════════════════
// VIEW: AM Complete Service (post-OPs)
// ═══════════════════════════════════
function vCompleteService() {
  const allLogs = dbGet();
  const selectedLogs = allLogs.filter(l => S.completingIds.includes(l.id));
  // Find related logs from same request that are also am_completing
  const firstLog = selectedLogs[0];
  const relatedLogs = firstLog && firstLog.requestId
    ? allLogs.filter(l => l.requestId === firstLog.requestId && l.status === 'am_completing')
    : selectedLogs;

  const f = S.completeForm;
  const provider = firstLog?.provider || 'Rapid';
  const availableCards = CARDS.filter(c => c.company === provider);

  const totalRchFees = selectedLogs.reduce((s,l) => s + l.total, 0);

  return `

      <div style="font-size:12px;color:var(--g500);margin-bottom:14px">OPs has completed these services. Upload the receipt, confirm payment, and submit for approval.</div>

      ${relatedLogs.length > 1 ? `
        <div style="font-size:10px;font-weight:700;color:var(--g500);text-transform:uppercase;margin-bottom:8px">Select Services to Complete Together</div>
        ${relatedLogs.map(l => {
          const checked = S.completingIds.includes(l.id);
          return `<label style="display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid ${checked?'var(--navy)':'var(--border)'};border-radius:8px;margin-bottom:6px;cursor:pointer;background:${checked?'var(--navy-lt)':'white'}">
            <input type="checkbox" ${checked?'checked':''} onchange="toggleCompleteId('${l.id}')">
            <div style="flex:1">
              <div style="font-size:12px;font-weight:600">${l.serviceName} × ${l.qty}</div>
              <div style="font-size:10px;color:var(--g500)">RCH Fee: QAR ${fmt(l.total)}</div>
            </div>
          </label>`;
        }).join('')}
      ` : `
        <div style="padding:10px 13px;background:var(--g50);border:1px solid var(--border);border-radius:8px;margin-bottom:14px">
          <div style="font-size:12px;font-weight:600">${firstLog?.serviceName} × ${firstLog?.qty}</div>
          <div style="font-size:11px;color:var(--g500)">RCH Fee: QAR ${fmt(firstLog?.total||0)}</div>
        </div>
      `}

      <div style="padding:8px 12px;background:var(--navy-lt);border-radius:8px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:11px;font-weight:600;color:var(--navy)">Total RCH Fees</span>
        <span style="font-size:14px;font-weight:800;color:var(--navy)">QAR ${fmt(totalRchFees)}</span>
      </div>

      <div class="form-group">
        <label class="form-label">Government Fee (from receipt)</label>
        <input class="form-input" type="number" min="0" step="10" placeholder="0" value="${f.govFee}"
          oninput="S.completeForm.govFee=this.value" onblur="render()" style="width:200px">
        <div style="font-size:10px;color:var(--g500);margin-top:3px">The actual amount OPs paid to the government</div>
      </div>

      <div class="form-group">
        <label class="form-label">Government Receipt(s)</label>
        <label style="display:inline-flex;align-items:center;gap:8px;cursor:pointer;padding:8px 14px;border:2px dashed var(--border);border-radius:8px;font-size:12px;color:var(--g500);background:var(--g50)">
          <span>📎 Upload receipt files</span>
          <input type="file" accept="application/pdf,image/*" multiple style="display:none"
            onchange="handleReceiptUpload(this.files)">
        </label>
        ${S.uploadedReceipts.length > 0 ? `
          <div style="margin-top:8px">
            ${S.uploadedReceipts.map(r => `
              <div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--navy-lt);border-radius:6px;margin-bottom:4px;font-size:12px">
                <span style="flex:1">${r.mimeType.startsWith('image/') ? '🖼️' : '📄'} ${r.fileName}</span>
                <button class="btn btn-ghost btn-xs" onclick="removeUploadedReceipt('${r.id}')" style="color:var(--red)">✕</button>
              </div>`).join('')}
          </div>
        ` : ''}
        <div style="font-size:10px;color:var(--g500);margin-top:6px">One receipt can cover all selected services. PDF or image files accepted.</div>
      </div>

      <div class="form-group">
        <label class="form-label">Payment Method</label>
        <div style="display:flex;gap:8px;margin-bottom:8px">
          ${PAYMENT_METHODS.map(pm => `
            <button class="btn ${f.paymentMethod===pm.id?(pm.id==='card'?'btn-navy':'btn-primary'):'btn-ghost'} btn-sm" onclick="S.completeForm.paymentMethod='${pm.id}';render()" style="flex:1;justify-content:center">
              ${pm.label}
            </button>`).join('')}
        </div>
      </div>

      ${f.paymentMethod === 'card' ? `
        <div class="form-group">
          <label class="form-label">Select Card</label>
          <select class="form-input" onchange="S.completeForm.card=this.value;render()">
            <option value="">Choose a card...</option>
            ${availableCards.map(c=>`<option value="${c.id}" ${f.card===c.id?'selected':''}>${c.label}</option>`).join('')}
          </select>
        </div>
      ` : ''}

      <div class="form-group">
        <label class="form-label">Notes (optional)</label>
        <textarea class="form-input" rows="2" placeholder="Any additional notes..." oninput="S.completeForm.notes=this.value">${f.notes||''}</textarea>
      </div>

      <div style="display:flex;justify-content:space-between;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)">
        <button class="btn btn-ghost btn-sm" onclick="set({view:'dashboard',completingRequestId:null,completingIds:[]})">Cancel</button>
        <button class="btn btn-success btn-sm" onclick="submitCompletion()" ${S.completingIds.length===0||!f.paymentMethod||(f.paymentMethod==='card'&&!f.card)?'disabled':''}>Submit for Approval →</button>
      </div>
    </div>`;
}

// ═══════════════════════════════════
// VIEW: Approval Queue (Elena / TL)
// ═══════════════════════════════════
function vApprovals() {
  const pending = dbGet().filter(l=>l.status==='pending');
  const totalValue = pending.reduce((s,l) => s+l.total+(l.govFee||0), 0);

  // Group by client for summary
  const byClient = {};
  pending.forEach(l => {
    if (!byClient[l.clientId]) byClient[l.clientId] = {name:l.clientName, count:0, total:0};
    byClient[l.clientId].count++;
    byClient[l.clientId].total += l.total + (l.govFee||0);
  });
  const clientSummaries = Object.values(byClient);

  return `
    <div class="stats-row">
      <div class="stat" style="--sc:var(--orange)">
        <div class="stat-lbl">Pending Review</div>
        <div class="stat-val">${pending.length}</div>
        <div class="stat-sub">${clientSummaries.length} client${clientSummaries.length!==1?'s':''}</div>
      </div>
      <div class="stat" style="--sc:var(--navy)">
        <div class="stat-lbl">Total Value</div>
        <div class="stat-val">QAR ${fmt(totalValue)}</div>
        <div class="stat-sub">Prof + Gov fees</div>
      </div>
    </div>

    ${pending.length === 0
      ? `<div class="empty-state"><div class="empty-icon">🎉</div><div class="empty-txt">All clear!</div><div class="empty-sub">No pending submissions.</div></div>`
      : `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <div style="font-size:11px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.5px">Pending Approvals</div>
          <button class="btn btn-success btn-sm" onclick="if(confirm('Approve all ${pending.length} pending items?')){${pending.map(l=>`approveLog('${l.id}')`).join(';')}}">
            Approve All (${pending.length})
          </button>
        </div>
        ${pending.map(l => {
          const expanded = S.expandedApprovalId === l.id;
          const receipts = getReceiptsForLog(l.id);
          const empList = (l.employees||[]).filter(e=>e.name);
          return `
            <div class="card" style="margin-bottom:10px;overflow:hidden">
              <div style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:12px 16px;border-bottom:${expanded?'1px solid var(--border)':'none'}"
                onclick="S.expandedApprovalId=S.expandedApprovalId==='${l.id}'?null:'${l.id}';render()">
                <span style="font-size:14px;color:var(--g300)">${expanded?'▾':'▸'}</span>
                <div style="flex:1">
                  <div style="font-size:13px;font-weight:700">${l.clientName} <span style="font-weight:400;color:var(--g500)">· ${l.serviceName}</span></div>
                  <div style="font-size:11px;color:var(--g500);margin-top:2px">${fmtDate(l.submittedAt)} · ${l.submittedByName} · Qty: ${l.qty}</div>
                </div>
                <div style="text-align:right">
                  <div style="font-size:13px;font-weight:700;color:var(--navy)">QAR ${fmt(l.total + (l.govFee||0))}</div>
                  ${l.govFee ? `<div style="font-size:10px;color:var(--red)">Gov: QAR ${fmt(l.govFee)}</div>` : ''}
                </div>
                <div style="display:flex;gap:6px;margin-left:8px" onclick="event.stopPropagation()">
                  <button class="btn btn-success btn-xs" onclick="approveLog('${l.id}')">✓ Approve</button>
                  <button class="btn btn-xs" style="background:var(--red-lt);color:var(--red)" onclick="set({rejectId:'${l.id}',rejectReason:''})">✕ Reject</button>
                </div>
              </div>
              ${expanded ? `
                <div style="padding:14px 16px;background:var(--g50);font-size:12px">
                  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                    <div>
                      <div style="font-size:10px;font-weight:700;color:var(--g500);text-transform:uppercase;margin-bottom:6px">Payment</div>
                      <div style="color:var(--g700)">${l.paymentMethod === 'card' ? `💳 ${l.cardLabel}` : l.paymentMethod === 'cash' ? '💵 Cash' : '—'}</div>
                      ${l.govFee ? `<div style="color:var(--red);margin-top:2px">Gov Fee: QAR ${fmt(l.govFee)}</div>` : ''}
                    </div>
                    <div>
                      <div style="font-size:10px;font-weight:700;color:var(--g500);text-transform:uppercase;margin-bottom:6px">BU / Cost Center</div>
                      <div style="color:var(--g700)">${l.buCode||'—'} ${l.costCenter ? '· '+l.costCenter : ''}</div>
                    </div>
                    ${empList.length > 0 ? `
                    <div style="grid-column:span 2">
                      <div style="font-size:10px;font-weight:700;color:var(--g500);text-transform:uppercase;margin-bottom:6px">Employees (${empList.length})</div>
                      <div>${empList.map(e=>`<span style="display:inline-block;padding:2px 8px;background:white;border:1px solid var(--border);border-radius:4px;margin:2px">${e.name}${e.date?' · '+e.date:''}</span>`).join('')}</div>
                    </div>` : ''}
                    ${l.notes ? `
                    <div style="grid-column:span 2">
                      <div style="font-size:10px;font-weight:700;color:var(--g500);text-transform:uppercase;margin-bottom:4px">Notes</div>
                      <div style="color:var(--g700)">${l.notes}</div>
                    </div>` : ''}
                    ${receipts.length > 0 ? `
                    <div style="grid-column:span 2">
                      <div style="font-size:10px;font-weight:700;color:var(--g500);text-transform:uppercase;margin-bottom:6px">Attached Receipts</div>
                      <div style="display:flex;gap:8px;flex-wrap:wrap">
                        ${receipts.map(r => r.mimeType.startsWith('image/') ? `
                          <img src="${r.base64}" style="width:80px;height:60px;object-fit:cover;border-radius:6px;border:1px solid var(--border)" title="${r.fileName}">
                        ` : `
                          <a href="${r.base64}" download="${r.fileName}" style="display:flex;align-items:center;gap:4px;padding:6px 10px;background:white;border:1px solid var(--border);border-radius:6px;text-decoration:none;font-size:11px;color:var(--navy)">📄 ${r.fileName}</a>
                        `).join('')}
                      </div>
                    </div>` : ''}
                  </div>
                </div>` : ''}
            </div>`;
        }).join('')}
      `
    }

    ${S.rejectId ? renderRejectModal() : ''}`;
}

// ═══════════════════════════════════
// VIEW: Expense Queue (Gabi)
// ═══════════════════════════════════
function vExpense() {
  const all = dbGet();
  const approved = all.filter(l=>l.status==='approved');
  const done = all.filter(l=>l.status==='expensed'||l.status==='invoiced');
  const totalGov = approved.reduce((s,l)=>s+(l.govFee||0),0);
  const totalProf = approved.reduce((s,l)=>s+l.total,0);

  // Group approved by client
  const byClient = {};
  approved.forEach(l => {
    if (!byClient[l.clientId]) byClient[l.clientId] = {clientId:l.clientId, clientName:l.clientName, company:CLIENTS.find(c=>c.id===l.clientId)?.company||'Rapid', logs:[]};
    byClient[l.clientId].logs.push(l);
  });
  const clientGroups = Object.values(byClient);

  const selIds = S.selectedExpenseIds || [];

  return `
    <div class="stats-row">
      <div class="stat" style="--sc:var(--orange)">
        <div class="stat-lbl">Ready to Expense</div>
        <div class="stat-val">${approved.length}</div>
        <div class="stat-sub">${clientGroups.length} client${clientGroups.length!==1?'s':''}</div>
      </div>
      <div class="stat" style="--sc:var(--red)">
        <div class="stat-lbl">Gov Fees</div>
        <div class="stat-val">QAR ${fmt(totalGov)}</div>
        <div class="stat-sub">To be expensed</div>
      </div>
      <div class="stat" style="--sc:var(--navy)">
        <div class="stat-lbl">Prof Fees</div>
        <div class="stat-val">QAR ${fmt(totalProf)}</div>
        <div class="stat-sub">RCH service fees</div>
      </div>
      <div class="stat" style="--sc:var(--green)">
        <div class="stat-lbl">Processed</div>
        <div class="stat-val">${done.length}</div>
        <div class="stat-sub">Expensed or invoiced</div>
      </div>
    </div>

    ${approved.length > 0 ? `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="font-size:11px;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:.5px">Ready to Expense</div>
        <div style="display:flex;gap:6px;align-items:center">
          ${selIds.length > 0 ? `
            <span style="font-size:12px;color:var(--g500)">${selIds.length} selected</span>
            <button class="btn btn-success btn-sm" onclick="expenseSelected()">
              Mark ${selIds.length} as Expensed
            </button>
            <button class="btn btn-ghost btn-sm" onclick="S.selectedExpenseIds=[];render()">Clear</button>
          ` : `
            <button class="btn btn-ghost btn-sm" onclick="S.selectedExpenseIds=${JSON.stringify(approved.map(l=>l.id))};render()">Select All</button>
          `}
        </div>
      </div>

      ${clientGroups.map(({clientId, clientName, company, logs}) => {
        const coBadge = company === 'Rapid'
          ? `<span class="badge" style="background:var(--navy-lt);color:var(--navy)">Rapid</span>`
          : `<span class="badge" style="background:var(--mag-lt);color:var(--magenta)">RCHBS</span>`;
        return `
          <div class="card" style="margin-bottom:12px">
            <div style="display:flex;align-items:center;gap:8px;padding-bottom:10px;margin-bottom:10px;border-bottom:1px solid var(--border)">
              ${coBadge}
              <span style="font-size:13px;font-weight:700;flex:1">${clientName}</span>
              <span style="font-size:11px;color:var(--g500)">${logs.length} service${logs.length!==1?'s':''}</span>
              <button class="btn btn-success btn-sm" onclick="${logs.map(l=>`expenseLog('${l.id}')`).join(';')};render()">
                Mark All Expensed
              </button>
            </div>
            ${logs.map(l => {
              const isChecked = selIds.includes(l.id);
              const receipts = getReceiptsForLog(l.id);
              const empList = (l.employees||[]).filter(e=>e.name);
              return `
                <div style="display:flex;align-items:flex-start;gap:10px;padding:10px;border:1px solid ${isChecked?'var(--navy)':'var(--border)'};border-radius:8px;margin-bottom:8px;background:${isChecked?'var(--navy-lt)':'white'};cursor:pointer"
                  onclick="const idx=S.selectedExpenseIds.indexOf('${l.id}');if(idx===-1)S.selectedExpenseIds.push('${l.id}');else S.selectedExpenseIds.splice(idx,1);render()">
                  <input type="checkbox" ${isChecked?'checked':''} style="margin-top:2px;cursor:pointer" onclick="event.stopPropagation()">
                  <div style="flex:1">
                    <div style="font-size:12px;font-weight:700">${l.serviceName} × ${l.qty}</div>
                    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px;font-size:11px;color:var(--g500)">
                      <div>💳 ${l.paymentMethod === 'card' ? l.cardLabel : l.paymentMethod === 'cash' ? 'Cash' : '—'}</div>
                      <div>BU: ${l.buCode||'—'} ${l.costCenter?'· CC: '+l.costCenter:''}</div>
                      <div style="color:${l.govFee?'var(--red)':'var(--g300)'}">Gov: ${l.govFee ? 'QAR '+fmt(l.govFee) : '—'}</div>
                    </div>
                    ${empList.length > 0 ? `<div style="font-size:11px;color:var(--g500);margin-top:4px">👤 ${empList.map(e=>e.name).join(', ')}</div>` : ''}
                    ${receipts.length > 0 ? `<div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">${receipts.map(r=>r.mimeType.startsWith('image/')?`<img src="${r.base64}" style="width:48px;height:36px;object-fit:cover;border-radius:4px;border:1px solid var(--border)">`:`<span style="font-size:10px;padding:2px 6px;background:var(--g50);border:1px solid var(--border);border-radius:4px">📄 ${r.fileName}</span>`).join('')}</div>` : ''}
                  </div>
                  <div style="text-align:right">
                    <div style="font-weight:700;font-size:13px;color:var(--navy)">QAR ${fmt(l.total+(l.govFee||0))}</div>
                    <button class="btn btn-success btn-xs" style="margin-top:6px" onclick="event.stopPropagation();expenseLog('${l.id}')">Mark Expensed</button>
                  </div>
                </div>`;
            }).join('')}
          </div>`;
      }).join('')}
    ` : `<div class="empty-state"><div class="empty-icon">✅</div><div class="empty-txt">Nothing to expense right now</div></div>`}

    ${done.length > 0 ? `
      <div style="font-size:11px;font-weight:700;color:var(--g500);text-transform:uppercase;margin:16px 0 8px;letter-spacing:.5px">Previously Processed (${done.length})</div>
      ${done.slice(0,10).map(l => `
        <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:12px">
          <div style="flex:1">
            <span style="font-weight:600">${l.clientName}</span>
            <span style="color:var(--g500)"> · ${l.serviceName} × ${l.qty}</span>
          </div>
          <div style="color:var(--navy);font-weight:700">QAR ${fmt(l.total+(l.govFee||0))}</div>
          ${statusBadge(l.status)}
        </div>`).join('')}
      ${done.length > 10 ? `<div style="font-size:11px;color:var(--g500);text-align:center;padding:8px">... and ${done.length-10} more</div>` : ''}
    ` : ''}`;
}

// ═══════════════════════════════════
// VIEW: Invoice Queue (Suleiman / Arlene)
// ═══════════════════════════════════
function vFinance() {
  if (S.invoiceId) return vInvoicePreview();
  migrateInvoices();

  const all = dbGet();
  const expensed = all.filter(l => l.status === 'expensed');
  const invoiced  = all.filter(l => l.status === 'invoiced');
  const invGroups = dbGetInvoices().slice().sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));
  const pipelineLogs = all.filter(l => ['pending','approved','expensed'].includes(l.status));

  // Group expensed logs by clientId
  const byClient = {};
  expensed.forEach(l => {
    if (!byClient[l.clientId]) byClient[l.clientId] = {clientId: l.clientId, clientName: l.clientName, provider: l.provider, logs: []};
    byClient[l.clientId].logs.push(l);
  });
  const clientGroups = Object.values(byClient);

  const totalExpensed   = expensed.reduce((s,l) => s + l.total + (l.govFee||0), 0);
  const totalGovPending = expensed.reduce((s,l) => s + (l.govFee||0), 0);

  return `
    <div class="stats-row">
      <div class="stat" style="--sc:var(--purple)">
        <div class="stat-lbl">Clients to Invoice</div>
        <div class="stat-val">${clientGroups.length}</div>
        <div class="stat-sub">${expensed.length} service${expensed.length!==1?'s':''} ready</div>
      </div>
      <div class="stat" style="--sc:var(--red)">
        <div class="stat-lbl">Gov. Fees Pending</div>
        <div class="stat-val">QAR ${fmt(totalGovPending)}</div>
        <div class="stat-sub">To be recovered from clients</div>
      </div>
      <div class="stat" style="--sc:var(--navy)">
        <div class="stat-lbl">Total Pending</div>
        <div class="stat-val">QAR ${fmt(totalExpensed)}</div>
        <div class="stat-sub">Prof + Gov fees</div>
      </div>
      <div class="stat" style="--sc:var(--green)">
        <div class="stat-lbl">Invoices Issued</div>
        <div class="stat-val">${invGroups.length}</div>
        <div class="stat-sub">All time</div>
      </div>
    </div>

    ${pipelineLogs.length > 0 ? `
      <div style="font-size:11px;font-weight:700;color:var(--g500);text-transform:uppercase;margin-bottom:10px;letter-spacing:.5px">Service Pipeline</div>
      <div class="card" style="margin-bottom:16px;overflow:hidden">
        <table class="client-table" style="font-size:12px">
          <thead><tr><th>Service</th><th>Client</th><th>Status</th><th style="text-align:right">✓ Elena</th><th style="text-align:right">✓ Gabi</th></tr></thead>
          <tbody>${pipelineLogs.map(l => `<tr>
            <td style="font-weight:600">${l.serviceName}</td>
            <td style="color:var(--g500)">${l.clientName}</td>
            <td>${statusBadge(l.status)}</td>
